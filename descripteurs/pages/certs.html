<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
  <meta name="copyright" content="© 2026 Certify Community SA. Tous droits réservés." />
  <title>CERTs — Gestion des liens</title>

  <link rel="stylesheet" href="/descripteurs/assets/css/main.css" />
  <script src="https://cdn.jsdelivr.net/npm/jszip@3/dist/jszip.min.js"></script>

  <style>
    .page-lead{
      margin: 8px 0 14px 0;
      color: var(--muted);
      max-width: 900px;
    }

    .form-section{
      margin-bottom: 24px;
    }

    .form-section h3{
      margin-bottom: 12px;
      color: var(--text);
    }

    .form-row{
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }

    .form-row.two-cols > label{
      flex: 1 1 0;
    }

    label{
      display: block;
    }

    label small{
      display: block;
      margin-bottom: 4px;
      font-weight: 600;
    }

    .btn-row{
      display: flex;
      gap: 12px;
      margin-top: 18px;
    }

    .success-msg{
      padding: 12px;
      background: rgba(34,197,94,.15);
      border: 1px solid rgba(34,197,94,.35);
      border-radius: 12px;
      color: var(--text);
      margin-bottom: 16px;
      display: none;
    }

    .error-msg{
      padding: 12px;
      background: rgba(239,68,68,.15);
      border: 1px solid rgba(239,68,68,.35);
      border-radius: 12px;
      color: var(--text);
      margin-bottom: 16px;
      display: none;
    }

    #certsContent{
      display: none;
    }

    .import-zone{
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin-bottom: 20px;
      transition: border-color .2s, background .2s;
      cursor: pointer;
    }
    .import-zone:hover,
    .import-zone.dragover{
      border-color: var(--accent);
      background: rgba(111,92,247,.05);
    }
    .import-zone input[type="file"]{ display: none; }
    .import-zone-label{
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--muted);
    }
    .import-zone-label strong{ color: var(--accent); }
    .import-status{
      font-size: 0.82rem;
      margin-top: 8px;
      color: var(--muted);
    }
    .import-status.ok{ color: var(--good); font-weight: 600; }
    .import-status.err{ color: var(--bad); font-weight: 600; }

    /* Post-save "Envoyer en édition" panel */
    .post-save-panel{
      display: none;
      margin-bottom: 16px;
      padding: 14px 16px;
      background: rgba(111,92,247,.06);
      border: 1px solid rgba(111,92,247,.25);
      border-radius: 12px;
    }
    .post-save-panel.is-active{ display: block; }
    .post-save-panel-title{
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text);
      font-size: .92rem;
    }
    .post-save-row{
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .post-save-row select{
      flex: 1 1 180px;
      min-width: 140px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: .88rem;
      background: var(--panel);
      color: var(--text);
      outline: none;
    }
    .post-save-row textarea{
      width: 100%;
      margin-top: 8px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: .88rem;
      background: var(--panel);
      color: var(--text);
      outline: none;
      resize: vertical;
      min-height: 60px;
      font-family: inherit;
    }
    .post-save-status{
      margin-top: 8px;
      font-size: .82rem;
      color: var(--muted);
    }
    .post-save-status.ok{ color: #166534; font-weight: 600; }
    .post-save-status.err{ color: #b91c1c; font-weight: 600; }

    /* Sidecar popup: strip top chrome and jump straight to the form. */
    body.is-sidecar header,
    body.is-sidecar .certs-intro,
    body.is-sidecar .certs-intro-lead,
    body.is-sidecar #importZone { display: none !important; }
    body.is-sidecar #linkForm.is-hidden { display: none !important; }
  </style>
</head>

<body>
  <header>
    <nav style="display:flex;align-items:center;gap:6px;">
      <span style="font-weight:900;letter-spacing:-0.02em;color:var(--accent);">toutcuit</span>
      <span style="color:var(--border);">/</span>
      <a href="/expert.html" style="color:var(--muted);text-decoration:none;font-weight:600;">Expert</a>
      <span style="color:var(--border);">/</span>
      <span style="color:var(--muted);font-weight:600;">CERTs</span>
      <span style="flex:1;"></span>
      <span id="userName" style="font-size:.82rem;color:var(--muted);"></span>
      <button id="logoutBtn" style="font-size:.82rem;color:var(--accent);cursor:pointer;border:none;background:none;font-weight:600;">Déconnexion</button>
    </nav>
  </header>
  <main>
    <!-- Section principale (cachée par défaut, requiert auth admin) -->
    <section id="certsContent">
      <div class="certs-intro" style="display:flex;align-items:center;gap:12px;">
        <h1 style="flex:1;margin-bottom:0;">CERTs — Gestion des liens</h1>
        <span id="sidecarToggleSlot"></span>
      </div>
      <script type="module">
        import { renderSidecarToggle, openCertSidecar, isSidecarOn } from "/descripteurs/assets/js/sidecar.js";
        renderSidecarToggle(document.getElementById("sidecarToggleSlot"));
        window.tcOpenCertSidecar = openCertSidecar;
        window.tcIsSidecarOn = isSidecarOn;
        // Flag the sidecar popup so the layout can strip chrome.
        if (new URLSearchParams(location.search).get("mode") === "sidecar") {
          document.body.classList.add("is-sidecar");
          window.tcInSidecar = true;
        }
        // After the two popups are open, send the launcher window back to
        // /editor so the user doesn't end up with the same form duplicated.
        // Skipped when the current window IS the sidecar popup.
        window.tcLauncherReturnToEditor = () => {
          const inSidecar = new URLSearchParams(location.search).get("mode") === "sidecar";
          if (inSidecar) return;
          setTimeout(() => { window.location.href = "/editor"; }, 150);
        };
        // When Sidecar gets checked and the URL field already has a value,
        // stash the current form state and open the two popups (URL left,
        // pre-filled certs.html right), then send the launcher back to /editor.
        document.addEventListener("tc-sidecar-change", (e) => {
          if (!e.detail?.on) return;
          const urlInput = document.getElementById("urlInput");
          const url = urlInput?.value.trim();
          if (!url) return;
          const pf = {
            title: document.getElementById("titleInput")?.value || "",
            url,
            expert: document.getElementById("expertInput")?.value || "",
            date: document.getElementById("dateInput")?.value || "",
            threePhrases: document.getElementById("threePhrasesInput")?.value || "",
            context: document.getElementById("contextInput")?.value || "",
            content: document.getElementById("contentInput")?.value || "",
            reliabilityText: document.getElementById("reliabilityTextInput")?.value || "",
            references: document.getElementById("referencesInput")?.value || "",
            createdAt: Date.now(),
          };
          try { localStorage.setItem("tc_cert_prefill", JSON.stringify(pf)); } catch {}
          openCertSidecar(url, "/descripteurs/pages/certs.html?mode=sidecar");
          window.tcLauncherReturnToEditor();
        });
      </script>
      <p class="page-lead certs-intro-lead">
        Ajoutez des liens et leurs descripteurs pour les élèves.
      </p>

      <div class="import-zone" id="importZone">
        <input type="file" id="importFile" accept=".docx,.rtf" />
        <div class="import-zone-label">
          <strong>Importer un fichier</strong> — glisser-déposer ou cliquer pour sélectionner un .docx (CERTools) ou un .rtf (toutcuit.ch)
        </div>
        <div class="import-status" id="importStatus"></div>
      </div>

      <div class="card">
        <div id="successMsg" class="success-msg"></div>
        <div id="errorMsg" class="error-msg"></div>

        <div id="postSavePanel" class="post-save-panel">
          <div class="post-save-panel-title">Envoyer cette CERT en édition ?</div>
          <div class="post-save-row">
            <select id="postSaveEditorSelect"></select>
            <button type="button" class="btn" id="postSaveSendBtn">Envoyer en édition</button>
            <button type="button" class="btn" id="postSaveDismissBtn" style="background:transparent;color:var(--muted);border:1px solid var(--border);">Plus tard</button>
          </div>
          <textarea id="postSaveNoteInput" placeholder="Message à l'éditeur·ice (facultatif)…"></textarea>
          <div id="postSaveStatus" class="post-save-status"></div>
        </div>

        <form id="linkForm">
          <!-- Informations de base -->
          <div class="form-section">
            <h3>Informations de base</h3>

            <label>
              <small>Titre du lien</small>
              <input id="titleInput" type="text" placeholder="Ex: L'eau bouillante gèle-t-elle instantanément au Canada ?" required />
            </label>

            <label style="margin-top: 12px;">
              <small>URL</small>
              <input id="urlInput" type="url" placeholder="https://..." required />
            </label>

            <div class="form-row two-cols" style="margin-top: 12px;">
              <label>
                <small>Nom de l'expert</small>
                <input id="expertInput" type="text" placeholder="Prénom Nom" />
              </label>

              <label>
                <small>Date de rédaction</small>
                <input id="dateInput" type="text" placeholder="JJ.MM.AAAA" />
              </label>
            </div>
          </div>

          <!-- Descripteurs -->
          <div class="form-section">
            <h3>Descripteurs</h3>
            
            <div class="form-row two-cols">
              <label>
                <small>Premier descripteur</small>
                <select id="descriptor1Input" required>
                  <option value="">-- Sélectionner --</option>
                  <option value="Journalisme">Journalisme</option>
                  <option value="Science">Science</option>
                  <option value="Gouvernement">Gouvernement</option>
                  <option value="Divertissement">Divertissement</option>
                  <option value="Organisation">Organisation</option>
                  <option value="Individu">Individu</option>
                  <option value="Inconnu">Inconnu</option>
                </select>
              </label>

              <label>
                <small>Deuxième descripteur</small>
                <select id="descriptor2Input" required>
                  <option value="">-- Sélectionner --</option>
                  <option value="Vulgarisation scientifique">Vulgarisation scientifique</option>
                  <option value="Analyse">Analyse</option>
                  <option value="Reportage">Reportage</option>
                  <option value="Opinion">Opinion</option>
                  <option value="Rumeur">Rumeur</option>
                  <option value="Accrocheur">Accrocheur</option>
                  <option value="Trompeur">Trompeur</option>
                  <option value="Escroquerie">Escroquerie</option>
                  <option value="Partisan">Partisan</option>
                  <option value="Promotion">Promotion</option>
                  <option value="Annonce">Annonce</option>
                  <option value="Service">Service</option>
                  <option value="Achat/Vente">Achat/Vente</option>
                  <option value="Première main">Première main</option>
                  <option value="Tutoriel">Tutoriel</option>
                  <option value="Loisir">Loisir</option>
                  <option value="Humour">Humour</option>
                  <option value="Performance">Performance</option>
                </select>
              </label>
            </div>

            <label style="margin-top: 12px;">
              <small>Fiabilité</small>
              <select id="reliabilityInput" required>
                <option value="">-- Sélectionner --</option>
                <option value="Fiable">Fiable</option>
                <option value="Indéterminé">Indéterminé</option>
                <option value="Pas fiable">Pas fiable</option>
              </select>
            </label>
          </div>

          <!-- Contenus textuels -->
          <div class="form-section">
            <h3>CCF</h3>

            <label>
              <small>3 Phrases</small>
              <textarea id="threePhrasesInput" rows="3" placeholder="Sujet et source. Si utile, date de publication et auteur.&#10;Affirmations principales. Si utile, structure et style.&#10;Motivation de l'évaluation."></textarea>
            </label>

            <label style="margin-top: 12px;">
              <small>Contexte</small>
              <textarea id="contextInput" rows="4" placeholder="Présenter le sujet avec le contexte général. Décrire la source et ses caractéristiques. Indiquer la date de publication et l'auteur."></textarea>
            </label>

            <label style="margin-top: 12px;">
              <small>Contenu</small>
              <textarea id="contentInput" rows="4" placeholder="Discuter le contenu et les affirmations principales. Analyser la façon dont le contenu est structuré et présenté."></textarea>
            </label>

            <label style="margin-top: 12px;">
              <small>Fiabilité (explication)</small>
              <textarea id="reliabilityTextInput" rows="4" placeholder="Expliquer pourquoi vous pensez qu'elle est fiable, pas fiable ou indéterminée."></textarea>
            </label>

            <label style="margin-top: 12px;">
              <small>Références</small>
              <textarea id="referencesInput" rows="4" placeholder="Donnez les moyens de vérifier vos arguments. Utilisez des hyperliens."></textarea>
            </label>
          </div>

          <div class="btn-row">
            <button class="btn" type="submit">Ajouter le lien</button>
            <button class="btn" type="button" id="downloadRtfBtn">Télécharger .rtf</button>
            <button class="btn" type="button" id="resetBtn">Réinitialiser</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <script type="module">
    /* ============================
       Configuration
    ============================ */
    const API_BASE = "/api";

    const certsContent = document.getElementById("certsContent");

    const linkForm = document.getElementById("linkForm");
    const successMsg = document.getElementById("successMsg");
    const errorMsg = document.getElementById("errorMsg");
    const resetBtn = document.getElementById("resetBtn");

    /* ============================
       Authentification via JWT
    ============================ */
    const token = localStorage.getItem("tc_token");
    if (token) {
      certsContent.style.display = "block";
    } else {
      window.location.href = "/expert.html";
    }

    try {
      const t = JSON.parse(localStorage.getItem("tc_teacher"));
      if (t?.name) document.getElementById("userName").textContent = t.name;
    } catch {}
    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("tc_token");
      localStorage.removeItem("tc_teacher");
      window.location.href = "/expert.html";
    });

    /* ============================
       Review-request (post-save)
    ============================ */
    const postSavePanel = document.getElementById("postSavePanel");
    const postSaveEditorSelect = document.getElementById("postSaveEditorSelect");
    const postSaveSendBtn = document.getElementById("postSaveSendBtn");
    const postSaveDismissBtn = document.getElementById("postSaveDismissBtn");
    const postSaveNoteInput = document.getElementById("postSaveNoteInput");
    const postSaveStatus = document.getElementById("postSaveStatus");
    let lastSavedCertId = null;
    let editorsLoaded = false;

    async function loadEditorsOnce() {
      if (editorsLoaded) return;
      try {
        const res = await fetch(`${API_BASE}/teachers/editors.php`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        const editors = await res.json();
        if (!Array.isArray(editors) || !editors.length) {
          postSaveEditorSelect.innerHTML = '<option value="">(aucun·e éditeur·ice)</option>';
        } else {
          postSaveEditorSelect.innerHTML = editors
            .map(e => `<option value="${e.id}">${e.name}</option>`)
            .join("");
        }
        editorsLoaded = true;
      } catch {
        postSaveEditorSelect.innerHTML = '<option value="">(erreur de chargement)</option>';
      }
    }
    loadEditorsOnce();

    function showPostSavePanel(certId) {
      lastSavedCertId = certId;
      postSaveStatus.textContent = "";
      postSaveStatus.className = "post-save-status";
      postSaveNoteInput.value = "";
      postSavePanel.classList.add("is-active");
    }

    postSaveDismissBtn.addEventListener("click", () => {
      postSavePanel.classList.remove("is-active");
      lastSavedCertId = null;
    });

    postSaveSendBtn.addEventListener("click", async () => {
      if (!lastSavedCertId) return;
      const editorId = parseInt(postSaveEditorSelect.value, 10);
      if (!editorId) {
        postSaveStatus.className = "post-save-status err";
        postSaveStatus.textContent = "Aucun·e éditeur·ice sélectionné·e.";
        return;
      }
      postSaveSendBtn.disabled = true;
      postSaveStatus.className = "post-save-status";
      postSaveStatus.textContent = "Envoi…";
      try {
        const res = await fetch(`${API_BASE}/certs/request-review.php`, {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
          body: JSON.stringify({
            cert_id: lastSavedCertId,
            editor_id: editorId,
            note: postSaveNoteInput.value.trim() || null,
          }),
        });
        const result = await res.json();
        if (result.error) {
          postSaveStatus.className = "post-save-status err";
          postSaveStatus.textContent = result.error;
        } else {
          postSaveStatus.className = "post-save-status ok";
          postSaveStatus.textContent = "Demande envoyée.";
          setTimeout(() => {
            postSavePanel.classList.remove("is-active");
            lastSavedCertId = null;
          }, 1500);
        }
      } catch (err) {
        postSaveStatus.className = "post-save-status err";
        postSaveStatus.textContent = err.message;
      } finally {
        postSaveSendBtn.disabled = false;
      }
    });

    /* ============================
       Prefill from analyse tool
    ============================ */
    // When the user clicks "Générer une CERT" in /analyse, we stash the AI-composed
    // fields in localStorage and open this page. Pick them up here and clear the key.
    try {
      const raw = localStorage.getItem("tc_cert_prefill");
      if (raw) {
        const p = JSON.parse(raw);
        // Ignore stale prefills (> 10 min) to avoid surprising fills on later visits.
        if (p && (Date.now() - (p.createdAt || 0)) < 10 * 60 * 1000) {
          if (p.title)      document.getElementById("titleInput").value      = p.title;
          if (p.url)        document.getElementById("urlInput").value        = p.url;
          if (p.expert)     document.getElementById("expertInput").value     = p.expert;
          if (p.date)       document.getElementById("dateInput").value       = p.date;
          if (p.threePhrases) document.getElementById("threePhrasesInput").value = p.threePhrases;
          if (p.context)    document.getElementById("contextInput").value    = p.context;
          if (p.content)    document.getElementById("contentInput").value    = p.content;
          if (p.reliabilityText) document.getElementById("reliabilityTextInput").value = p.reliabilityText;
          if (p.references) document.getElementById("referencesInput").value = p.references;
          // Selects: only apply if the option exists (e.g. imported from RTF/docx).
          const setSel = (id, v) => {
            if (!v) return;
            const el = document.getElementById(id);
            if (!el) return;
            for (const opt of el.options) {
              if (opt.value.toLowerCase() === String(v).toLowerCase()) { el.value = opt.value; return; }
            }
          };
          setSel("descriptor1Input", p.descriptor1);
          setSel("descriptor2Input", p.descriptor2);
          setSel("reliabilityInput", p.reliability);
        }
        localStorage.removeItem("tc_cert_prefill");
      }
    } catch {}

    /* ============================
       Gestion du formulaire
    ============================ */
    function showSuccess(message) {
      successMsg.textContent = message;
      successMsg.style.display = "block";
      errorMsg.style.display = "none";
      setTimeout(() => {
        successMsg.style.display = "none";
      }, 5000);
    }

    function showError(message) {
      errorMsg.textContent = message;
      errorMsg.style.display = "block";
      successMsg.style.display = "none";
    }

    // Map reliability labels French → DB enum
    function reliabilityToEnum(val){
      if (!val) return "mid";
      const v = val.toLowerCase();
      if (v.includes("fiable") && !v.includes("pas")) return "good";
      if (v.includes("indéterminé") || v.includes("indetermine")) return "mid";
      if (v.includes("pas fiable")) return "bad";
      return "mid";
    }

    // Convert DD.MM.YYYY to YYYY-MM-DD for MySQL
    function toIsoDate(val) {
      if (!val) return "";
      const m = val.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
      if (m) return `${m[3]}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`;
      return val;
    }

    async function submitLink(data) {
      try {
        const payload = {
          title: data.title,
          url: data.url,
          expert: data.expert || null,
          cert_date: toIsoDate(data.date) || null,
          descriptor1: data.descriptor1 || null,
          descriptor2: data.descriptor2 || null,
          reliability: reliabilityToEnum(data.reliability),
          three_phrases: data.threePhrases || null,
          context: data.context || null,
          content: data.content || null,
          reliability_text: data.reliabilityText || null,
          references_text: data.references || null
        };
        if (currentDraftSource) payload.source = currentDraftSource;

        const response = await fetch(`${API_BASE}/certs/save.php`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (result.error) {
          showError(result.error);
        } else {
          showSuccess("CERT ajouté avec succès !");
          if (!window.tcInSidecar && result.id) {
            showPostSavePanel(result.id);
          }
          if (window.tcInSidecar) {
            // In the sidecar popup, the user is expected to close the window
            // and go back to /expert or /editor — don't reset the form.
            linkForm.classList.add("is-hidden");
          } else {
            linkForm.reset();
          }
          currentDraftSource = null;
        }
      } catch (error) {
        showError("Erreur lors de l'ajout : " + error.message);
      }
    }

    linkForm.addEventListener("submit", (e) => {
      e.preventDefault();

      const data = {
        title: document.getElementById("titleInput").value.trim(),
        url: document.getElementById("urlInput").value.trim(),
        expert: document.getElementById("expertInput").value.trim(),
        date: document.getElementById("dateInput").value,
        descriptor1: document.getElementById("descriptor1Input").value,
        descriptor2: document.getElementById("descriptor2Input").value,
        reliability: document.getElementById("reliabilityInput").value,
        threePhrases: document.getElementById("threePhrasesInput").value.trim(),
        context: document.getElementById("contextInput").value.trim(),
        content: document.getElementById("contentInput").value.trim(),
        reliabilityText: document.getElementById("reliabilityTextInput").value.trim(),
        references: document.getElementById("referencesInput").value.trim()
      };

      submitLink(data);
    });

    resetBtn.addEventListener("click", () => {
      linkForm.reset();
      currentDraftSource = null;
      successMsg.style.display = "none";
      errorMsg.style.display = "none";
    });

    /* ============================
       Word (.docx) import
    ============================ */
    const importZone = document.getElementById("importZone");
    const importFile = document.getElementById("importFile");
    const importStatus = document.getElementById("importStatus");

    // Tracks whether the current draft in the form started as a file import
    // (.docx/.rtf). AI prefill from /analyse and manual typing both leave this
    // null — the backend logs those as cert.create, imports as cert.import.
    let currentDraftSource = null;

    importZone.addEventListener("click", () => importFile.click());
    importZone.addEventListener("dragover", (e) => { e.preventDefault(); importZone.classList.add("dragover"); });
    importZone.addEventListener("dragleave", () => importZone.classList.remove("dragover"));
    importZone.addEventListener("drop", (e) => {
      e.preventDefault();
      importZone.classList.remove("dragover");
      const file = e.dataTransfer?.files?.[0];
      if (file) processImport(file);
    });
    importFile.addEventListener("change", () => {
      const file = importFile.files?.[0];
      if (file) processImport(file);
    });

    async function processImport(file) {
      const name = (file.name || "").toLowerCase();
      if (name.endsWith(".rtf")) return processRtf(file);
      if (name.endsWith(".docx")) return processDocx(file);
      importStatus.textContent = "Fichier non supporté. Utilisez un .docx ou un .rtf.";
      importStatus.className = "import-status err";
    }

    async function processDocx(file) {
      importStatus.textContent = "Lecture du fichier...";
      importStatus.className = "import-status";

      try {
        const zip = await JSZip.loadAsync(file);
        const xmlText = await zip.file("word/document.xml").async("text");
        const parsed = parseDocxXml(xmlText);
        fillForm(parsed);
        currentDraftSource = "import";

        importStatus.textContent = `Import réussi : "${parsed.title || '(sans titre)'}"`;
        importStatus.className = "import-status ok";
      } catch (err) {
        console.error("Import error:", err);
        importStatus.textContent = "Erreur lors de l'import : " + err.message;
        importStatus.className = "import-status err";
      }
    }

    async function processRtf(file) {
      importStatus.textContent = "Lecture du fichier...";
      importStatus.className = "import-status";

      try {
        const text = await file.text();
        const plain = rtfToText(text);
        const parsed = parseCertRtf(plain);
        fillForm(parsed);
        currentDraftSource = "import";

        importStatus.textContent = `Import réussi : "${parsed.title || '(sans titre)'}"`;
        importStatus.className = "import-status ok";
      } catch (err) {
        console.error("Import error:", err);
        importStatus.textContent = "Erreur lors de l'import : " + err.message;
        importStatus.className = "import-status err";
      }
    }

    function parseDocxXml(xml) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(xml, "application/xml");
      const ns = "http://schemas.openxmlformats.org/wordprocessingml/2006/main";
      const paragraphs = doc.getElementsByTagNameNS(ns, "p");

      // Extract text + metadata from each paragraph
      const paras = [];
      for (const p of paragraphs) {
        const runs = p.getElementsByTagNameNS(ns, "r");
        let text = "";
        let isSectionHeading = false;
        let isTitle = false;
        let isBlue = false;
        let hasRed = false;
        let hasGreen = false;
        let hasOrange = false;
        let hasShdGreen = false;
        let hasShdRed = false;
        let hasShdOrange = false;

        for (const r of runs) {
          const tNodes = r.getElementsByTagNameNS(ns, "t");
          let runText = "";
          for (const t of tNodes) runText += t.textContent || "";
          text += runText;

          const rPr = r.getElementsByTagNameNS(ns, "rPr")[0];
          if (rPr && runText.trim()) {
            const color = rPr.getElementsByTagNameNS(ns, "color")[0];
            const bold = rPr.getElementsByTagNameNS(ns, "b")[0];
            const sz = rPr.getElementsByTagNameNS(ns, "sz")[0];
            const shd = rPr.getElementsByTagNameNS(ns, "shd")[0];
            const colorVal = color?.getAttribute("w:val")?.toUpperCase() || "";
            const szVal = parseInt(sz?.getAttribute("w:val") || "0", 10);
            const shdFill = shd?.getAttribute("w:fill")?.toUpperCase() || "";

            // Old format: bold gray section headings
            if (colorVal === "A5A5A5" && bold) isSectionHeading = true;
            // New format: bold dark-blue section headings (sz ~26)
            if (colorVal === "1F4E79" && bold && szVal >= 24 && szVal <= 28) isSectionHeading = true;
            // New format: title (dark-blue, bold, sz ≥ 30)
            if (colorVal === "1F4E79" && bold && szVal >= 30) isTitle = true;

            // Text colors
            if (colorVal === "0096FF" || colorVal === "2E74B5" || colorVal === "0563C1") isBlue = true;
            if (colorVal === "FF0000" || colorVal === "EF596F") hasRed = true;
            if (colorVal === "00B050") hasGreen = true;
            if (colorVal === "F79646") hasOrange = true;

            // Background shading for reliability badge (new format)
            if (shdFill === "009444" || shdFill === "00B050") hasShdGreen = true;
            if (shdFill === "FF0000" || shdFill === "EF596F" || shdFill === "C00000") hasShdRed = true;
            if (shdFill === "F79646" || shdFill === "ED7D31" || shdFill === "FFC000") hasShdOrange = true;
          }
        }

        text = text.replace(/\s+/g, " ").trim();
        if (text || isSectionHeading) {
          paras.push({ text, isSectionHeading, isTitle, isBlue, hasRed, hasGreen, hasOrange, hasShdGreen, hasShdRed, hasShdOrange });
        }
      }

      // Split into sections by headings
      const sections = {};
      let currentSection = "_header";
      sections._header = [];

      for (const p of paras) {
        if (p.isSectionHeading && p.text) {
          currentSection = p.text.toLowerCase().trim();
          if (!sections[currentSection]) sections[currentSection] = [];
        } else {
          if (!sections[currentSection]) sections[currentSection] = [];
          sections[currentSection].push(p);
        }
      }

      // Extract fields
      const header = sections._header || [];

      // Title = first title-formatted or blue line
      const title = header.find(p => p.isTitle)?.text || header.find(p => p.isBlue)?.text || "";

      // URL = first line that looks like a URL
      const urlPara = header.find(p => /^https?:\/\//.test(p.text));
      const url = urlPara?.text || "";

      // Expert name (line starting with "Expert :" or "Expert:")
      const expertPara = header.find(p => /^expert\s*:/i.test(p.text));
      const expert = expertPara?.text.replace(/^expert\s*:\s*/i, "").trim() || "";

      // Date (supports "certification date:" and "date:")
      const datePara = header.find(p => /(?:certification\s+)?date\s*:/i.test(p.text));
      let date = "";
      if (datePara) {
        const raw = datePara.text.replace(/^.*?:\s*/i, "").trim();
        const d = new Date(raw);
        if (!isNaN(d)) date = String(d.getDate()).padStart(2, "0") + "." + String(d.getMonth() + 1).padStart(2, "0") + "." + d.getFullYear();
      }

      // Descriptors (supports both space-separated and " · " separated)
      const descParas = sections["descriptors"] || [];
      const descText = descParas.map(p => p.text).join(" ").trim();
      const descParts = descText.includes("·")
        ? descText.split(/\s*·\s*/).map(s => s.trim()).filter(Boolean)
        : descText.split(/\s+/).filter(Boolean);
      const descriptor1 = descParts[0] || "";
      const descriptor2 = descParts[1] || "";

      // Helper: parse labeled sub-fields (Context: ..., Content: ..., Reliability: ...)
      function parseLabeledFields(paraList) {
        const fields = { context: "", content: "", reliability: "" };
        for (const p of paraList) {
          const t = p.text;
          if (/^context\s*:/i.test(t)) {
            fields.context = t.replace(/^context\s*:\s*/i, "").trim();
          } else if (/^content\s*:/i.test(t)) {
            fields.content = t.replace(/^content\s*:\s*/i, "").trim();
          } else if (/^reliability\s*:/i.test(t)) {
            fields.reliability = t.replace(/^reliability\s*:\s*/i, "").trim();
          }
        }
        return fields;
      }

      // 3 Sentences / 3-Pointer
      const sentencesParas = sections["3 sentences"] || sections["3-pointer"] || [];
      let threePhrases = "";
      if (sentencesParas.some(p => /^(context|content|reliability)\s*:/i.test(p.text))) {
        const sf = parseLabeledFields(sentencesParas);
        threePhrases = [sf.context, sf.content, sf.reliability].filter(Boolean).join("\n");
      } else {
        threePhrases = sentencesParas.map(p => p.text).filter(Boolean).join("\n");
      }

      // CCR
      const ccrParas = sections["ccr"] || [];
      let context = "", content = "", reliabilityText = "";
      if (ccrParas.some(p => /^(context|content|reliability)\s*:/i.test(p.text))) {
        const cf = parseLabeledFields(ccrParas);
        context = cf.context;
        content = cf.content;
        reliabilityText = cf.reliability;
      } else {
        const ccrTexts = ccrParas.map(p => p.text).filter(Boolean);
        context = ccrTexts[0] || "";
        content = ccrTexts.join("\n");
        reliabilityText = ccrTexts[ccrTexts.length - 1] || "";
      }

      // References (strip bullets and numbered prefixes)
      const refParas = sections["references"] || [];
      const references = refParas
        .map(p => p.text.replace(/^(?:[•·\-–—]|\d+[.)]\s*)\s*/, "").trim())
        .filter(Boolean)
        .join("\n");

      // Reliability: check "label" (old) and "reliability" (new) sections
      const labelParas = sections["label"] || sections["reliability"] || [];
      let reliability = "";
      for (const p of labelParas) {
        const t = p.text.toLowerCase();
        // Background shading (new format)
        if (p.hasShdRed) { reliability = "Pas fiable"; break; }
        if (p.hasShdOrange) { reliability = "Indéterminé"; break; }
        if (p.hasShdGreen) { reliability = "Fiable"; break; }
        // Text color (old format)
        if (p.hasRed || t.includes("unreliable") || t.includes("pas fiable")) {
          reliability = "Pas fiable";
        } else if (p.hasOrange || t.includes("undetermined") || t.includes("indéterminé") || t.includes("in between")) {
          reliability = "Indéterminé";
        } else if (p.hasGreen || t.includes("reliable") || t.includes("fiable")) {
          reliability = "Fiable";
        }
      }

      return { title, url, expert, date, descriptor1, descriptor2, reliability, threePhrases, context, content, reliabilityText, references };
    }

    function fillForm(data) {
      document.getElementById("titleInput").value = data.title || "";
      document.getElementById("urlInput").value = data.url || "";
      document.getElementById("expertInput").value = data.expert || "";
      document.getElementById("dateInput").value = data.date || "";
      document.getElementById("threePhrasesInput").value = data.threePhrases || "";
      document.getElementById("contextInput").value = data.context || "";
      document.getElementById("contentInput").value = data.content || "";
      document.getElementById("reliabilityTextInput").value = data.reliabilityText || "";
      document.getElementById("referencesInput").value = data.references || "";

      // Set selects if value matches an option
      setSelectIfValid("descriptor1Input", data.descriptor1);
      setSelectIfValid("descriptor2Input", data.descriptor2);
      setSelectIfValid("reliabilityInput", data.reliability);

      // If Sidecar is ON and the import gave us a URL, open the 2-window
      // layout automatically. Skip if we're already in the sidecar popup.
      const inSidecar = new URLSearchParams(location.search).get("mode") === "sidecar";
      const url = (data.url || "").trim();
      if (!inSidecar && url && window.tcIsSidecarOn && window.tcIsSidecarOn()) {
        const pf = {
          title: data.title || "",
          url,
          expert: data.expert || "",
          date: data.date || "",
          threePhrases: data.threePhrases || "",
          context: data.context || "",
          content: data.content || "",
          reliabilityText: data.reliabilityText || "",
          references: data.references || "",
          descriptor1: data.descriptor1 || "",
          descriptor2: data.descriptor2 || "",
          reliability: data.reliability || "",
          createdAt: Date.now(),
        };
        try { localStorage.setItem("tc_cert_prefill", JSON.stringify(pf)); } catch {}
        window.tcOpenCertSidecar(url, "/descripteurs/pages/certs.html?mode=sidecar");
        if (typeof window.tcLauncherReturnToEditor === "function") window.tcLauncherReturnToEditor();
      }
    }

    function setSelectIfValid(id, value) {
      const el = document.getElementById(id);
      if (!el || !value) return;
      for (const opt of el.options) {
        if (opt.value.toLowerCase() === value.toLowerCase()) {
          el.value = opt.value;
          return;
        }
      }
    }

    /* ============================
       RTF export / import (shared format with /review)
    ============================ */
    // Escape a string for RTF body: backslash/braces + non-ASCII as \uN?
    function rtfEscape(str) {
      let out = "";
      for (const ch of String(str)) {
        const code = ch.codePointAt(0);
        if (ch === "\\" || ch === "{" || ch === "}") {
          out += "\\" + ch;
        } else if (code === 0x0A) {
          out += "\\line ";
        } else if (code < 128) {
          out += ch;
        } else if (code <= 0xFFFF) {
          const signed = code > 32767 ? code - 65536 : code;
          out += "\\u" + signed + "?";
        } else {
          const cp = code - 0x10000;
          const hi = 0xD800 + (cp >> 10);
          const lo = 0xDC00 + (cp & 0x3FF);
          out += "\\u" + (hi > 32767 ? hi - 65536 : hi) + "?";
          out += "\\u" + (lo > 32767 ? lo - 65536 : lo) + "?";
        }
      }
      return out;
    }

    function buildCertRtf(data) {
      const esc = rtfEscape;
      const bold = (t) => "{\\b " + esc(t) + "}";
      const line = (label, val) => bold(label) + " : " + esc(val || "") + "\\par\n";
      const block = (label, val) => {
        let s = bold(label) + " :\\par\n";
        const text = String(val || "");
        if (text) {
          // Preserve internal newlines as \line
          s += esc(text) + "\\par\n";
        } else {
          s += "\\par\n";
        }
        return s + "\\par\n";
      };
      let body = "";
      body += line("Titre", data.title);
      body += line("URL", data.url);
      body += line("Expert", data.expert);
      body += line("Date", data.date);
      body += line("Descripteur 1", data.descriptor1);
      body += line("Descripteur 2", data.descriptor2);
      body += line("Fiabilité", data.reliability);
      body += "\\par\n";
      body += block("3 phrases", data.threePhrases);
      body += block("Contexte", data.context);
      body += block("Contenu", data.content);
      body += block("Fiabilité (explication)", data.reliabilityText);
      body += block("Références", data.references);
      return "{\\rtf1\\ansi\\ansicpg1252\\uc1\\deff0"
        + "{\\fonttbl{\\f0 Helvetica;}}"
        + "\\fs22\n" + body + "}";
    }

    // Minimal RTF → plaintext extractor. Handles our own exports; not a general parser.
    function rtfToText(rtf) {
      let s = String(rtf);
      // Strip well-known header groups
      s = s.replace(/\{\\\*?\\(?:fonttbl|colortbl|stylesheet|info|generator|listtable|listoverridetable|rsidtbl)[^{}]*(?:\{[^{}]*\}[^{}]*)*\}/g, "");
      // Replace paragraph / line breaks
      s = s.replace(/\\par\b\s?/g, "\n");
      s = s.replace(/\\line\b\s?/g, "\n");
      s = s.replace(/\\tab\b\s?/g, "\t");
      // Unicode escapes \uN? (signed 16-bit)
      s = s.replace(/\\u(-?\d+)\??/g, (_, n) => {
        let code = parseInt(n, 10);
        if (code < 0) code += 65536;
        return String.fromCharCode(code);
      });
      // Hex escapes \'XX (windows-1252 fallback — fine for ASCII-ish; non-ASCII handled via \u)
      s = s.replace(/\\'([0-9a-fA-F]{2})/g, (_, h) => String.fromCharCode(parseInt(h, 16)));
      // Escaped literals
      s = s.replace(/\\([\\{}])/g, "$1");
      // Strip remaining control words (\word optionally followed by signed digits, then optional space)
      s = s.replace(/\\[a-zA-Z]+-?\d*\s?/g, "");
      // Strip braces
      s = s.replace(/[{}]/g, "");
      return s;
    }

    function parseCertRtf(plain) {
      const labelMap = {
        "titre": "title",
        "url": "url",
        "expert": "expert",
        "date": "date",
        "descripteur 1": "descriptor1",
        "descripteur 2": "descriptor2",
        "fiabilité": "reliability",
        "fiabilite": "reliability",
        "3 phrases": "threePhrases",
        "contexte": "context",
        "contenu": "content",
        "fiabilité (explication)": "reliabilityText",
        "fiabilite (explication)": "reliabilityText",
        "références": "references",
        "references": "references",
      };
      const singleLine = new Set(["title","url","expert","date","descriptor1","descriptor2","reliability"]);
      const lines = plain.split(/\r?\n/);
      const out = {};
      let currentKey = null;
      let buf = [];
      const flush = () => {
        if (currentKey && !singleLine.has(currentKey)) {
          out[currentKey] = buf.join("\n").replace(/\n+$/, "").trim();
        }
        buf = [];
      };
      for (const raw of lines) {
        const line = raw;
        const m = line.match(/^\s*([^:]+?)\s*:\s*(.*)$/);
        let matchedLabel = false;
        if (m) {
          const label = m[1].toLowerCase().trim();
          const key = labelMap[label];
          if (key) {
            matchedLabel = true;
            flush();
            if (singleLine.has(key)) {
              out[key] = m[2].trim();
              currentKey = null;
            } else {
              currentKey = key;
              if (m[2].trim()) buf.push(m[2]);
            }
          }
        }
        if (!matchedLabel && currentKey) buf.push(line);
      }
      flush();
      return out;
    }

    function collectFormData() {
      return {
        title: document.getElementById("titleInput").value.trim(),
        url: document.getElementById("urlInput").value.trim(),
        expert: document.getElementById("expertInput").value.trim(),
        date: document.getElementById("dateInput").value.trim(),
        descriptor1: document.getElementById("descriptor1Input").value,
        descriptor2: document.getElementById("descriptor2Input").value,
        reliability: document.getElementById("reliabilityInput").value,
        threePhrases: document.getElementById("threePhrasesInput").value,
        context: document.getElementById("contextInput").value,
        content: document.getElementById("contentInput").value,
        reliabilityText: document.getElementById("reliabilityTextInput").value,
        references: document.getElementById("referencesInput").value,
      };
    }

    function sanitizeFilename(s) {
      return String(s || "CERT").replace(/[\\/:*?"<>|]+/g, "_").replace(/\s+/g, "_").slice(0, 60) || "CERT";
    }

    document.getElementById("downloadRtfBtn").addEventListener("click", () => {
      const data = collectFormData();
      const rtf = buildCertRtf(data);
      const blob = new Blob([rtf], { type: "application/rtf;charset=utf-8" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "CERT_" + sanitizeFilename(data.title) + ".rtf";
      a.click();
      URL.revokeObjectURL(a.href);
    });
  </script>
</body>
