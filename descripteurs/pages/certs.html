<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
  <meta name="copyright" content="© 2026 Certify Community SA. Tous droits réservés." />
  <title>CERTs — Gestion des liens</title>

  <link rel="stylesheet" href="/descripteurs/assets/css/main.css" />
  <script src="https://cdn.jsdelivr.net/npm/jszip@3/dist/jszip.min.js"></script>

  <style>
    .page-lead{
      margin: 8px 0 14px 0;
      color: var(--muted);
      max-width: 900px;
    }

    .form-section{
      margin-bottom: 24px;
    }

    .form-section h3{
      margin-bottom: 12px;
      color: var(--text);
    }

    .form-row{
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }

    .form-row.two-cols > label{
      flex: 1 1 0;
    }

    label{
      display: block;
    }

    label small{
      display: block;
      margin-bottom: 4px;
      font-weight: 600;
    }

    .btn-row{
      display: flex;
      gap: 12px;
      margin-top: 18px;
    }

    .success-msg{
      padding: 12px;
      background: rgba(34,197,94,.15);
      border: 1px solid rgba(34,197,94,.35);
      border-radius: 12px;
      color: var(--text);
      margin-bottom: 16px;
      display: none;
    }

    .error-msg{
      padding: 12px;
      background: rgba(239,68,68,.15);
      border: 1px solid rgba(239,68,68,.35);
      border-radius: 12px;
      color: var(--text);
      margin-bottom: 16px;
      display: none;
    }

    #certsContent{
      display: none;
    }

    .import-zone{
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin-bottom: 20px;
      transition: border-color .2s, background .2s;
      cursor: pointer;
    }
    .import-zone:hover,
    .import-zone.dragover{
      border-color: var(--accent);
      background: rgba(111,92,247,.05);
    }
    .import-zone input[type="file"]{ display: none; }
    .import-zone-label{
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--muted);
    }
    .import-zone-label strong{ color: var(--accent); }
    .import-status{
      font-size: 0.82rem;
      margin-top: 8px;
      color: var(--muted);
    }
    .import-status.ok{ color: var(--good); font-weight: 600; }
    .import-status.err{ color: var(--bad); font-weight: 600; }
  </style>
</head>

<body>
  <header>
    <nav>
      <span style="font-weight:900;letter-spacing:-0.02em;color:var(--accent);margin-right:6px;">toutcuit</span>
      <span style="color:var(--border);margin-right:6px;">/</span>
      <a href="/admin.html" style="color:var(--muted);text-decoration:none;font-weight:600;">Console</a>
    </nav>
  </header>

  <main>
    <!-- Section principale (cachée par défaut, requiert auth admin) -->
    <section id="certsContent">
      <h1>CERTs — Gestion des liens</h1>
      <p class="page-lead">
        Ajoutez des liens et leurs descripteurs pour les élèves.
      </p>

      <div class="import-zone" id="importZone">
        <input type="file" id="importFile" accept=".docx" />
        <div class="import-zone-label">
          <strong>Importer un fichier Word</strong> — glisser-déposer ou cliquer pour sélectionner un .docx téléchargé depuis CERTools
        </div>
        <div class="import-status" id="importStatus"></div>
      </div>

      <div class="card">
        <div id="successMsg" class="success-msg"></div>
        <div id="errorMsg" class="error-msg"></div>

        <form id="linkForm">
          <!-- Informations de base -->
          <div class="form-section">
            <h3>Informations de base</h3>

            <label>
              <small>Titre du lien</small>
              <input id="titleInput" type="text" placeholder="Ex: L'eau bouillante gèle-t-elle instantanément au Canada ?" required />
            </label>

            <label style="margin-top: 12px;">
              <small>URL</small>
              <input id="urlInput" type="url" placeholder="https://..." required />
            </label>

            <div class="form-row two-cols" style="margin-top: 12px;">
              <label>
                <small>Nom de l'expert</small>
                <input id="expertInput" type="text" placeholder="Prénom Nom" />
              </label>

              <label>
                <small>Date de rédaction</small>
                <input id="dateInput" type="text" placeholder="JJ.MM.AAAA" />
              </label>
            </div>
          </div>

          <!-- Descripteurs -->
          <div class="form-section">
            <h3>Descripteurs (bon résultat)</h3>
            
            <div class="form-row two-cols">
              <label>
                <small>Premier descripteur</small>
                <select id="descriptor1Input" required>
                  <option value="">-- Sélectionner --</option>
                  <option value="Journalisme">Journalisme</option>
                  <option value="Science">Science</option>
                  <option value="Gouvernement">Gouvernement</option>
                  <option value="Divertissement">Divertissement</option>
                  <option value="Organisation">Organisation</option>
                  <option value="Individu">Individu</option>
                  <option value="Inconnu">Inconnu</option>
                </select>
              </label>

              <label>
                <small>Deuxième descripteur</small>
                <select id="descriptor2Input" required>
                  <option value="">-- Sélectionner --</option>
                  <option value="Vulgarisation scientifique">Vulgarisation scientifique</option>
                  <option value="Analyse">Analyse</option>
                  <option value="Reportage">Reportage</option>
                  <option value="Opinion">Opinion</option>
                  <option value="Rumeur">Rumeur</option>
                  <option value="Accrocheur">Accrocheur</option>
                  <option value="Trompeur">Trompeur</option>
                  <option value="Escroquerie">Escroquerie</option>
                  <option value="Partisan">Partisan</option>
                  <option value="Promotion">Promotion</option>
                  <option value="Annonce">Annonce</option>
                  <option value="Service">Service</option>
                  <option value="Achat/Vente">Achat/Vente</option>
                  <option value="Première main">Première main</option>
                  <option value="Tutoriel">Tutoriel</option>
                  <option value="Loisir">Loisir</option>
                  <option value="Humour">Humour</option>
                  <option value="Performance">Performance</option>
                </select>
              </label>
            </div>

            <label style="margin-top: 12px;">
              <small>Fiabilité</small>
              <select id="reliabilityInput" required>
                <option value="">-- Sélectionner --</option>
                <option value="Fiable">Fiable</option>
                <option value="Indéterminé">Indéterminé</option>
                <option value="Pas fiable">Pas fiable</option>
              </select>
            </label>
          </div>

          <!-- Contenus textuels -->
          <div class="form-section">
            <h3>Contenus pédagogiques</h3>

            <label>
              <small>3 Phrases</small>
              <textarea id="threePhrasesInput" rows="3" placeholder="Sujet et source. Si utile, date de publication et auteur.&#10;Affirmations principales. Si utile, structure et style.&#10;Motivation de l'évaluation."></textarea>
            </label>

            <label style="margin-top: 12px;">
              <small>Contexte</small>
              <textarea id="contextInput" rows="4" placeholder="Présenter le sujet avec le contexte général. Décrire la source et ses caractéristiques. Indiquer la date de publication et l'auteur."></textarea>
            </label>

            <label style="margin-top: 12px;">
              <small>Contenu</small>
              <textarea id="contentInput" rows="4" placeholder="Discuter le contenu et les affirmations principales. Analyser la façon dont le contenu est structuré et présenté."></textarea>
            </label>

            <label style="margin-top: 12px;">
              <small>Fiabilité (explication)</small>
              <textarea id="reliabilityTextInput" rows="4" placeholder="Expliquer pourquoi vous pensez qu'elle est fiable, pas fiable ou indéterminée."></textarea>
            </label>

            <label style="margin-top: 12px;">
              <small>Références</small>
              <textarea id="referencesInput" rows="4" placeholder="Fournir les moyens de vérifier vos arguments. Utilisez des hyperliens."></textarea>
            </label>
          </div>

          <div class="btn-row">
            <button class="btn" type="submit">Ajouter le lien</button>
            <button class="btn" type="button" id="resetBtn">Réinitialiser</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <script type="module">
    /* ============================
       Configuration
    ============================ */
    const API_BASE = "/api";

    const certsContent = document.getElementById("certsContent");

    const linkForm = document.getElementById("linkForm");
    const successMsg = document.getElementById("successMsg");
    const errorMsg = document.getElementById("errorMsg");
    const resetBtn = document.getElementById("resetBtn");

    /* ============================
       Authentification via JWT
    ============================ */
    const token = localStorage.getItem("tc_token");
    if (token) {
      certsContent.style.display = "block";
    } else {
      window.location.href = "/admin.html";
    }

    /* ============================
       Gestion du formulaire
    ============================ */
    function showSuccess(message) {
      successMsg.textContent = message;
      successMsg.style.display = "block";
      errorMsg.style.display = "none";
      setTimeout(() => {
        successMsg.style.display = "none";
      }, 5000);
    }

    function showError(message) {
      errorMsg.textContent = message;
      errorMsg.style.display = "block";
      successMsg.style.display = "none";
    }

    // Map reliability labels French → DB enum
    function reliabilityToEnum(val){
      if (!val) return "mid";
      const v = val.toLowerCase();
      if (v.includes("fiable") && !v.includes("pas")) return "good";
      if (v.includes("indéterminé") || v.includes("indetermine")) return "mid";
      if (v.includes("pas fiable")) return "bad";
      return "mid";
    }

    // Convert DD.MM.YYYY to YYYY-MM-DD for MySQL
    function toIsoDate(val) {
      if (!val) return "";
      const m = val.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
      if (m) return `${m[3]}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`;
      return val;
    }

    async function submitLink(data) {
      try {
        const payload = {
          title: data.title,
          url: data.url,
          expert: data.expert || null,
          cert_date: toIsoDate(data.date) || null,
          descriptor1: data.descriptor1 || null,
          descriptor2: data.descriptor2 || null,
          reliability: reliabilityToEnum(data.reliability),
          three_phrases: data.threePhrases || null,
          context: data.context || null,
          content: data.content || null,
          reliability_text: data.reliabilityText || null,
          references_text: data.references || null
        };

        const response = await fetch(`${API_BASE}/certs/save.php`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (result.error) {
          showError(result.error);
        } else {
          showSuccess("CERT ajouté avec succès !");
          linkForm.reset();
        }
      } catch (error) {
        showError("Erreur lors de l'ajout : " + error.message);
      }
    }

    linkForm.addEventListener("submit", (e) => {
      e.preventDefault();

      const data = {
        title: document.getElementById("titleInput").value.trim(),
        url: document.getElementById("urlInput").value.trim(),
        expert: document.getElementById("expertInput").value.trim(),
        date: document.getElementById("dateInput").value,
        descriptor1: document.getElementById("descriptor1Input").value,
        descriptor2: document.getElementById("descriptor2Input").value,
        reliability: document.getElementById("reliabilityInput").value,
        threePhrases: document.getElementById("threePhrasesInput").value.trim(),
        context: document.getElementById("contextInput").value.trim(),
        content: document.getElementById("contentInput").value.trim(),
        reliabilityText: document.getElementById("reliabilityTextInput").value.trim(),
        references: document.getElementById("referencesInput").value.trim()
      };

      submitLink(data);
    });

    resetBtn.addEventListener("click", () => {
      linkForm.reset();
      successMsg.style.display = "none";
      errorMsg.style.display = "none";
    });

    /* ============================
       Word (.docx) import
    ============================ */
    const importZone = document.getElementById("importZone");
    const importFile = document.getElementById("importFile");
    const importStatus = document.getElementById("importStatus");

    importZone.addEventListener("click", () => importFile.click());
    importZone.addEventListener("dragover", (e) => { e.preventDefault(); importZone.classList.add("dragover"); });
    importZone.addEventListener("dragleave", () => importZone.classList.remove("dragover"));
    importZone.addEventListener("drop", (e) => {
      e.preventDefault();
      importZone.classList.remove("dragover");
      const file = e.dataTransfer?.files?.[0];
      if (file) processDocx(file);
    });
    importFile.addEventListener("change", () => {
      const file = importFile.files?.[0];
      if (file) processDocx(file);
    });

    async function processDocx(file) {
      if (!file.name.endsWith(".docx")) {
        importStatus.textContent = "Fichier non supporté. Utilisez un .docx.";
        importStatus.className = "import-status err";
        return;
      }

      importStatus.textContent = "Lecture du fichier...";
      importStatus.className = "import-status";

      try {
        const zip = await JSZip.loadAsync(file);
        const xmlText = await zip.file("word/document.xml").async("text");
        const parsed = parseDocxXml(xmlText);
        fillForm(parsed);

        importStatus.textContent = `Import réussi : "${parsed.title || '(sans titre)'}"`;
        importStatus.className = "import-status ok";
      } catch (err) {
        console.error("Import error:", err);
        importStatus.textContent = "Erreur lors de l'import : " + err.message;
        importStatus.className = "import-status err";
      }
    }

    function parseDocxXml(xml) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(xml, "application/xml");
      const ns = "http://schemas.openxmlformats.org/wordprocessingml/2006/main";
      const paragraphs = doc.getElementsByTagNameNS(ns, "p");

      // Extract text + metadata from each paragraph
      const paras = [];
      for (const p of paragraphs) {
        const runs = p.getElementsByTagNameNS(ns, "r");
        let text = "";
        let isBoldGray = false;
        let isBlue = false;
        let hasRed = false;
        let hasGreen = false;
        let hasOrange = false;

        for (const r of runs) {
          const tNodes = r.getElementsByTagNameNS(ns, "t");
          for (const t of tNodes) text += t.textContent || "";

          // Check formatting
          const rPr = r.getElementsByTagNameNS(ns, "rPr")[0];
          if (rPr) {
            const color = rPr.getElementsByTagNameNS(ns, "color")[0];
            const bold = rPr.getElementsByTagNameNS(ns, "b")[0];
            const colorVal = color?.getAttribute("w:val")?.toUpperCase() || "";

            if (colorVal === "A5A5A5" && bold) isBoldGray = true;
            if (colorVal === "0096FF" || colorVal === "2E74B5") isBlue = true;
            if (colorVal === "FF0000" || colorVal === "EF596F") hasRed = true;
            if (colorVal === "00B050") hasGreen = true;
            if (colorVal === "F79646") hasOrange = true;
          }
        }

        text = text.replace(/\s+/g, " ").trim();
        if (text || isBoldGray) {
          paras.push({ text, isBoldGray, isBlue, hasRed, hasGreen, hasOrange });
        }
      }

      // Split into sections by bold-gray headings
      const sections = {};
      let currentSection = "_header";
      sections._header = [];

      for (const p of paras) {
        if (p.isBoldGray && p.text) {
          currentSection = p.text.toLowerCase().trim();
          if (!sections[currentSection]) sections[currentSection] = [];
        } else {
          if (!sections[currentSection]) sections[currentSection] = [];
          sections[currentSection].push(p);
        }
      }

      // Extract fields
      const header = sections._header || [];

      // Title = first blue line
      const title = header.find(p => p.isBlue)?.text || "";

      // URL = first line that looks like a URL
      const urlPara = header.find(p => /^https?:\/\//.test(p.text));
      const url = urlPara?.text || "";

      // Expert name (line starting with "Expert :")
      const expertPara = header.find(p => /^expert\s*:/i.test(p.text));
      const expert = expertPara?.text.replace(/^expert\s*:\s*/i, "").trim() || "";

      // Certification date
      const datePara = header.find(p => /certification date/i.test(p.text));
      let date = "";
      if (datePara) {
        const raw = datePara.text.replace(/^.*?:\s*/i, "").trim();
        const d = new Date(raw);
        if (!isNaN(d)) date = String(d.getDate()).padStart(2, "0") + "." + String(d.getMonth() + 1).padStart(2, "0") + "." + d.getFullYear();
      }

      // Descriptors
      const descParas = sections["descriptors"] || [];
      const descText = descParas.map(p => p.text).join(" ").trim();
      const descWords = descText.split(/\s+/).filter(Boolean);
      const descriptor1 = descWords[0] || "";
      const descriptor2 = descWords[1] || "";

      // 3-Pointer
      const pointerParas = sections["3-pointer"] || [];
      const threePhrases = pointerParas.map(p => p.text).filter(Boolean).join("\n");

      // CCR
      const ccrParas = sections["ccr"] || [];
      const ccrTexts = ccrParas.map(p => p.text).filter(Boolean);
      const context = ccrTexts[0] || "";
      const content = ccrTexts.join("\n");
      const reliabilityText = ccrTexts[ccrTexts.length - 1] || "";

      // References
      const refParas = sections["references"] || [];
      const references = refParas
        .map(p => p.text.replace(/^[•·\-–—]\s*/, "").trim())
        .filter(Boolean)
        .join("\n");

      // Label / reliability
      const labelParas = sections["label"] || [];
      let reliability = "";
      for (const p of labelParas) {
        const t = p.text.toLowerCase();
        if (p.hasRed || t.includes("unreliable") || t.includes("pas fiable")) {
          reliability = "Pas fiable";
        } else if (p.hasOrange || t.includes("undetermined") || t.includes("indéterminé")) {
          reliability = "Indéterminé";
        } else if (p.hasGreen || t.includes("reliable") || t.includes("fiable")) {
          reliability = "Fiable";
        }
      }

      return { title, url, expert, date, descriptor1, descriptor2, reliability, threePhrases, context, content, reliabilityText, references };
    }

    function fillForm(data) {
      document.getElementById("titleInput").value = data.title || "";
      document.getElementById("urlInput").value = data.url || "";
      document.getElementById("expertInput").value = data.expert || "";
      document.getElementById("dateInput").value = data.date || "";
      document.getElementById("threePhrasesInput").value = data.threePhrases || "";
      document.getElementById("contextInput").value = data.context || "";
      document.getElementById("contentInput").value = data.content || "";
      document.getElementById("reliabilityTextInput").value = data.reliabilityText || "";
      document.getElementById("referencesInput").value = data.references || "";

      // Set selects if value matches an option
      setSelectIfValid("descriptor1Input", data.descriptor1);
      setSelectIfValid("descriptor2Input", data.descriptor2);
      setSelectIfValid("reliabilityInput", data.reliability);
    }

    function setSelectIfValid(id, value) {
      const el = document.getElementById(id);
      if (!el || !value) return;
      for (const opt of el.options) {
        if (opt.value.toLowerCase() === value.toLowerCase()) {
          el.value = opt.value;
          return;
        }
      }
    }
  </script>
</body>
</html>
