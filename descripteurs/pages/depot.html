<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
  <meta name="copyright" content="&copy; 2026 Certify Community SA. Tous droits r&eacute;serv&eacute;s." />
  <title>Stock de CERTs</title>

  <link rel="stylesheet" href="/descripteurs/assets/css/main.css" />

  <style>
    .page-lead {
      margin: 8px 0 14px 0;
      color: var(--muted);
      max-width: 900px;
    }

    /* Toolbar */
    .depot-toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 16px;
    }

    .depot-toolbar input[type="search"] {
      flex: 1 1 220px;
      min-width: 180px;
    }

    .search-box {
      flex: 1 1 220px;
      min-width: 180px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      padding: 6px 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.95);
      cursor: text;
      transition: border-color .15s, box-shadow .15s;
    }

    .search-box:focus-within {
      border-color: rgba(111,92,247,.45);
      box-shadow: var(--ring);
    }

    .search-box input {
      flex: 1 1 100px;
      border: none;
      outline: none;
      background: transparent;
      font-size: .88rem;
      color: var(--text);
      padding: 4px 0;
      min-width: 80px;
    }

    .search-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 6px 4px 10px;
      border-radius: 7px;
      background: rgba(111,92,247,.15);
      border: 1px solid rgba(111,92,247,.35);
      color: #4338ca;
      font-size: .8rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .search-chip button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      background: rgba(111,92,247,.12);
      border: none;
      cursor: pointer;
      color: rgba(111,92,247,.6);
      font-size: .9rem;
      line-height: 1;
      padding: 0;
      border-radius: 50%;
      transition: color .15s, background .15s;
    }

    .search-chip button:hover {
      color: #fff;
      background: #b91c1c;
    }

    .depot-toolbar select {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.95);
      color: var(--text);
      outline: none;
      font-size: .88rem;
    }

    .depot-toolbar select:focus {
      border-color: rgba(111,92,247,.45);
      box-shadow: var(--ring);
    }

    /* Grid */
    .depot-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .depot-card {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 16px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 2px 8px rgba(16,24,40,.05);
      transition: border-color .15s, box-shadow .15s;
    }

    .depot-card:hover {
      border-color: rgba(111,92,247,.3);
      box-shadow: 0 4px 16px rgba(111,92,247,.08);
    }

    .depot-card.is-selected {
      border-color: var(--accent);
      background: rgba(111,92,247,.04);
    }

    .depot-check {
      margin-top: 3px;
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      display: none;
    }

    .depot-card.show-check .depot-check {
      display: block;
    }

    .depot-body {
      flex: 1;
      min-width: 0;
    }

    .depot-title {
      font-weight: 700;
      font-size: .95rem;
      color: var(--text);
      line-height: 1.3;
    }

    .depot-title a {
      color: var(--text);
      text-decoration: none;
    }

    .depot-title a:hover {
      color: var(--accent);
    }

    .depot-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 6px;
      font-size: .78rem;
      color: var(--muted);
    }

    .depot-tag {
      padding: 2px 8px;
      border-radius: 6px;
      font-weight: 600;
      font-size: .75rem;
    }

    .depot-tag.rel-good {
      background: var(--rel-good-bg);
      border: 1px solid var(--rel-good-border);
      color: #166534;
    }

    .depot-tag.rel-mid {
      background: var(--rel-mid-bg);
      border: 1px solid var(--rel-mid-border);
      color: #9a3412;
    }

    .depot-tag.rel-bad {
      background: var(--rel-bad-bg);
      border: 1px solid var(--rel-bad-border);
      color: #991b1b;
    }

    .depot-tag.desc-tag {
      background: rgba(111,92,247,.08);
      border: 1px solid rgba(111,92,247,.2);
      color: var(--text);
    }

    .depot-tag.teacher-tag {
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .depot-tag.mine-tag {
      background: rgba(111,92,247,.12);
      border: 1px solid rgba(111,92,247,.3);
      color: var(--accent);
      font-weight: 700;
    }

    .depot-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .depot-actions button {
      background: none;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 4px 12px;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--muted);
      transition: all .15s;
    }

    .depot-actions button:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(111,92,247,.05);
    }

    .depot-actions button.btn-del:hover {
      border-color: rgba(239,68,68,.4);
      color: #b91c1c;
      background: rgba(239,68,68,.05);
    }

    .depot-edit-form {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .depot-edit-form label {
      font-size: .78rem;
      font-weight: 600;
      color: var(--muted);
    }

    .depot-edit-form input,
    .depot-edit-form textarea,
    .depot-edit-form select {
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: .85rem;
      background: var(--panel);
      color: var(--text);
      outline: none;
    }

    .depot-edit-form textarea {
      resize: vertical;
      min-height: 50px;
    }

    .depot-edit-form input:focus,
    .depot-edit-form textarea:focus,
    .depot-edit-form select:focus {
      border-color: rgba(111,92,247,.45);
    }

    .depot-edit-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .depot-edit-actions button {
      padding: 7px 16px;
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--panel);
      transition: all .15s;
    }

    .depot-edit-actions .btn-save {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .depot-edit-actions .btn-save:hover { background: var(--accent-hover, #5a48e0); }

    .depot-detail {
      margin-top: 8px;
      font-size: .82rem;
      color: var(--muted);
      line-height: 1.45;
      display: none;
    }

    .depot-card.is-expanded .depot-detail {
      display: block;
    }

    .depot-toggle {
      flex-shrink: 0;
      cursor: pointer;
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 1.1rem;
      padding: 6px 10px;
      border-radius: 8px;
      line-height: 1;
    }

    .depot-toggle:hover {
      background: rgba(111,92,247,.08);
      color: var(--accent);
    }

    /* Session bar */
    .session-bar {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--panel);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(111,92,247,.1);
    }

    .session-bar.is-active {
      display: flex;
    }

    .session-bar-info {
      flex: 1;
      font-size: .88rem;
      font-weight: 600;
    }

    .session-bar-count {
      font-size: .82rem;
      color: var(--muted);
      font-weight: 600;
    }

    .empty-msg {
      color: var(--muted);
      font-size: .88rem;
      padding: 28px 14px;
      text-align: center;
    }

    .depot-count {
      font-size: .82rem;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* Review-request tags + banner + modals */
    .depot-tag.review-pending {
      background: rgba(111,92,247,.12);
      border: 1px solid rgba(111,92,247,.35);
      color: var(--accent);
    }
    .depot-tag.review-done {
      background: var(--accent);
      border: 1px solid var(--accent);
      color: #fff;
    }
    .depot-tag.review-returned {
      background: rgba(245,158,11,.15);
      border: 1px solid rgba(245,158,11,.35);
      color: #92400e;
    }

    .review-banner {
      display: none;
      padding: 12px 16px;
      background: rgba(111,92,247,.06);
      border: 1px solid rgba(111,92,247,.25);
      border-radius: 10px;
      margin-bottom: 14px;
    }
    .review-banner.is-active { display: block; }
    .review-banner-title {
      font-size: .88rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .review-banner-item {
      padding: 8px 0;
      border-top: 1px dashed rgba(111,92,247,.2);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: .85rem;
    }
    .review-banner-item:first-of-type { border-top: none; }
    .review-banner-item-body { flex: 1; min-width: 0; }
    .review-banner-item-title { font-weight: 700; color: var(--text); }
    .review-banner-item-sub { font-size: .78rem; color: var(--muted); margin-top: 2px; }
    .review-banner-item button {
      padding: 5px 10px;
      border: 1px solid rgba(111,92,247,.3);
      background: var(--panel);
      color: var(--accent);
      border-radius: 7px;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
    }
    .review-banner-item button:hover { background: rgba(111,92,247,.08); }

    .tc-modal {
      position: fixed; inset: 0; z-index: 200;
      display: none; align-items: center; justify-content: center;
      background: rgba(0,0,0,.35); backdrop-filter: blur(4px);
    }
    .tc-modal.is-open { display: flex; }
    .tc-modal-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      max-width: 460px;
      width: 90%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .tc-modal-card h3 { font-size: 1rem; font-weight: 700; }
    .tc-modal-card label {
      font-size: .82rem;
      font-weight: 600;
      color: var(--muted);
      display: block;
      margin-bottom: 4px;
    }
    .tc-modal-card select,
    .tc-modal-card textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: .9rem;
      background: var(--panel);
      color: var(--text);
      outline: none;
      font-family: inherit;
    }
    .tc-modal-card textarea { resize: vertical; min-height: 80px; }
    .tc-modal-card .modal-body-text {
      font-size: .88rem;
      color: var(--text);
      white-space: pre-wrap;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .tc-modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
    .tc-modal-actions button {
      padding: 8px 14px;
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--panel);
    }
    .tc-modal-actions .btn-primary-m {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .tc-modal-actions .btn-primary-m:hover { background: var(--accent-hover, #5a48e0); }

    #depotContent { display: none; }

    @media (max-width: 500px) {
      .depot-meta span:not(.depot-tag) { display: none; }
    }
  </style>
</head>

<body>
  <header>
    <nav style="display:flex;align-items:center;gap:12px;">
      <span style="font-size:1.2rem;font-weight:900;letter-spacing:-0.02em;color:var(--accent);">toutcuit</span>
      <span style="font-size:1.2rem;color:var(--border);">/</span>
      <a href="/expert.html" style="font-size:0.95rem;color:var(--muted);text-decoration:none;font-weight:700;padding:0;margin:0;">Expert</a>
      <span style="font-size:1.2rem;color:var(--border);">/</span>
      <span style="font-size:0.95rem;color:var(--muted);font-weight:700;">Stock de CERTs</span>
      <span style="flex:1;"></span>
      <span id="userName" style="font-size:.82rem;color:var(--muted);"></span>
      <button id="logoutBtn" style="font-size:.82rem;color:var(--accent);cursor:pointer;border:none;background:none;font-weight:600;">Déconnexion</button>
    </nav>
  </header>

  <main>
    <section id="depotContent">
      <h1>Stock de CERTs</h1>
      <p class="page-lead">
        Toutes les certifications déposées par les enseignants. Sélectionnez une séance pour y ajouter des CERTs.
      </p>

      <!-- Session selector -->
      <div class="depot-toolbar">
        <div class="search-box" id="searchBox">
          <input type="text" id="searchInput" placeholder="Rechercher par titre, descripteur..." />
        </div>

        <select id="filterReliability">
          <option value="">Fiabilité</option>
          <option value="good">Fiable</option>
          <option value="mid">Indéterminé</option>
          <option value="bad">Pas fiable</option>
        </select>

        <select id="sessionSelect">
          <option value="">-- Associer à une séance --</option>
        </select>
      </div>

      <!-- Session action bar -->
      <div class="session-bar" id="sessionBar">
        <div class="session-bar-info">
          Seance : <span id="sessionBarName"></span>
        </div>
        <div class="session-bar-count" id="sessionBarCount">0 selectionne(s)</div>
        <button class="btn" id="saveSessionBtn">Enregistrer</button>
      </div>

      <div class="review-banner" id="reviewBanner"></div>
      <div class="depot-count" id="depotCount"></div>
      <div class="depot-grid" id="depotGrid"></div>
    </section>
  </main>

  <!-- Modal: request or reassign an editor review -->
  <div class="tc-modal" id="reviewModal">
    <div class="tc-modal-card">
      <h3 id="reviewModalTitle">Envoyer en édition</h3>
      <div>
        <label for="reviewEditorSelect">Éditeur·ice</label>
        <select id="reviewEditorSelect"></select>
      </div>
      <div id="reviewNoteField">
        <label for="reviewNoteInput">Message (facultatif)</label>
        <textarea id="reviewNoteInput" placeholder="Ce que tu aimerais que l'éditeur·ice regarde en priorité…"></textarea>
      </div>
      <div class="tc-modal-actions">
        <button type="button" onclick="closeReviewModal()">Annuler</button>
        <button type="button" class="btn-primary-m" id="reviewModalSubmit">Envoyer</button>
      </div>
    </div>
  </div>

  <!-- Modal: view the editor's returned comment -->
  <div class="tc-modal" id="returnedModal">
    <div class="tc-modal-card">
      <h3 id="returnedModalTitle">Retour de l'éditeur·ice</h3>
      <div class="modal-body-text" id="returnedModalBody"></div>
      <div class="tc-modal-actions">
        <button type="button" onclick="closeReturnedModal()">Fermer</button>
        <button type="button" class="btn-primary-m" id="returnedModalResend">Re-demander une édition</button>
      </div>
    </div>
  </div>

  <script type="module">
    const API = "/api";
    const token = localStorage.getItem("tc_token");
    if (!token) {
      window.location.href = "/expert.html";
    }

    try {
      const t = JSON.parse(localStorage.getItem("tc_teacher"));
      if (t?.name) document.getElementById("userName").textContent = t.name;
    } catch {}
    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("tc_token");
      localStorage.removeItem("tc_teacher");
      window.location.href = "/expert.html";
    });

    const depotContent = document.getElementById("depotContent");
    const searchBox = document.getElementById("searchBox");
    const searchInput = document.getElementById("searchInput");
    const filterReliability = document.getElementById("filterReliability");

    let searchTerms = [];
    const sessionSelect = document.getElementById("sessionSelect");
    const sessionBar = document.getElementById("sessionBar");
    const sessionBarName = document.getElementById("sessionBarName");
    const sessionBarCount = document.getElementById("sessionBarCount");
    const saveSessionBtn = document.getElementById("saveSessionBtn");
    const depotGrid = document.getElementById("depotGrid");
    const depotCount = document.getElementById("depotCount");

    const REL_LABEL = { good: "Fiable", mid: "Indéterminé", bad: "Pas fiable" };
    const REL_CLASS = { good: "rel-good", mid: "rel-mid", bad: "rel-bad" };

    let allCerts = [];
    let sessions = [];
    let assignedIds = new Set();
    let activeSessionId = null;
    let activeSessionCode = null;
    let editors = [];
    let notifications = [];

    const REVIEW_STATUS_LABEL = {
      pending: "En attente d'édition",
      done: "Éditée",
      returned: "Retournée",
    };

    function reviewBadgeLabel(c) {
      if (!c.review_status) return "";
      if (c.review_status === "pending" && c.review_editor_name) {
        return `En attente d'édition → ${c.review_editor_name}`;
      }
      if (c.review_status === "returned" && c.review_editor_name) {
        return `Retournée par ${c.review_editor_name}`;
      }
      return REVIEW_STATUS_LABEL[c.review_status] || "";
    }

    function reviewActionLabel(c) {
      if (c.review_status === "pending") return "Changer d'éditeur·ice";
      if (c.review_status === "returned") return "Voir le retour";
      return "Envoyer en édition";
    }

    function esc(s) {
      return String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    // Load data
    async function init() {
      try {
        const auth = { headers: { Authorization: `Bearer ${token}` } };
        const [certsRes, sessionsRes, editorsRes, notifsRes] = await Promise.all([
          fetch(`${API}/certs/list.php`, auth),
          fetch(`${API}/sessions/list.php`, auth),
          fetch(`${API}/teachers/editors.php`, auth),
          fetch(`${API}/certs/my-review-notifications.php`, auth),
        ]);

        allCerts = await certsRes.json();
        sessions = await sessionsRes.json();
        editors = await editorsRes.json().catch(() => []);
        notifications = await notifsRes.json().catch(() => []);

        if (!Array.isArray(allCerts)) allCerts = [];
        if (!Array.isArray(sessions)) sessions = [];
        if (!Array.isArray(editors)) editors = [];
        if (!Array.isArray(notifications)) notifications = [];

        // Populate session dropdown
        sessions.forEach(s => {
          const opt = document.createElement("option");
          opt.value = s.id;
          opt.dataset.code = s.code;
          opt.textContent = `${s.school_name || ""} — ${s.name} (${s.code})`;
          sessionSelect.appendChild(opt);
        });

        // Populate editor dropdown (used by the review modal)
        const editorSelect = document.getElementById("reviewEditorSelect");
        editorSelect.innerHTML = editors.map(e =>
          `<option value="${e.id}">${esc(e.name)}</option>`
        ).join("");

        depotContent.style.display = "block";
        renderReviewBanner();
        render();
      } catch (err) {
        depotContent.style.display = "block";
        depotGrid.innerHTML = `<div class="empty-msg">Erreur : ${esc(err.message)}</div>`;
      }
    }

    function renderReviewBanner() {
      const banner = document.getElementById("reviewBanner");
      if (!notifications.length) {
        banner.classList.remove("is-active");
        banner.innerHTML = "";
        return;
      }
      const items = notifications.map(n => {
        const statusText = `Retournée par ${esc(n.editor_name || "")}`;
        return `
          <div class="review-banner-item">
            <div class="review-banner-item-body">
              <div class="review-banner-item-title">${esc(n.cert_title || "")}</div>
              <div class="review-banner-item-sub">${statusText}</div>
            </div>
            <button onclick="openNotification(${n.cert_id}, '${n.status}')">Voir</button>
          </div>`;
      }).join("");
      const label = notifications.length > 1
        ? `${notifications.length} CERTs renvoyées par l'éditeur·ice`
        : `1 CERT renvoyée par l'éditeur·ice`;
      banner.innerHTML = `
        <div class="review-banner-title">${label}</div>
        ${items}
      `;
      banner.classList.add("is-active");
    }

    // Filter + render
    function render() {
      const relFilter = filterReliability.value;

      const filtered = allCerts.filter(c => {
        if (relFilter && c.reliability !== relFilter) return false;
        if (searchTerms.length) {
          const haystack = [c.title, c.descriptor1, c.descriptor2, c.teacher_name, c.expert]
            .filter(Boolean).join(" ").toLowerCase();
          if (!searchTerms.every(t => haystack.includes(t))) return false;
        }
        return true;
      });

      depotCount.textContent = `${filtered.length} certification${filtered.length !== 1 ? "s" : ""} sur ${allCerts.length}`;

      if (!filtered.length) {
        depotGrid.innerHTML = `<div class="empty-msg">Aucune certification trouvee.</div>`;
        return;
      }

      depotGrid.innerHTML = filtered.map(c => {
        const checked = assignedIds.has(c.id);
        const showCheck = activeSessionId !== null;
        return `
          <div class="depot-card ${showCheck ? "show-check" : ""} ${checked ? "is-selected" : ""}" data-id="${c.id}">
            <input type="checkbox" class="depot-check" value="${c.id}" ${checked ? "checked" : ""} />
            <div class="depot-body">
              <div class="depot-title">
                <a href="${esc(c.url)}" target="_blank" rel="noopener">${esc(c.title)}</a>
              </div>
              <div class="depot-meta">
                ${c.descriptor1 ? `<span class="depot-tag ${REL_CLASS[c.reliability] || "desc-tag"}">${esc(c.descriptor1)}</span>` : ""}
                ${c.descriptor2 ? `<span class="depot-tag ${REL_CLASS[c.reliability] || "desc-tag"}">${esc(c.descriptor2)}</span>` : ""}
                <span class="depot-tag teacher-tag">${esc(c.teacher_name)}</span>
                ${c.is_mine ? '<span class="depot-tag mine-tag">Ma CERT</span>' : ""}
                ${c.is_mine && c.review_status ? `<span class="depot-tag review-${esc(c.review_status)}">${esc(reviewBadgeLabel(c))}</span>` : ""}
              </div>
              <div class="depot-detail">
                ${c.expert || c.cert_date ? `<p>${c.expert ? `<strong>${esc(c.expert)}</strong>` : ""}${c.expert && c.cert_date ? ` — ` : ""}${c.cert_date ? `${esc(c.cert_date)}` : ""}</p>` : ""}
                ${c.url ? `<p><a href="${esc(c.url)}" target="_blank" rel="noopener" style="color:var(--accent);word-break:break-all;">${esc(c.url)}</a></p>` : ""}
                ${c.three_phrases ? `<ul style="margin:6px 0;padding-left:18px;">${esc(c.three_phrases).split(/[\n;]+/).filter(s => s.trim()).map(s => `<li>${s.trim()}</li>`).join("")}</ul>` : ""}
                ${c.context ? `<p>${esc(c.context)}</p>` : ""}
                ${c.content ? `<p>${esc(c.content)}</p>` : ""}
                ${c.reliability_text ? `<p>${esc(c.reliability_text)}</p>` : ""}
                ${c.references_text ? `<ol style="margin:6px 0;padding-left:22px;">${esc(c.references_text).split(/[\n;]+/).filter(s => s.trim()).map(s => `<li>${s.trim()}</li>`).join("")}</ol>` : ""}
                ${c.is_mine ? `<div class="depot-actions">
                  <button onclick="editCert(${c.id})">Modifier</button>
                  <button onclick="downloadCertRtf(${c.id})">Télécharger .rtf</button>
                  <button onclick="openReviewModal(${c.id})">${esc(reviewActionLabel(c))}</button>
                  <button class="btn-del" onclick="deleteCert(${c.id}, this)">Supprimer</button>
                </div>
                <div class="depot-edit-form" id="edit-${c.id}" style="display:none;"></div>` : ""}
              </div>
            </div>
            <button class="depot-toggle" title="Details">&#9662;</button>
          </div>
        `;
      }).join("");

      // Attach events
      depotGrid.querySelectorAll(".depot-toggle").forEach(btn => {
        btn.addEventListener("click", () => {
          btn.closest(".depot-card").classList.toggle("is-expanded");
          btn.textContent = btn.closest(".depot-card").classList.contains("is-expanded") ? "\u25B4" : "\u25BE";
        });
      });

      depotGrid.querySelectorAll(".depot-check").forEach(cb => {
        cb.addEventListener("change", () => {
          const id = parseInt(cb.value);
          const card = cb.closest(".depot-card");
          if (cb.checked) {
            assignedIds.add(id);
            card.classList.add("is-selected");
          } else {
            assignedIds.delete(id);
            card.classList.remove("is-selected");
          }
          updateSessionCount();
        });
      });
    }

    function updateSessionCount() {
      sessionBarCount.textContent = `${assignedIds.size} selectionne(s)`;
    }

    // Session change
    sessionSelect.addEventListener("change", async () => {
      const opt = sessionSelect.selectedOptions[0];
      activeSessionId = sessionSelect.value ? parseInt(sessionSelect.value) : null;
      activeSessionCode = opt?.dataset.code || null;

      if (activeSessionId) {
        sessionBarName.textContent = opt.textContent;
        sessionBar.classList.add("is-active");

        // Load assigned CERTs for this session
        try {
          const res = await fetch(`${API}/sessions/certs.php?session=${encodeURIComponent(activeSessionCode)}`);
          const assigned = await res.json();
          assignedIds = new Set((Array.isArray(assigned) ? assigned : []).map(c => c.id));
        } catch {
          assignedIds = new Set();
        }
        updateSessionCount();
      } else {
        sessionBar.classList.remove("is-active");
        assignedIds = new Set();
        activeSessionId = null;
        activeSessionCode = null;
      }

      render();
    });

    // Save
    saveSessionBtn.addEventListener("click", async () => {
      if (!activeSessionId) return;

      try {
        const res = await fetch(`${API}/sessions/certs.php`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`
          },
          body: JSON.stringify({
            session_id: activeSessionId,
            certs: [...assignedIds]
          })
        });

        const result = await res.json();
        if (result.error) {
          alert("Erreur : " + result.error);
        } else {
          alert(`${result.count} CERT(s) associe(s) a la seance.`);
        }
      } catch (err) {
        alert("Erreur : " + err.message);
      }
    });

    // Search chips
    function addSearchTerm(term) {
      term = term.trim().toLowerCase();
      if (!term || searchTerms.includes(term)) return;
      searchTerms.push(term);
      renderChips();
      render();
    }

    function removeSearchTerm(term) {
      searchTerms = searchTerms.filter(t => t !== term);
      renderChips();
      render();
    }

    function renderChips() {
      searchBox.querySelectorAll(".search-chip").forEach(el => el.remove());
      searchTerms.forEach(term => {
        const chip = document.createElement("span");
        chip.className = "search-chip";
        chip.innerHTML = `${esc(term)}<button title="Supprimer">&times;</button>`;
        chip.querySelector("button").addEventListener("click", () => removeSearchTerm(term));
        searchBox.insertBefore(chip, searchInput);
      });
      searchInput.placeholder = searchTerms.length ? "Ajouter un critère..." : "Rechercher par titre, descripteur...";
    }

    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        addSearchTerm(searchInput.value);
        searchInput.value = "";
      }
      if (e.key === "Backspace" && !searchInput.value && searchTerms.length) {
        removeSearchTerm(searchTerms[searchTerms.length - 1]);
      }
    });

    searchBox.addEventListener("click", () => searchInput.focus());

    // Filters
    filterReliability.addEventListener("change", render);

    // Edit CERT
    window.editCert = function(id) {
      const form = document.getElementById(`edit-${id}`);
      if (!form) return;
      if (form.style.display === "flex") { form.style.display = "none"; return; }

      const c = allCerts.find(x => x.id === id);
      if (!c) return;

      form.style.display = "flex";
      form.innerHTML = `
        <label>Titre</label>
        <input type="text" data-field="title" value="${esc(c.title)}" />
        <label>URL</label>
        <input type="text" data-field="url" value="${esc(c.url)}" />
        <label>Expert</label>
        <input type="text" data-field="expert" value="${esc(c.expert || "")}" />
        <label>Date (JJ.MM.AAAA)</label>
        <input type="text" data-field="cert_date" value="${esc(c.cert_date || "")}" />
        <label>Descripteur 1</label>
        <input type="text" data-field="descriptor1" value="${esc(c.descriptor1 || "")}" />
        <label>Descripteur 2</label>
        <input type="text" data-field="descriptor2" value="${esc(c.descriptor2 || "")}" />
        <label>Fiabilité</label>
        <select data-field="reliability">
          <option value="good" ${c.reliability === "good" ? "selected" : ""}>Fiable</option>
          <option value="mid" ${c.reliability === "mid" ? "selected" : ""}>Indéterminé</option>
          <option value="bad" ${c.reliability === "bad" ? "selected" : ""}>Pas fiable</option>
        </select>
        <label>3 phrases</label>
        <textarea data-field="three_phrases" rows="2">${esc(c.three_phrases || "")}</textarea>
        <label>Contexte</label>
        <textarea data-field="context" rows="2">${esc(c.context || "")}</textarea>
        <label>Fiabilité (explication)</label>
        <textarea data-field="reliability_text" rows="2">${esc(c.reliability_text || "")}</textarea>
        <label>Références</label>
        <textarea data-field="references_text" rows="2">${esc(c.references_text || "")}</textarea>
        <div class="depot-edit-actions">
          <button class="btn-save" onclick="saveCert(${id})">Enregistrer</button>
          <button onclick="document.getElementById('edit-${id}').style.display='none'">Annuler</button>
        </div>
      `;
    };

    // Save edited CERT
    window.saveCert = async function(id) {
      const form = document.getElementById(`edit-${id}`);
      if (!form) return;

      const payload = { id };
      form.querySelectorAll("[data-field]").forEach(el => {
        payload[el.dataset.field] = el.value;
      });

      // Convert date format
      const dateVal = payload.cert_date || "";
      const dm = dateVal.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
      if (dm) payload.cert_date = `${dm[3]}-${dm[2].padStart(2,"0")}-${dm[1].padStart(2,"0")}`;

      try {
        const res = await fetch(`${API}/certs/save.php`, {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
          body: JSON.stringify(payload)
        });
        const result = await res.json();
        if (result.error) return alert("Erreur : " + result.error);

        // Update local data
        const c = allCerts.find(x => x.id === id);
        if (c) {
          form.querySelectorAll("[data-field]").forEach(el => { c[el.dataset.field] = el.value; });
        }
        form.style.display = "none";
        render();
      } catch (err) {
        alert("Erreur : " + err.message);
      }
    };

    // Delete CERT
    window.deleteCert = async function(id) {
      try {
        // Check for student responses first
        const checkRes = await fetch(`${API}/certs/check-delete.php`, {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
          body: JSON.stringify({ id })
        });
        const checkData = await checkRes.json();
        const count = checkData.student_responses || 0;

        let msg = "Supprimer cette CERT ? Cette action est irréversible.";
        if (count > 0) {
          msg = `Attention : il y a ${count} résultat${count > 1 ? "s" : ""} d'élèves associé${count > 1 ? "s" : ""} à cette CERT, ils seront effacés.\n\nSupprimer cette CERT ? Cette action est irréversible.`;
        }
        if (!confirm(msg)) return;

        const res = await fetch(`${API}/certs/delete.php`, {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
          body: JSON.stringify({ id })
        });
        const result = await res.json();
        if (result.error) return alert("Erreur : " + result.error);

        allCerts = allCerts.filter(c => c.id !== id);
        assignedIds.delete(id);
        render();
      } catch (err) {
        alert("Erreur : " + err.message);
      }
    };

    /* ============================
       RTF export (Ma CERT only — same format as /review and /certs)
    ============================ */
    function rtfEscape(str) {
      let out = "";
      for (const ch of String(str)) {
        const code = ch.codePointAt(0);
        if (ch === "\\" || ch === "{" || ch === "}") {
          out += "\\" + ch;
        } else if (code === 0x0A) {
          out += "\\line ";
        } else if (code < 128) {
          out += ch;
        } else if (code <= 0xFFFF) {
          const signed = code > 32767 ? code - 65536 : code;
          out += "\\u" + signed + "?";
        } else {
          const cp = code - 0x10000;
          const hi = 0xD800 + (cp >> 10);
          const lo = 0xDC00 + (cp & 0x3FF);
          out += "\\u" + (hi > 32767 ? hi - 65536 : hi) + "?";
          out += "\\u" + (lo > 32767 ? lo - 65536 : lo) + "?";
        }
      }
      return out;
    }

    function buildCertRtf(data) {
      const escR = rtfEscape;
      const bold = (t) => "{\\b " + escR(t) + "}";
      const line = (label, val) => bold(label) + " : " + escR(val || "") + "\\par\n";
      const block = (label, val) => {
        let s = bold(label) + " :\\par\n";
        const text = String(val || "");
        if (text) s += escR(text) + "\\par\n";
        else s += "\\par\n";
        return s + "\\par\n";
      };
      let body = "";
      body += line("Titre", data.title);
      body += line("URL", data.url);
      body += line("Expert", data.expert);
      body += line("Date", data.date);
      body += line("Descripteur 1", data.descriptor1);
      body += line("Descripteur 2", data.descriptor2);
      body += line("Fiabilité", data.reliability);
      body += "\\par\n";
      body += block("3 phrases", data.threePhrases);
      body += block("Contexte", data.context);
      body += block("Contenu", data.content);
      body += block("Fiabilité (explication)", data.reliabilityText);
      body += block("Références", data.references);
      return "{\\rtf1\\ansi\\ansicpg1252\\uc1\\deff0"
        + "{\\fonttbl{\\f0 Helvetica;}}"
        + "\\fs22\n" + body + "}";
    }

    function reliabilityToFr(v) {
      if (v === "good") return "Fiable";
      if (v === "mid") return "Indéterminé";
      if (v === "bad") return "Pas fiable";
      return "";
    }
    function isoToFrDate(val) {
      if (!val) return "";
      const m = String(val).match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
      if (m) return `${m[3]}.${m[2]}.${m[1]}`;
      return val;
    }
    function sanitizeFilename(s) {
      return String(s || "CERT").replace(/[\\/:*?"<>|]+/g, "_").replace(/\s+/g, "_").slice(0, 60) || "CERT";
    }

    window.downloadCertRtf = function(id) {
      const c = allCerts.find(x => x.id === id);
      if (!c || !c.is_mine) return;
      const data = {
        title: c.title || "",
        url: c.url || "",
        expert: c.expert || "",
        date: isoToFrDate(c.cert_date),
        descriptor1: c.descriptor1 || "",
        descriptor2: c.descriptor2 || "",
        reliability: reliabilityToFr(c.reliability),
        threePhrases: c.three_phrases || "",
        context: c.context || "",
        content: c.content || "",
        reliabilityText: c.reliability_text || "",
        references: c.references_text || "",
      };
      const rtf = buildCertRtf(data);
      const blob = new Blob([rtf], { type: "application/rtf;charset=utf-8" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "CERT_" + sanitizeFilename(data.title) + ".rtf";
      a.click();
      URL.revokeObjectURL(a.href);
    };

    /* ============================
       Review-request modals (expert side)
    ============================ */
    const reviewModal = document.getElementById("reviewModal");
    const reviewEditorSelect = document.getElementById("reviewEditorSelect");
    const reviewNoteInput = document.getElementById("reviewNoteInput");
    const reviewNoteField = document.getElementById("reviewNoteField");
    const reviewModalTitle = document.getElementById("reviewModalTitle");
    const reviewModalSubmit = document.getElementById("reviewModalSubmit");

    const returnedModal = document.getElementById("returnedModal");
    const returnedModalBody = document.getElementById("returnedModalBody");
    const returnedModalResend = document.getElementById("returnedModalResend");

    let activeReviewCertId = null;
    let activeReviewMode = "request"; // 'request' | 'reassign'

    window.openReviewModal = function(certId) {
      const c = allCerts.find(x => x.id === certId);
      if (!c) return;

      // If the latest cycle is 'returned', route to the returned viewer instead.
      if (c.review_status === "returned") {
        openReturnedViewer(c);
        return;
      }

      activeReviewCertId = certId;
      if (!editors.length) {
        alert("Aucun·e éditeur·ice configuré·e.");
        return;
      }

      // Preselect the current editor (for reassign), otherwise the first one.
      const preselect = (c.review_status === "pending" && c.review_editor_id)
        ? c.review_editor_id
        : editors[0].id;
      reviewEditorSelect.value = String(preselect);

      if (c.review_status === "pending") {
        activeReviewMode = "reassign";
        reviewModalTitle.textContent = "Changer d'éditeur·ice";
        reviewModalSubmit.textContent = "Changer";
        reviewNoteField.style.display = "none";
      } else {
        activeReviewMode = "request";
        reviewModalTitle.textContent = "Envoyer en édition";
        reviewModalSubmit.textContent = "Envoyer";
        reviewNoteField.style.display = "";
        reviewNoteInput.value = "";
      }

      reviewModal.classList.add("is-open");
    };

    window.closeReviewModal = function() {
      reviewModal.classList.remove("is-open");
      activeReviewCertId = null;
    };

    function openReturnedViewer(c) {
      activeReviewCertId = c.id;
      const who = c.review_editor_name ? `Retour de ${esc(c.review_editor_name)}` : "Retour de l'éditeur·ice";
      document.getElementById("returnedModalTitle").textContent = "";
      document.getElementById("returnedModalTitle").innerHTML = who;
      returnedModalBody.textContent = c.review_editor_comment || "(aucun commentaire)";
      returnedModal.classList.add("is-open");

      // Acknowledge the notification on open.
      ackReview(c.id);
    }

    window.closeReturnedModal = function() {
      returnedModal.classList.remove("is-open");
      activeReviewCertId = null;
    };

    // Banner → open the relevant viewer (and auto-ack).
    window.openNotification = function(certId, status) {
      const c = allCerts.find(x => x.id === certId);
      if (!c) return;
      if (status === "returned") {
        openReturnedViewer(c);
      } else {
        // 'done' — just ack, then show a small confirmation by re-rendering.
        ackReview(certId).then(() => {
          alert(`La CERT "${c.title}" a été éditée par ${c.review_editor_name || "l'éditeur·ice"}.`);
        });
      }
    };

    async function ackReview(certId) {
      try {
        await fetch(`${API}/certs/ack-review.php`, {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
          body: JSON.stringify({ cert_id: certId }),
        });
        // Drop this cert from the banner list + refresh.
        notifications = notifications.filter(n => n.cert_id !== certId);
        renderReviewBanner();
      } catch {}
    }

    reviewModalSubmit.addEventListener("click", async () => {
      if (!activeReviewCertId) return;
      const editorId = parseInt(reviewEditorSelect.value, 10);
      if (!editorId) return;

      const endpoint = activeReviewMode === "reassign"
        ? `${API}/certs/reassign-review.php`
        : `${API}/certs/request-review.php`;
      const payload = { cert_id: activeReviewCertId, editor_id: editorId };
      if (activeReviewMode === "request") {
        payload.note = reviewNoteInput.value.trim();
      }

      try {
        const res = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
          body: JSON.stringify(payload),
        });
        const result = await res.json();
        if (result.error) {
          alert("Erreur : " + result.error);
          return;
        }

        // Update local cert row to reflect the new state without a full reload.
        const c = allCerts.find(x => x.id === activeReviewCertId);
        const chosenEditor = editors.find(e => e.id === editorId);
        if (c) {
          c.review_status = "pending";
          c.review_editor_id = editorId;
          c.review_editor_name = chosenEditor?.name || "";
          c.review_expert_note = payload.note || null;
          c.review_editor_comment = null;
          c.review_expert_ack_at = null;
        }
        closeReviewModal();
        render();
      } catch (err) {
        alert("Erreur : " + err.message);
      }
    });

    returnedModalResend.addEventListener("click", () => {
      if (!activeReviewCertId) return;
      const id = activeReviewCertId;
      // Close returned viewer, then open the request modal on the same cert.
      // The cert's status is still 'returned' locally, so we force request mode.
      closeReturnedModal();
      const c = allCerts.find(x => x.id === id);
      if (!c) return;
      // Pretend the cycle is over so openReviewModal picks the 'request' path.
      const savedStatus = c.review_status;
      c.review_status = "done";
      window.openReviewModal(id);
      c.review_status = savedStatus;
    });

    // Click-outside-to-close
    reviewModal.addEventListener("click", (e) => {
      if (e.target === reviewModal) closeReviewModal();
    });
    returnedModal.addEventListener("click", (e) => {
      if (e.target === returnedModal) closeReturnedModal();
    });

    init();
  </script>
</body>
</html>
