<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
  <meta name="copyright" content="&copy; 2026 Certify Community SA. Tous droits r&eacute;serv&eacute;s." />
  <title>Dépôt de CERTs</title>

  <link rel="stylesheet" href="/descripteurs/assets/css/main.css" />

  <style>
    .page-lead {
      margin: 8px 0 14px 0;
      color: var(--muted);
      max-width: 900px;
    }

    /* Toolbar */
    .depot-toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 16px;
    }

    .depot-toolbar input[type="search"] {
      flex: 1 1 220px;
      min-width: 180px;
    }

    .search-box {
      flex: 1 1 220px;
      min-width: 180px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      padding: 6px 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.95);
      cursor: text;
      transition: border-color .15s, box-shadow .15s;
    }

    .search-box:focus-within {
      border-color: rgba(111,92,247,.45);
      box-shadow: var(--ring);
    }

    .search-box input {
      flex: 1 1 100px;
      border: none;
      outline: none;
      background: transparent;
      font-size: .88rem;
      color: var(--text);
      padding: 4px 0;
      min-width: 80px;
    }

    .search-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px 3px 10px;
      border-radius: 7px;
      background: rgba(111,92,247,.1);
      border: 1px solid rgba(111,92,247,.25);
      color: var(--text);
      font-size: .8rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .search-chip button {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: .85rem;
      line-height: 1;
      padding: 0 2px;
      border-radius: 4px;
      transition: color .15s, background .15s;
    }

    .search-chip button:hover {
      color: #b91c1c;
      background: rgba(239,68,68,.1);
    }

    .depot-toolbar select {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.95);
      color: var(--text);
      outline: none;
      font-size: .88rem;
    }

    .depot-toolbar select:focus {
      border-color: rgba(111,92,247,.45);
      box-shadow: var(--ring);
    }

    /* Grid */
    .depot-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .depot-card {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 16px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 2px 8px rgba(16,24,40,.05);
      transition: border-color .15s, box-shadow .15s;
    }

    .depot-card:hover {
      border-color: rgba(111,92,247,.3);
      box-shadow: 0 4px 16px rgba(111,92,247,.08);
    }

    .depot-card.is-selected {
      border-color: var(--accent);
      background: rgba(111,92,247,.04);
    }

    .depot-check {
      margin-top: 3px;
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      display: none;
    }

    .depot-card.show-check .depot-check {
      display: block;
    }

    .depot-body {
      flex: 1;
      min-width: 0;
    }

    .depot-title {
      font-weight: 700;
      font-size: .95rem;
      color: var(--text);
      line-height: 1.3;
    }

    .depot-title a {
      color: var(--text);
      text-decoration: none;
    }

    .depot-title a:hover {
      color: var(--accent);
    }

    .depot-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 6px;
      font-size: .78rem;
      color: var(--muted);
    }

    .depot-tag {
      padding: 2px 8px;
      border-radius: 6px;
      font-weight: 600;
      font-size: .75rem;
    }

    .depot-tag.rel-good {
      background: var(--rel-good-bg);
      border: 1px solid var(--rel-good-border);
      color: #166534;
    }

    .depot-tag.rel-mid {
      background: var(--rel-mid-bg);
      border: 1px solid var(--rel-mid-border);
      color: #9a3412;
    }

    .depot-tag.rel-bad {
      background: var(--rel-bad-bg);
      border: 1px solid var(--rel-bad-border);
      color: #991b1b;
    }

    .depot-tag.desc-tag {
      background: rgba(111,92,247,.08);
      border: 1px solid rgba(111,92,247,.2);
      color: var(--text);
    }

    .depot-tag.teacher-tag {
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .depot-tag.mine-tag {
      background: rgba(111,92,247,.12);
      border: 1px solid rgba(111,92,247,.3);
      color: var(--accent);
      font-weight: 700;
    }

    .depot-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .depot-actions button {
      background: none;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 4px 12px;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--muted);
      transition: all .15s;
    }

    .depot-actions button:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(111,92,247,.05);
    }

    .depot-actions button.btn-del:hover {
      border-color: rgba(239,68,68,.4);
      color: #b91c1c;
      background: rgba(239,68,68,.05);
    }

    .depot-edit-form {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .depot-edit-form label {
      font-size: .78rem;
      font-weight: 600;
      color: var(--muted);
    }

    .depot-edit-form input,
    .depot-edit-form textarea,
    .depot-edit-form select {
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: .85rem;
      background: var(--panel);
      color: var(--text);
      outline: none;
    }

    .depot-edit-form textarea {
      resize: vertical;
      min-height: 50px;
    }

    .depot-edit-form input:focus,
    .depot-edit-form textarea:focus,
    .depot-edit-form select:focus {
      border-color: rgba(111,92,247,.45);
    }

    .depot-edit-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .depot-edit-actions button {
      padding: 7px 16px;
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--panel);
      transition: all .15s;
    }

    .depot-edit-actions .btn-save {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .depot-edit-actions .btn-save:hover { background: var(--accent-hover); }

    .depot-detail {
      margin-top: 8px;
      font-size: .82rem;
      color: var(--muted);
      line-height: 1.45;
      display: none;
    }

    .depot-card.is-expanded .depot-detail {
      display: block;
    }

    .depot-toggle {
      flex-shrink: 0;
      cursor: pointer;
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 1.1rem;
      padding: 6px 10px;
      border-radius: 8px;
      line-height: 1;
    }

    .depot-toggle:hover {
      background: rgba(111,92,247,.08);
      color: var(--accent);
    }

    /* Session bar */
    .session-bar {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--panel);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(111,92,247,.1);
    }

    .session-bar.is-active {
      display: flex;
    }

    .session-bar-info {
      flex: 1;
      font-size: .88rem;
      font-weight: 600;
    }

    .session-bar-count {
      font-size: .82rem;
      color: var(--muted);
      font-weight: 600;
    }

    .empty-msg {
      color: var(--muted);
      font-size: .88rem;
      padding: 28px 14px;
      text-align: center;
    }

    .depot-count {
      font-size: .82rem;
      color: var(--muted);
      margin-bottom: 10px;
    }

    #depotContent { display: none; }

    @media (max-width: 500px) {
      .depot-meta span:not(.depot-tag) { display: none; }
    }
  </style>
</head>

<body>
  <header>
    <nav>
      <span style="font-weight:900;letter-spacing:-0.02em;color:var(--accent);margin-right:6px;">toutcuit</span>
      <span style="color:var(--border);margin-right:6px;">/</span>
      <a href="/admin.html" style="color:var(--muted);text-decoration:none;font-weight:600;">Console</a>
      <span style="flex:1;"></span>
      <span id="userName" style="font-size:.82rem;color:var(--muted);"></span>
      <button id="logoutBtn" style="font-size:.82rem;color:var(--accent);cursor:pointer;border:none;background:none;font-weight:600;">Déconnexion</button>
    </nav>
  </header>

  <main>
    <section id="depotContent">
      <h1>Dépôt de CERTs</h1>
      <p class="page-lead">
        Toutes les certifications déposées par les enseignants. Sélectionnez une séance pour y ajouter des CERTs.
      </p>

      <!-- Session selector -->
      <div class="depot-toolbar">
        <div class="search-box" id="searchBox">
          <input type="text" id="searchInput" placeholder="Rechercher par titre, descripteur..." />
        </div>

        <select id="filterReliability">
          <option value="">Fiabilité</option>
          <option value="good">Fiable</option>
          <option value="mid">Indéterminé</option>
          <option value="bad">Pas fiable</option>
        </select>

        <select id="sessionSelect">
          <option value="">-- Associer à une séance --</option>
        </select>
      </div>

      <!-- Session action bar -->
      <div class="session-bar" id="sessionBar">
        <div class="session-bar-info">
          Seance : <span id="sessionBarName"></span>
        </div>
        <div class="session-bar-count" id="sessionBarCount">0 selectionne(s)</div>
        <button class="btn" id="saveSessionBtn">Enregistrer</button>
      </div>

      <div class="depot-count" id="depotCount"></div>
      <div class="depot-grid" id="depotGrid"></div>
    </section>
  </main>

  <script type="module">
    const API = "/api";
    const token = localStorage.getItem("tc_token");
    if (!token) {
      window.location.href = "/admin.html";
    }

    try {
      const t = JSON.parse(localStorage.getItem("tc_teacher"));
      if (t?.name) document.getElementById("userName").textContent = t.name;
    } catch {}
    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("tc_token");
      localStorage.removeItem("tc_teacher");
      window.location.href = "/admin.html";
    });

    const depotContent = document.getElementById("depotContent");
    const searchBox = document.getElementById("searchBox");
    const searchInput = document.getElementById("searchInput");
    const filterReliability = document.getElementById("filterReliability");

    let searchTerms = [];
    const sessionSelect = document.getElementById("sessionSelect");
    const sessionBar = document.getElementById("sessionBar");
    const sessionBarName = document.getElementById("sessionBarName");
    const sessionBarCount = document.getElementById("sessionBarCount");
    const saveSessionBtn = document.getElementById("saveSessionBtn");
    const depotGrid = document.getElementById("depotGrid");
    const depotCount = document.getElementById("depotCount");

    const REL_LABEL = { good: "Fiable", mid: "Indéterminé", bad: "Pas fiable" };
    const REL_CLASS = { good: "rel-good", mid: "rel-mid", bad: "rel-bad" };

    let allCerts = [];
    let sessions = [];
    let assignedIds = new Set();
    let activeSessionId = null;
    let activeSessionCode = null;

    function esc(s) {
      return String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    // Load data
    async function init() {
      try {
        const [certsRes, sessionsRes] = await Promise.all([
          fetch(`${API}/certs/depot.php`, { headers: { Authorization: `Bearer ${token}` } }),
          fetch(`${API}/sessions/list.php`, { headers: { Authorization: `Bearer ${token}` } })
        ]);

        allCerts = await certsRes.json();
        sessions = await sessionsRes.json();

        if (!Array.isArray(allCerts)) allCerts = [];
        if (!Array.isArray(sessions)) sessions = [];

        // Populate session dropdown
        sessions.forEach(s => {
          const opt = document.createElement("option");
          opt.value = s.id;
          opt.dataset.code = s.code;
          opt.textContent = `${s.school_name || ""} — ${s.name} (${s.code})`;
          sessionSelect.appendChild(opt);
        });

        depotContent.style.display = "block";
        render();
      } catch (err) {
        depotContent.style.display = "block";
        depotGrid.innerHTML = `<div class="empty-msg">Erreur : ${esc(err.message)}</div>`;
      }
    }

    // Filter + render
    function render() {
      const relFilter = filterReliability.value;

      const filtered = allCerts.filter(c => {
        if (relFilter && c.reliability !== relFilter) return false;
        if (searchTerms.length) {
          const haystack = [c.title, c.descriptor1, c.descriptor2, c.teacher_name, c.expert]
            .filter(Boolean).join(" ").toLowerCase();
          if (!searchTerms.every(t => haystack.includes(t))) return false;
        }
        return true;
      });

      depotCount.textContent = `${filtered.length} certification${filtered.length !== 1 ? "s" : ""} sur ${allCerts.length}`;

      if (!filtered.length) {
        depotGrid.innerHTML = `<div class="empty-msg">Aucune certification trouvee.</div>`;
        return;
      }

      depotGrid.innerHTML = filtered.map(c => {
        const checked = assignedIds.has(c.id);
        const showCheck = activeSessionId !== null;
        return `
          <div class="depot-card ${showCheck ? "show-check" : ""} ${checked ? "is-selected" : ""}" data-id="${c.id}">
            <input type="checkbox" class="depot-check" value="${c.id}" ${checked ? "checked" : ""} />
            <div class="depot-body">
              <div class="depot-title">
                <a href="${esc(c.url)}" target="_blank" rel="noopener">${esc(c.title)}</a>
              </div>
              <div class="depot-meta">
                ${c.descriptor1 ? `<span class="depot-tag ${REL_CLASS[c.reliability] || "desc-tag"}">${esc(c.descriptor1)}</span>` : ""}
                ${c.descriptor2 ? `<span class="depot-tag ${REL_CLASS[c.reliability] || "desc-tag"}">${esc(c.descriptor2)}</span>` : ""}
                <span class="depot-tag teacher-tag">${esc(c.teacher_name)}</span>
                ${c.is_mine ? '<span class="depot-tag mine-tag">Ma CERT</span>' : ""}
              </div>
              <div class="depot-detail">
                ${c.url ? `<p><strong>URL :</strong> <a href="${esc(c.url)}" target="_blank" rel="noopener" style="color:var(--accent);word-break:break-all;">${esc(c.url)}</a></p>` : ""}
                ${c.expert ? `<p><strong>Expert :</strong> ${esc(c.expert)}</p>` : ""}
                ${c.cert_date ? `<p><strong>Date :</strong> ${esc(c.cert_date)}</p>` : ""}
                ${c.descriptor1 ? `<p><strong>Descripteur 1 :</strong> ${esc(c.descriptor1)}</p>` : ""}
                ${c.descriptor2 ? `<p><strong>Descripteur 2 :</strong> ${esc(c.descriptor2)}</p>` : ""}
                ${c.three_phrases ? `<p><strong>3 phrases :</strong> ${esc(c.three_phrases)}</p>` : ""}
                ${c.context ? `<p><strong>Contexte :</strong> ${esc(c.context)}</p>` : ""}
                ${c.content ? `<p><strong>Contenu :</strong> ${esc(c.content)}</p>` : ""}
                ${c.reliability_text ? `<p><strong>Fiabilité (explication) :</strong> ${esc(c.reliability_text)}</p>` : ""}
                ${c.references_text ? `<p><strong>Références :</strong> ${esc(c.references_text)}</p>` : ""}
                ${c.is_mine ? `<div class="depot-actions">
                  <button onclick="editCert(${c.id})">Modifier</button>
                  <button class="btn-del" onclick="deleteCert(${c.id}, this)">Supprimer</button>
                </div>
                <div class="depot-edit-form" id="edit-${c.id}" style="display:none;"></div>` : ""}
              </div>
            </div>
            <button class="depot-toggle" title="Details">&#9662;</button>
          </div>
        `;
      }).join("");

      // Attach events
      depotGrid.querySelectorAll(".depot-toggle").forEach(btn => {
        btn.addEventListener("click", () => {
          btn.closest(".depot-card").classList.toggle("is-expanded");
          btn.textContent = btn.closest(".depot-card").classList.contains("is-expanded") ? "\u25B4" : "\u25BE";
        });
      });

      depotGrid.querySelectorAll(".depot-check").forEach(cb => {
        cb.addEventListener("change", () => {
          const id = parseInt(cb.value);
          const card = cb.closest(".depot-card");
          if (cb.checked) {
            assignedIds.add(id);
            card.classList.add("is-selected");
          } else {
            assignedIds.delete(id);
            card.classList.remove("is-selected");
          }
          updateSessionCount();
        });
      });
    }

    function updateSessionCount() {
      sessionBarCount.textContent = `${assignedIds.size} selectionne(s)`;
    }

    // Session change
    sessionSelect.addEventListener("change", async () => {
      const opt = sessionSelect.selectedOptions[0];
      activeSessionId = sessionSelect.value ? parseInt(sessionSelect.value) : null;
      activeSessionCode = opt?.dataset.code || null;

      if (activeSessionId) {
        sessionBarName.textContent = opt.textContent;
        sessionBar.classList.add("is-active");

        // Load assigned CERTs for this session
        try {
          const res = await fetch(`${API}/sessions/certs.php?session=${encodeURIComponent(activeSessionCode)}`);
          const assigned = await res.json();
          assignedIds = new Set((Array.isArray(assigned) ? assigned : []).map(c => c.id));
        } catch {
          assignedIds = new Set();
        }
        updateSessionCount();
      } else {
        sessionBar.classList.remove("is-active");
        assignedIds = new Set();
        activeSessionId = null;
        activeSessionCode = null;
      }

      render();
    });

    // Save
    saveSessionBtn.addEventListener("click", async () => {
      if (!activeSessionId) return;

      try {
        const res = await fetch(`${API}/sessions/certs.php`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`
          },
          body: JSON.stringify({
            session_id: activeSessionId,
            certs: [...assignedIds]
          })
        });

        const result = await res.json();
        if (result.error) {
          alert("Erreur : " + result.error);
        } else {
          alert(`${result.count} CERT(s) associe(s) a la seance.`);
        }
      } catch (err) {
        alert("Erreur : " + err.message);
      }
    });

    // Search chips
    function addSearchTerm(term) {
      term = term.trim().toLowerCase();
      if (!term || searchTerms.includes(term)) return;
      searchTerms.push(term);
      renderChips();
      render();
    }

    function removeSearchTerm(term) {
      searchTerms = searchTerms.filter(t => t !== term);
      renderChips();
      render();
    }

    function renderChips() {
      searchBox.querySelectorAll(".search-chip").forEach(el => el.remove());
      searchTerms.forEach(term => {
        const chip = document.createElement("span");
        chip.className = "search-chip";
        chip.innerHTML = `${esc(term)}<button title="Supprimer">&times;</button>`;
        chip.querySelector("button").addEventListener("click", () => removeSearchTerm(term));
        searchBox.insertBefore(chip, searchInput);
      });
      searchInput.placeholder = searchTerms.length ? "Ajouter un critère..." : "Rechercher par titre, descripteur...";
    }

    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        addSearchTerm(searchInput.value);
        searchInput.value = "";
      }
      if (e.key === "Backspace" && !searchInput.value && searchTerms.length) {
        removeSearchTerm(searchTerms[searchTerms.length - 1]);
      }
    });

    searchBox.addEventListener("click", () => searchInput.focus());

    // Filters
    filterReliability.addEventListener("change", render);

    // Edit CERT
    window.editCert = function(id) {
      const form = document.getElementById(`edit-${id}`);
      if (!form) return;
      if (form.style.display === "flex") { form.style.display = "none"; return; }

      const c = allCerts.find(x => x.id === id);
      if (!c) return;

      form.style.display = "flex";
      form.innerHTML = `
        <label>Titre</label>
        <input type="text" data-field="title" value="${esc(c.title)}" />
        <label>URL</label>
        <input type="text" data-field="url" value="${esc(c.url)}" />
        <label>Expert</label>
        <input type="text" data-field="expert" value="${esc(c.expert || "")}" />
        <label>Date (JJ.MM.AAAA)</label>
        <input type="text" data-field="cert_date" value="${esc(c.cert_date || "")}" />
        <label>Descripteur 1</label>
        <input type="text" data-field="descriptor1" value="${esc(c.descriptor1 || "")}" />
        <label>Descripteur 2</label>
        <input type="text" data-field="descriptor2" value="${esc(c.descriptor2 || "")}" />
        <label>Fiabilité</label>
        <select data-field="reliability">
          <option value="good" ${c.reliability === "good" ? "selected" : ""}>Fiable</option>
          <option value="mid" ${c.reliability === "mid" ? "selected" : ""}>Indéterminé</option>
          <option value="bad" ${c.reliability === "bad" ? "selected" : ""}>Pas fiable</option>
        </select>
        <label>3 phrases</label>
        <textarea data-field="three_phrases" rows="2">${esc(c.three_phrases || "")}</textarea>
        <label>Contexte</label>
        <textarea data-field="context" rows="2">${esc(c.context || "")}</textarea>
        <div class="depot-edit-actions">
          <button class="btn-save" onclick="saveCert(${id})">Enregistrer</button>
          <button onclick="document.getElementById('edit-${id}').style.display='none'">Annuler</button>
        </div>
      `;
    };

    // Save edited CERT
    window.saveCert = async function(id) {
      const form = document.getElementById(`edit-${id}`);
      if (!form) return;

      const payload = { id };
      form.querySelectorAll("[data-field]").forEach(el => {
        payload[el.dataset.field] = el.value;
      });

      // Convert date format
      const dateVal = payload.cert_date || "";
      const dm = dateVal.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
      if (dm) payload.cert_date = `${dm[3]}-${dm[2].padStart(2,"0")}-${dm[1].padStart(2,"0")}`;

      try {
        const res = await fetch(`${API}/certs/save.php`, {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
          body: JSON.stringify(payload)
        });
        const result = await res.json();
        if (result.error) return alert("Erreur : " + result.error);

        // Update local data
        const c = allCerts.find(x => x.id === id);
        if (c) {
          form.querySelectorAll("[data-field]").forEach(el => { c[el.dataset.field] = el.value; });
        }
        form.style.display = "none";
        render();
      } catch (err) {
        alert("Erreur : " + err.message);
      }
    };

    // Delete CERT
    window.deleteCert = async function(id) {
      if (!confirm("Supprimer cette CERT ? Cette action est irréversible.")) return;

      try {
        const res = await fetch(`${API}/certs/delete.php`, {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
          body: JSON.stringify({ id })
        });
        const result = await res.json();
        if (result.error) return alert("Erreur : " + result.error);

        allCerts = allCerts.filter(c => c.id !== id);
        assignedIds.delete(id);
        render();
      } catch (err) {
        alert("Erreur : " + err.message);
      }
    };

    init();
  </script>
</body>
</html>
