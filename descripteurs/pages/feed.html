<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
  <meta name="copyright" content="© 2026 Certify Community SA. Tous droits réservés." />
  <title>Feed — Certify</title>

  <link rel="stylesheet" href="../assets/css/main.css" />

  <style>
    /* Élargir le layout sur desktop uniquement pour cette page */
    @media (min-width: 601px){
      main{ max-width: 1400px !important; }
    }

    .feed-lead{
      margin: 8px 0 14px 0;
      color: var(--muted);
      max-width: 900px;
    }

    .feed-header {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .feed-header h1 { margin: 0; }

    .feed-header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .feed-controls{
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin: 12px 0 6px 0;
    }

    .feed-controls .chip{
      font-size: 15px;
      padding: 9px 14px;
    }

    .feed-controls .control{
      flex: 1 1 240px;
      min-width: 0;
    }

    /* Visible links stepper */
    .visible-stepper {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .visible-stepper .stepper-label {
      font-size: .78rem;
      font-weight: 600;
      color: var(--muted);
      margin-right: 2px;
    }

    .visible-stepper .stepper-btn {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      border: 1.5px solid var(--border, #d7dbe6);
      background: var(--panel, #fff);
      color: var(--text, #1f2328);
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
    }

    .visible-stepper .stepper-btn:hover {
      border-color: var(--accent, #6f5cf7);
      color: var(--accent, #6f5cf7);
    }

    .visible-stepper .stepper-btn:disabled {
      opacity: .3;
      cursor: default;
    }

    .visible-stepper .stepper-value {
      min-width: 40px;
      text-align: center;
      font-size: .8rem;
      font-weight: 700;
      color: var(--text, #1f2328);
      padding: 3px 6px;
      border-radius: 7px;
      background: rgba(111,92,247,.08);
      border: 1px solid rgba(111,92,247,.2);
    }

    .chip-group{
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .chip{
      appearance: none;
      border: 1px solid rgba(111,92,247,.25);
      background: rgba(111,92,247,.10);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 850;
      font-size: 13px;
      line-height: 1;
      transition: background .15s ease, border-color .15s ease, transform .05s ease, box-shadow .15s ease;
      user-select: none;
      white-space: nowrap;
    }
    .chip:hover{
      background: rgba(111,92,247,.14);
      border-color: rgba(111,92,247,.35);
    }
    .chip:active{ transform: translateY(1px); }
    .chip[aria-pressed="true"]{
      box-shadow: var(--ring);
      border-color: rgba(111,92,247,.45);
      background: rgba(111,92,247,.18);
    }

    /* ✅ Chips fiabilité colorées (comme la machine) */
    .chip[data-rel="good"]{
      border-color: var(--rel-good-border);
      background: var(--rel-good-bg);
    }
    .chip[data-rel="mid"]{
      border-color: var(--rel-mid-border);
      background: var(--rel-mid-bg);
    }
    .chip[data-rel="bad"]{
      border-color: var(--rel-bad-border);
      background: var(--rel-bad-bg);
    }
    .chip[data-rel="good"]:hover{ background: rgba(34,197,94,.18); }
    .chip[data-rel="mid"]:hover{ background: rgba(249,115,22,.18); }
    .chip[data-rel="bad"]:hover{ background: rgba(239,68,68,.18); }

    .feed-list{
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 12px;
    }

    /* =========================
       Link sections
    ========================= */

    .link-group{
      background: rgba(241,243,249,.70);
      border: 1px solid rgba(215,219,230,.95);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      overflow: hidden;
    }

    /* Vignette (typography cover) */
    .link-media{
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(215,219,230,.9);
      background: rgba(255,255,255,.85);
      box-shadow: 0 10px 25px rgba(16,24,40,.06);
      margin-bottom: 12px;
    }

    .link-media a{
      display: block;
      position: relative;
      text-decoration: none;
      cursor: pointer;
    }

    .link-media a:hover .typography-image{
      opacity: 0.95;
      transform: scale(1.01);
      transition: all 0.2s ease;
    }

    .image-cover{
      width: 100%;
      aspect-ratio: 16 / 9;
      display: block;
      object-fit: cover;
    }


    .typography-image{
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
      padding: 14px;
    }
    .typography-image__text{
      font-weight: 900;
      line-height: 1;
      text-align: center;
      word-break: keep-all;
      hyphens: none;
      letter-spacing: -0.02em;
      max-width: 100%;
      text-transform: uppercase;
      text-wrap: balance;
    }
    
    /* Numéro dans le coin supérieur gauche de l'image */
    .typography-image__number{
      position: absolute;
      top: 10px;
      left: 14px;
      font-weight: 900;
      font-size: 1.1rem;
      color: rgba(255,255,255,.5);
      z-index: 2;
    }

    @media (max-width: 600px) {
      .typography-image__number{
        font-size: 1rem;
        top: 10px;
        left: 10px;
      }
    }

    /* ✅ Section déroulante infos CERTs */
    .certs-toggle{
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      margin: 8px 0;
      cursor: pointer;
      user-select: none;
      transition: background .15s ease;
      border-radius: 8px;
    }
    .certs-toggle:hover{
      background: rgba(111,92,247,.06);
    }
    .certs-toggle-icon{
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: transform .2s ease;
      color: var(--text);
      opacity: .6;
    }
    .certs-toggle.is-open .certs-toggle-icon{
      transform: rotate(180deg);
    }

    .certs-content{
      display: none;
      padding: 0;
      margin-bottom: 4px;
      flex-direction: column;
      gap: 8px;
    }
    .certs-content.is-open{
      display: flex;
    }

    /* Second toggle for detailed content */
    .certs-toggle-detail{
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px 8px;
      margin: 0 0 8px;
      cursor: pointer;
      user-select: none;
      transition: background .15s ease;
      border-radius: 8px;
    }
    .certs-toggle-detail:hover{
      background: rgba(111,92,247,.06);
    }
    .certs-toggle-detail .certs-toggle-icon{
      width: 20px;
      height: 20px;
      font-size: 14px;
    }
    .certs-toggle-detail.is-open .certs-toggle-icon{
      transform: rotate(180deg);
    }
    .certs-detail-content{
      display: none;
      padding: 0;
      margin-bottom: 12px;
      flex-direction: column;
      gap: 8px;
    }
    .certs-detail-content.is-open{
      display: flex;
    }

    .certs-block{
      border-radius: 12px;
      padding: 12px;
    }

    .certs-block--purple{
      background: rgba(111,92,247,.10);
      border: 1px solid rgba(111,92,247,.20);
    }

    .certs-expert{
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--text);
    }

    .certs-section-content{
      font-size: 0.92rem;
      line-height: 1.5;
      color: var(--text);
      white-space: pre-wrap;
    }

    .certs-bullets{
      margin: 0;
      padding-left: 18px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .certs-bullets li{
      font-size: 0.92rem;
      line-height: 1.45;
      color: var(--text);
    }

    .certs-ref-label{
      font-weight: 850;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      opacity: .6;
      margin-top: 10px;
      margin-bottom: 4px;
    }

    .certs-ref-list{
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .certs-ref-list li{
      font-size: 0.92rem;
      line-height: 1.45;
      color: var(--text);
    }
    .certs-ref-num{
      font-weight: 850;
      opacity: .7;
      margin-right: 2px;
    }

    .certs-section{
      margin-bottom: 12px;
    }
    .certs-section:last-child{
      margin-bottom: 0;
    }

    .certs-section-title{
      font-weight: 850;
      font-size: 13px;
      margin-bottom: 6px;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.02em;
      opacity: .75;
    }

    .certs-descriptors{
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .certs-descriptor-pill{
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(111,92,247,.25);
      background: rgba(255,255,255,.65);
      border-radius: 999px;
      padding: 6px 10px;
      font-weight: 850;
      font-size: 13px;
      line-height: 1.2;
      color: var(--text);
    }

    .certs-descriptor-pill img{
      width: 16px;
      height: 16px;
      flex: 0 0 16px;
      display: block;
      filter: brightness(0);
      opacity: .92;
    }

    /* Teinte selon fiabilité pour les pills CERTs */
    .certs-descriptor-pill.rel-good{
      border-color: var(--rel-good-border);
      background: var(--rel-good-bg);
    }
    .certs-descriptor-pill.rel-mid{
      border-color: var(--rel-mid-border);
      background: var(--rel-mid-bg);
    }
    .certs-descriptor-pill.rel-bad{
      border-color: var(--rel-bad-border);
      background: var(--rel-bad-bg);
    }

    /* ❌ SUPPRIMÉ: Header avec numéro et titre sous l'image */
    .link-head-link{
      display: none;
    }

    .link-group-head{
      display: none;
    }

    .link-left{
      display: none;
    }

    .link-num{
      display: none;
    }

    .link-title{
      display: none;
    }

    /* =========================
       Descriptor cards grid
    ========================= */

    .desc-grid{
      margin-top: 0;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    @media (max-width: 600px){
      .desc-grid{ grid-template-columns: 1fr; }
    }

    .desc-card{
      border-radius: 12px;
      border: 1px solid rgba(215,219,230,.95);
      background: rgba(255,255,255,.70);
      overflow: hidden;
      min-width: 0;
      width: 100%;
      box-sizing: border-box;
      box-shadow: 0 4px 10px rgba(16,24,40,.03);
    }

    /* Teinte selon fiabilité */
    .desc-card.rel-good{ background: var(--rel-good-bg); border-color: var(--rel-good-border); }
    .desc-card.rel-mid { background: var(--rel-mid-bg);  border-color: var(--rel-mid-border); }
    .desc-card.rel-bad { background: var(--rel-bad-bg);  border-color: var(--rel-bad-border); }

    /* Bandeau descripteurs horizontal en haut de la carte — pas de fond propre */
    .desc-card-header{
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 6px;
      flex-wrap: nowrap;
      overflow: hidden;
      padding: 8px 10px;
      background: transparent !important;
      border-bottom: 1px solid rgba(0,0,0,.07);
    }

    /* Neutraliser le fond coloré des pills injecté par main.css (.rel-* .preview-pill) */
    .desc-card .desc-card-header .preview-pill,
    .rel-good .desc-card-header .preview-pill,
    .rel-mid  .desc-card-header .preview-pill,
    .rel-bad  .desc-card-header .preview-pill{
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      padding: 0;
    }

    .desc-sep{
      font-size: 13px;
      opacity: .35;
      flex-shrink: 0;
    }

    .preview-pill{
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 850;
      font-size: 15px;
      line-height: 1.2;
      color: var(--text);
      white-space: nowrap;
    }

    .preview-pill img{
      width: 16px;
      height: 16px;
      flex: 0 0 16px;
      display: block;
      filter: brightness(0);
      opacity: .85;
    }

    /* =========================
       Users inside a descriptor card
    ========================= */

    .who-list{
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .who-item{
      padding: 7px 10px;
      min-width: 0;
      border-top: 1px solid rgba(0,0,0,.06);
      background: transparent;
    }
    .who-item:first-child{
      border-top: none;
    }

    .who-top{
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .nick{
      font-weight: 950;
      letter-spacing: -0.01em;
      font-size: 15px;
      flex-shrink: 0;
    }

    /* Commentaire tronqué avec toggle */
    .comment-wrap{
      margin-top: 3px;
    }

    .comment{
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.4;
      white-space: pre-wrap;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .comment.is-expanded{
      display: block;
      -webkit-line-clamp: unset;
    }

    .comment-toggle{
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: none;
      border: none;
      padding: 0;
      margin-top: 2px;
      cursor: pointer;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 850;
      opacity: .65;
      letter-spacing: 0.02em;
    }
    .comment-toggle:hover{ opacity: 1; }
    .comment-toggle-icon{
      font-size: 10px;
      transition: transform .2s ease;
      display: inline-block;
    }
    .comment-toggle.is-open .comment-toggle-icon{
      transform: rotate(180deg);
    }

    .link-host{
      font-size: 12px;
      color: var(--muted);
      opacity: .7;
      margin: 4px 0 0 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .muted-note{
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 10px;
    }

    .error-box{
      border: 1px solid rgba(239,68,68,.35);
      background: rgba(239,68,68,.10);
      border-radius: 14px;
      padding: 12px 14px;
      color: var(--text);
    }
  </style>
</head>

<body>
  <header>
    <nav style="display:flex;align-items:center;gap:6px;">
      <a href="/admin.html" style="font-size:1.1rem;font-weight:900;letter-spacing:-0.02em;color:var(--accent);text-decoration:none;">toutcuit</a>
      <span style="color:var(--border);">/</span>
      <a id="consoleLink" href="/admin.html" style="color:var(--muted);text-decoration:none;font-weight:600;font-size:.95rem;">Console</a>
      <span style="color:var(--border);">/</span>
      <span style="font-weight:700;color:var(--text);font-size:.95rem;">Feed</span>
    </nav>
  </header>

  <main>
    <div class="feed-header">
      <h1>Résultats</h1>
      <div class="feed-header-right">
        <div class="visible-stepper" id="visibleLinksControl" style="display: none;">
          <span class="stepper-label">Liens visibles</span>
          <button class="stepper-btn" id="visibleMinus" type="button">&minus;</button>
          <span class="stepper-value" id="visibleValue">Tous</span>
          <button class="stepper-btn" id="visiblePlus" type="button">+</button>
        </div>
        <button class="btn" id="hardReloadBtn" type="button" style="padding:8px 10px;font-size:1.1rem;line-height:1;">↺</button>
      </div>
    </div>

    <section class="card">
      <div class="feed-controls">
        <div class="chip-group" role="group" aria-label="Filtre fiabilité">
          <button class="chip" data-rel="" aria-pressed="true" type="button">Tous</button>
          <button class="chip" data-rel="good" aria-pressed="false" type="button">Fiable</button>
          <button class="chip" data-rel="mid" aria-pressed="false" type="button">Indéterminé</button>
          <button class="chip" data-rel="bad" aria-pressed="false" type="button">Pas fiable</button>
        </div>
      </div>

      <div id="loading" class="muted-note" style="margin-top: 14px;">Chargement en cours…</div>
      <div id="feedList" class="feed-list"></div>
    </section>
  </main>

  <script type="module">
    import { renderNav } from "../assets/js/nav.js";

    /* ============================
       Sidecar mode: when opened via "Feed 2 fenêtres",
       clicks on title-images open the URL in the main window
    ============================ */
    const _qp = new URLSearchParams(location.search);
    const SIDECAR_MODE = _qp.get("mode") === "sidecar";
    const MAIN_WIN_NAME = _qp.get("mainwin") || "";

    // Hide nav buttons and shrink font in sidecar mode
    renderNav(location.pathname, SIDECAR_MODE ? { variant: "sidecar" } : {});
    if (SIDECAR_MODE) {
      document.documentElement.style.fontSize = "14px";
    }

    /* ============================
       ICONS (fallback depuis labels)
    ============================ */
    const ICON_BASE = "/descripteurs/assets/icons/";
    const ICONS = {
      Journalisme: `${ICON_BASE}journalisme.svg`,
      Science: `${ICON_BASE}science.svg`,
      Gouvernement: `${ICON_BASE}gouvernement.svg`,
      Divertissement: `${ICON_BASE}divertissement.svg`,
      Organisation: `${ICON_BASE}organisation.svg`,
      Individu: `${ICON_BASE}individu.svg`,
      Inconnu: `${ICON_BASE}inconnu.svg`,

      "Vulgarisation scientifique": `${ICON_BASE}vulgarisation.svg`,
      Analyse: `${ICON_BASE}analyse.svg`,
      Reportage: `${ICON_BASE}reportage.svg`,
      Opinion: `${ICON_BASE}opinion.svg`,
      Rumeur: `${ICON_BASE}rumeur.svg`,
      Accrocheur: `${ICON_BASE}accrocheur.svg`,
      Trompeur: `${ICON_BASE}trompeur.svg`,
      Escroquerie: `${ICON_BASE}escroquerie.svg`,
      Partisan: `${ICON_BASE}partisan.svg`,
      Promotion: `${ICON_BASE}promotion.svg`,
      Annonce: `${ICON_BASE}annonce.svg`,
      Service: `${ICON_BASE}service.svg`,
      "Achat/Vente": `${ICON_BASE}achat-vente.svg`,
      "Première main": `${ICON_BASE}premiere-main.svg`,
      Tutoriel: `${ICON_BASE}tutoriel.svg`,
      Loisir: `${ICON_BASE}loisir.svg`,
      Humour: `${ICON_BASE}humour.svg`,
      Performance: `${ICON_BASE}performance.svg`,
    };

    function iconForLabel(label){
      return ICONS[String(label || "").trim()] || "";
    }

    /* ============================
       API PHP backend
    ============================ */
    const API_BASE = "/api";
    const SESSION_CODE = _qp.get("session") || "";

    if (SESSION_CODE) {
      const cl = document.getElementById("consoleLink");
      if (cl) cl.href = `/session.html?code=${encodeURIComponent(SESSION_CODE)}`;
    }

    const MAX_LIMIT = 200;
    const DEFAULT_LINKS_LIMIT = MAX_LIMIT;

    const feedEl = document.getElementById("feedList");
    const loadingEl = document.getElementById("loading");

    // Sidecar mode: intercept clicks to open articles in a correctly-sized popup.
    // Using <a target="name"> alone fails when sites like YouTube/20min clear window.name:
    // the browser falls back to a full-screen tab. window.open() with popup features ensures
    // we always get a properly-sized popup, and reuses the window when the name is preserved.
    if (SIDECAR_MODE && MAIN_WIN_NAME) {
      const FEED2_SIDE_W = 520;
      feedEl.addEventListener("click", (e) => {
        const a = e.target.closest("a[href]");
        if (!a) return;
        e.preventDefault();
        e.stopPropagation();

        const W = Math.max(800, window.screen?.availWidth  || window.innerWidth  || 1200);
        const H = Math.max(600, window.screen?.availHeight || window.innerHeight || 900);
        const X = window.screen?.availLeft ?? 0;
        const Y = window.screen?.availTop  ?? 0;
        const sideW = Math.min(FEED2_SIDE_W, Math.floor(W * 0.45));
        const artW  = W - sideW - 10;

        const win = window.open(
          a.href, MAIN_WIN_NAME,
          `popup=yes,width=${artW},height=${H},left=${X},top=${Y},resizable=yes,scrollbars=yes`
        );
        try { win?.focus(); } catch {}
      });
    }

    let allRows = [];
    let certsData = new Map(); // link_id -> certs info
    let shownLinks = 0;
    let activeRel = "";

    function escapeHtml(s){
      return String(s ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeNick(userId){
      const raw = String(userId || "").trim();
      if (!raw) return "Anonyme";
      const parts = raw.split("-").filter(Boolean);
      if (parts.length >= 2) return `${parts[1]} ${parts[0]}`;
      return raw.replaceAll("-", " ");
    }

    function rowMatchesRel(r, rel){
      if (!rel) return true;
      return String(r.reliability || "") === rel;
    }

    function pickFirstIcon(r){
      return String(r.first_icon || r.firstIcon || "").trim() || "";
    }
    function pickLastIcon(r){
      return String(r.last_icon || r.lastIcon || "").trim() || "";
    }

    function toRelClass(rel){
      return rel === "good" ? "rel-good" : rel === "mid" ? "rel-mid" : rel === "bad" ? "rel-bad" : "";
    }

    function linkSortKey(linkId){
      // Chercher d'abord dans certsData
      for (const [url, cert] of certsData.entries()) {
        if (cert.linkId === linkId) {
          return cert.linkNumber || Number.POSITIVE_INFINITY;
        }
      }
      // Fallback: essayer d'extraire un nombre du link_id
      const m = String(linkId || "").match(/(\d+)\s*$/);
      return m ? Number(m[1]) : Number.POSITIVE_INFINITY;
    }

    function linkNumber(linkId){
      // Chercher d'abord dans certsData
      for (const [url, cert] of certsData.entries()) {
        if (cert.linkId === linkId) {
          return String(cert.linkNumber || "?");
        }
      }
      // Fallback: essayer d'extraire un nombre du link_id
      const m = String(linkId || "").match(/(\d+)\s*$/);
      return m ? String(Number(m[1])) : "?";
    }

    // FNV-1a 32-bit => hex
    function fnv1aHex(str){
      let h = 0x811c9dc5;
      for (let i = 0; i < str.length; i++){
        h ^= str.charCodeAt(i);
        h = (h + ((h << 1) + (h << 4) + (h << 7) + (h << 8) + (h << 24))) >>> 0;
      }
      return ("0000000" + h.toString(16)).slice(-8);
    }

    // ✅ NEW: Fonction pour créer link_id depuis URL (identique à liens.html)
    function urlToLinkId(url){
      const hash = fnv1aHex(url);
      return `link_${hash}`;
    }

    function mostRecentTimestamp(rows){
      let best = 0;
      for (const r of rows){
        const raw = r.timestamp || r.timestamp_client || r.timestamp_server;
        const t = raw ? new Date(raw).getTime() : 0;
        if (!isNaN(t) && t > best) best = t;
      }
      return best ? new Date(best).toISOString() : "";
    }

    function normalizeLinkId(r){
      return String(r.link_id || r.linkId || "").trim();
    }

    /* ============================
       CSV parser simple (réutilisé de liens.html)
    ============================ */
    function parseCSV(text){
      const rows = [];
      let row = [];
      let cur = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++){
        const ch = text[i];
        const next = text[i + 1];

        if (ch === '"'){
          if (inQuotes && next === '"'){ cur += '"'; i++; }
          else { inQuotes = !inQuotes; }
          continue;
        }

        if (!inQuotes && ch === ","){ row.push(cur); cur = ""; continue; }

        if (!inQuotes && (ch === "\n" || ch === "\r")){
          if (ch === "\r" && next === "\n") i++;
          row.push(cur);
          rows.push(row);
          row = [];
          cur = "";
          continue;
        }

        cur += ch;
      }

      if (cur.length || row.length){ row.push(cur); rows.push(row); }
      return rows;
    }

    function normalizeUrl(raw){
      let u = String(raw || "").trim();
      if (!u) return null;
      if (!/^https?:\/\//i.test(u)) u = "https://" + u;
      try{
        const url = new URL(u);
        if (url.protocol !== "http:" && url.protocol !== "https:") return null;
        return url.toString();
      }catch{
        return null;
      }
    }

    /* ============================
       Load CERTs data from API
    ============================ */
    async function loadCertsData(){
      if (!SESSION_CODE) return;
      try{
        const res = await fetch(`${API_BASE}/sessions/certs.php?session=${encodeURIComponent(SESSION_CODE)}`, { cache: "no-store" });
        if (!res.ok) throw new Error("Failed to load CERTs");

        const certs = await res.json();

        certsData.clear();
        let certsCount = 0;

        for (const cert of certs){
          const title = cert.title || "";
          const rawUrl = cert.url || "";
          const url = normalizeUrl(rawUrl);
          if (!url) continue;

          const idx = (cert.position || 0) + 1;
          const linkId = urlToLinkId(url);

          const descriptor1 = cert.descriptor1 || "";
          const descriptor2 = cert.descriptor2 || "";
          const reliability = cert.reliability || "";
          const threePhrases = cert.three_phrases || "";
          const context = cert.context || "";
          const content = cert.content || "";
          const reliabilityText = cert.reliability_text || "";
          const references = cert.references_text || "";

          const hasCertsContent = descriptor1 || descriptor2 || threePhrases || context || content || reliabilityText || references;

          certsData.set(url, {
            linkId,
            linkNumber: idx,
            certId: cert.id,
            title,
            expert: cert.expert || "",
            certDate: cert.cert_date || "",
            descriptor1,
            descriptor2,
            reliability,
            threePhrases,
            context,
            content,
            reliabilityText,
            references,
            hasCertsContent
          });

          if (hasCertsContent) certsCount++;
        }

        console.log(`CERTs loaded: ${certsCount} with content, ${certsData.size} total`);
      }catch(err){
        console.error("Failed to load CERTs data:", err);
      }
    }

    /* ============================
       Typography image component (vignette)
    ============================ */
    class TypographyImage {
      constructor(container, options = {}) {
        this.container = container;
        this.text = options.text || container.dataset.text || '';
        this.number = options.number || container.dataset.number || '';
        this.maxFontSize = options.maxFontSize || 220;
        this.minFontSize = options.minFontSize || 16;
        if (!this.text) return;
        this.init();
      }
      init() {
        // Ajouter le numéro
        if (this.number) {
          this.numberEl = document.createElement("div");
          this.numberEl.className = "typography-image__number";
          this.numberEl.textContent = this.number;
          this.container.appendChild(this.numberEl);
        }
        
        // Ajouter le texte
        this.textEl = document.createElement("div");
        this.textEl.className = "typography-image__text";
        this.textEl.textContent = this.text;
        this.container.appendChild(this.textEl);
        
        this.fitText();
        this.observeResize();
      }
      fitText() {
        let min = this.minFontSize;
        let max = this.maxFontSize;
        const el = this.textEl;
        const box = this.container;
        const cs = getComputedStyle(box);
        const availW = box.clientWidth - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight);
        const availH = box.clientHeight - parseFloat(cs.paddingTop) - parseFloat(cs.paddingBottom);

        while (min <= max) {
          const mid = (min + max) >> 1;
          el.style.fontSize = mid + "px";
          if (el.scrollWidth <= availW && el.scrollHeight <= availH) {
            min = mid + 1;
          } else {
            max = mid - 1;
          }
        }
        el.style.fontSize = Math.max(this.minFontSize, max) + "px";
      }
      observeResize() {
        this.resizeObserver = new ResizeObserver(() => {
          requestAnimationFrame(() => this.fitText());
        });
        this.resizeObserver.observe(this.container);
      }
      static initNew(selector = '.typography-image') {
        document.querySelectorAll(selector).forEach(container => {
          if (container.dataset.typoInit === "1") return;
          container.dataset.typoInit = "1";
          new TypographyImage(container);
        });
      }
    }

    function gradientForLinkId(linkId){
      const n = Number(linkNumber(linkId));
      if (!isFinite(n)) return "linear-gradient(135deg, #667eea, #764ba2)";
      const palettes = [
        ["#667eea", "#764ba2"],
        ["#4facfe", "#00f2fe"],
        ["#f093fb", "#f5576c"],
        ["#43e97b", "#38f9d7"],
        ["#fa709a", "#fee140"],
        ["#30cfd0", "#330867"],
        ["#a1c4fd", "#c2e9fb"],
        ["#fbc2eb", "#a6c1ee"],
        ["#fddb92", "#d1fdff"],
      ];
      const p = palettes[(n - 1) % palettes.length];
      return `linear-gradient(135deg, ${p[0]}, ${p[1]})`;
    }

    /* ============================
       Grouping logic
       -> 1 lien = 1 section
       -> 1 couple (rel + first + last) = 1 carte (desc-card)
    ============================ */
    function groupRows(rows){
      const byLink = new Map();

      for (const r of rows){
        const linkId = normalizeLinkId(r) || "link-?";

        const title = String(r.link_title || "(Sans titre)");
        const url = String(r.link_url || "");
        const href = url && /^https?:\/\//i.test(url) ? url : "";

        if (!byLink.has(linkId)){
          byLink.set(linkId, {
            link_id: linkId,
            link_title: title,
            link_href: href,
            rows: []
          });
        }

        const slot = byLink.get(linkId);
        if (slot){
          if ((slot.link_title === "(Sans titre)" || !slot.link_title) && title && title !== "(Sans titre)") slot.link_title = title;
          if (!slot.link_href && href) slot.link_href = href;
          slot.rows.push(r);
        }
      }

      const linkGroups = [];
      for (const obj of byLink.values()){
        const byDesc = new Map();

        // ✅ Filtrer les rows synthétiques (sans descripteurs)
        const validRows = obj.rows.filter(r => {
          const hasDescriptors = r.first_label || r.last_label;
          return hasDescriptors;
        });

        for (const r of validRows){
          const rel = String(r.reliability || "");
          const firstLabel = String(r.first_label || "");
          const lastLabel  = String(r.last_label  || "");
          const key = [rel, firstLabel, lastLabel].join("||");

          const firstIcon = pickFirstIcon(r) || iconForLabel(firstLabel);
          const lastIcon  = pickLastIcon(r)  || iconForLabel(lastLabel);

          if (!byDesc.has(key)){
            byDesc.set(key, {
              rel,
              relClass: toRelClass(rel),
              firstLabel,
              lastLabel,
              firstIcon,
              lastIcon,
              users: []
            });
          }

          const nick = normalizeNick(r.user_id);
          const comment = String(r.comment || "").trim();

          byDesc.get(key).users.push({ nick, comment });
        }

        const descGroups = Array.from(byDesc.values()).sort((a,b) => {
          const rank = (x) => x === "good" ? 0 : x === "mid" ? 1 : x === "bad" ? 2 : 9;
          const rr = rank(a.rel) - rank(b.rel);
          if (rr) return rr;
          const s1 = (a.firstLabel + " " + a.lastLabel).toLowerCase();
          const s2 = (b.firstLabel + " " + b.lastLabel).toLowerCase();
          return s1.localeCompare(s2);
        });

        linkGroups.push({
          link_id: obj.link_id,
          link_title: obj.link_title,
          link_href: obj.link_href,
          descGroups
        });
      }

      linkGroups.sort((a,b) => {
        const ka = linkSortKey(a.link_id);
        const kb = linkSortKey(b.link_id);
        if (ka !== kb) return ka - kb;
        return String(a.link_id).localeCompare(String(b.link_id));
      });

      return linkGroups;
    }

        // Nettoyer le texte : supprimer les puces/bullets en début de ligne
        function stripBullets(str){

        })();

        const contentParas = (certs.content || "").split(/\n+/).map(s => stripBullets(s)).filter(Boolean);
        const textBlockHtml = (contentParas.length || referencesHtml) ? `
          <div class="certs-block certs-block--purple">

                ${dg.users.map((u) => {
                  const hasLongComment = u.comment && u.comment.length > 80;

      return `
        <section class="link-group" data-link-id="${escapeHtml(g.link_id)}">
          ${media}
          ${certsHtml}
          ${g.descGroups.length ? cardsHtml : `<div class="muted-note">Aucun résultat d'élève pour ce lien.</div>`}

    function render(reset = false){
      if (!feedEl) return;

      const filteredRows = allRows
        .filter(r => rowMatchesRel(r, activeRel));

      const grouped = groupRows(filteredRows);

      if (reset){
        shownLinks = 0;
        feedEl.innerHTML = "";
      }

      const nextGroups = grouped.slice(shownLinks, shownLinks + DEFAULT_LINKS_LIMIT);

      if (!shownLinks && !nextGroups.length){
        feedEl.innerHTML = `<div class="error-box">Aucun résultat.</div>`;
        if (loadingEl) loadingEl.style.display = "none";
        return;
      }

      feedEl.insertAdjacentHTML("beforeend", nextGroups.map(renderLinkGroup).join(""));
      shownLinks += nextGroups.length;

      TypographyImage.initNew(".typography-image");

      document.querySelectorAll(".comment-toggle").forEach(btn => {

          btn.querySelector(".comment-toggle-label").textContent = isOpen ? "Voir plus" : "Voir moins";

      // ✅ Ajouter les event listeners pour les toggles CERTs (partie haute)

          const linkId = toggle.getAttribute("data-link-id");

            toggle.classList.toggle("is-open", !isOpen);
          }
        });

      if (loadingEl) loadingEl.style.display = "none";
    }

    async function fetchJsonLoose(url){
      const res = await fetch(url, { cache: "no-store" });
      const text = await res.text();

      if (!res.ok){
        const snippet = text.slice(0, 600);
        throw new Error(`HTTP ${res.status} – ${snippet}`);
      }

      try{
        return JSON.parse(text);
      }catch{
        const snippet = text.slice(0, 900);
        throw new Error("Réponse non-JSON.\n\n" + snippet);
      }
    }

      if (Array.isArray(payload)) return payload;
      return [];

          link_title: linkTitle,
          link_url: linkUrl,
          first_label: r.first_label || "",
          last_label: r.last_label || "",
          reliability: r.reliability || "",
          comment: r.comment || ""
        };
      });

      // Add synthetic rows for CERTs without student results
      const feedCertIds = new Set(rawFeedRows.map(r => String(r.cert_id)));
      const syntheticRows = [];

      for (const [url, cert] of certsData.entries()) {
        if (cert.hasCertsContent && !feedCertIds.has(String(cert.certId))) {
          syntheticRows.push({
            user_id: "",
            link_id: cert.linkId,
            link_title: cert.title || "(Sans titre)",
            link_url: url,
            first_label: "",
            last_label: "",
            reliability: "",
            comment: "",
            is_synthetic: true
          });
        }
      }

      // Filter out results for invisible links (no matching visible cert)
      const visibleFeedRows = feedRows.filter(r => r.link_id);

      allRows = [...visibleFeedRows, ...syntheticRows];
      render(true);
    }

    document.querySelectorAll(".chip[data-rel]").forEach((btn) => {
      btn.addEventListener("click", () => {
        activeRel = btn.getAttribute("data-rel") || "";
        document.querySelectorAll(".chip[data-rel]").forEach((b) => {
          b.setAttribute("aria-pressed", (b === btn) ? "true" : "false");
        });
        render(true);
      });
    });


    document.getElementById("hardReloadBtn")?.addEventListener("click", () => {
      location.reload(true);
    });

    // Visible links stepper (only for authenticated teachers)
    (async function initVisibleStepper() {
      const token = localStorage.getItem("tc_token");
      if (!token || !SESSION_CODE) return;

      // Get session info to read visible_links and session_id
      let sessions;
      try {
        const res = await fetch(`${API_BASE}/sessions/list.php`, {
          headers: { "Authorization": `Bearer ${token}` }
        });
        sessions = await res.json();
      } catch { return; }

      const session = (Array.isArray(sessions) ? sessions : []).find(
        s => s.code === SESSION_CODE
      );
      if (!session) return;

      // Get total cert count
      let totalCerts = 0;
      try {
        const res = await fetch(`${API_BASE}/sessions/certs.php?session=${encodeURIComponent(SESSION_CODE)}&all=1`, { cache: "no-store" });
        const certs = await res.json();
        totalCerts = Array.isArray(certs) ? certs.length : 0;
      } catch {}

      let visibleLinks = session.visible_links ?? 0;

      const control = document.getElementById("visibleLinksControl");
      const valEl = document.getElementById("visibleValue");
      const minusBtn = document.getElementById("visibleMinus");
      const plusBtn = document.getElementById("visiblePlus");

      function updateUI() {
        valEl.textContent = visibleLinks === 0 ? "Tous" : visibleLinks;
        minusBtn.disabled = visibleLinks <= 0;
        plusBtn.disabled = totalCerts > 0 && visibleLinks >= totalCerts;
      }

      async function saveAndReload(val) {
        try {
          await fetch(`${API_BASE}/sessions/update.php`, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
            body: JSON.stringify({ session_id: session.id, visible_links: val })
          });
          await loadAll();
        } catch {}
      }

      minusBtn.addEventListener("click", () => {
        if (visibleLinks <= 0) return;
        visibleLinks = visibleLinks === 1 ? 0 : visibleLinks - 1;
        updateUI();
        saveAndReload(visibleLinks);
      });

      plusBtn.addEventListener("click", () => {
        if (totalCerts > 0 && visibleLinks >= totalCerts) return;
        visibleLinks = visibleLinks === 0 ? 1 : visibleLinks + 1;
        updateUI();
        saveAndReload(visibleLinks);
      });

      control.style.display = "flex";
      updateUI();
    })();

    /* ============================
       Polling — detect new student responses
       Interval: 10s with ±2s jitter, pauses when tab hidden
    ============================ */
    let _pollTimer = null;
    let _pollInterval = 10000;
    let _pollBackoff = 1;
    let _lastResponseCount = null;
    let _lastPollUpdate = null;
    let _lastEtag = null;

    async function pollForUpdates(){
      if (!SESSION_CODE) return;
      try {
        const headers = {};
        if (_lastEtag) headers["If-None-Match"] = _lastEtag;

        const res = await fetch(
          `${API_BASE}/sessions/poll.php?session=${encodeURIComponent(SESSION_CODE)}`,
          { cache: "no-store", headers }
        );

        if (res.status === 304) {
          _pollBackoff = 1;
          return;
        }

        if (!res.ok) throw new Error(`Poll HTTP ${res.status}`);

        _lastEtag = res.headers.get("ETag") || null;
        const data = await res.json();
        _pollBackoff = 1;

        const newCount = data.response_count ?? null;
        const newUpdate = data.last_update ?? null;

        const changed = (_lastResponseCount !== null && newCount !== _lastResponseCount)
                     || (_lastPollUpdate !== null && newUpdate !== _lastPollUpdate);

        if (changed) {
          console.log(`[poll] responses changed: ${_lastResponseCount} → ${newCount}`);
          await loadAll();
        }

        _lastResponseCount = newCount;
        _lastPollUpdate = newUpdate;

      } catch(err) {
        console.warn("[poll] error:", err.message);
        _pollBackoff = Math.min(_pollBackoff * 2, 4);
      }
    }

    function schedulePoll(){
      if (_pollTimer) clearTimeout(_pollTimer);
      const jitter = (Math.random() * 4000) - 2000;
      const delay = (_pollInterval * _pollBackoff) + jitter;
      _pollTimer = setTimeout(async () => {
        await pollForUpdates();
        schedulePoll();
      }, Math.max(5000, delay));
    }

    function startPolling(){
      if (_pollTimer) return;
      schedulePoll();
    }

    function stopPolling(){
      if (_pollTimer) { clearTimeout(_pollTimer); _pollTimer = null; }
    }

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "hidden") stopPolling();
      else startPolling();
    });

    /* ============================
       Init
    ============================ */
    try{
      await loadAll();

      // Capture initial state and start polling
      if (SESSION_CODE) {
        try {
          const initRes = await fetch(
            `${API_BASE}/sessions/poll.php?session=${encodeURIComponent(SESSION_CODE)}`,
            { cache: "no-store" }
          );
          if (initRes.ok) {
            const initData = await initRes.json();
            _lastResponseCount = initData.response_count ?? null;
            _lastPollUpdate = initData.last_update ?? null;
            _lastEtag = initRes.headers.get("ETag") || null;
          }
        } catch {}
        startPolling();
      }
    }catch(err){
      console.error(err);
      if (feedEl) {
        feedEl.innerHTML = `<div class="error-box">Impossible de charger le feed.</div>`;
      }
      if (loadingEl) loadingEl.style.display = "none";
    }
  </script>
