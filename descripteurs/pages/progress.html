<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
  <title>Résultats — toutcuit.ch</title>

  <link rel="stylesheet" href="../assets/css/main.css" />
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

  <style>
    main { max-width: 860px !important; }
    header { display: flex; align-items: center; gap: 6px; }

    /* ── Summary strip ── */
    .summary-strip {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      align-items: baseline;
      margin: 12px 0 20px 0;
    }
    .summary-stat {
      font-size: .88rem;
      color: var(--muted);
    }
    .summary-stat strong {
      font-size: 1.25rem;
      font-weight: 900;
      color: var(--text);
      margin-right: 3px;
    }

    /* ── View toggle ── */
    .view-toggle {
      display: inline-flex;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .view-toggle button {
      padding: 7px 18px;
      font-size: .82rem;
      font-weight: 700;
      border: none;
      background: none;
      color: var(--muted);
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .view-toggle button.active {
      background: var(--accent);
      color: #fff;
    }

    .sort-btn, .reset-btn, .delete-user-btn {
      padding: 7px 14px;
      font-size: .82rem;
      font-weight: 700;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      background: none;
      color: var(--muted);
      cursor: pointer;
      margin-left: 8px;
      transition: border-color .15s, color .15s;
    }
    .sort-btn:hover { border-color: var(--accent); color: var(--accent); }
    .sort-btn.active { border-color: var(--accent); color: var(--accent); }
    .reset-btn { color: #b91c1c; border-color: rgba(239,68,68,.3); }
    .reset-btn:hover { border-color: #b91c1c; }
    .export-btn {
      padding: 7px 14px;
      font-size: .82rem;
      font-weight: 700;
      border: 1.5px solid var(--accent);
      border-radius: 9px;
      background: none;
      color: var(--accent);
      cursor: pointer;
      margin-left: 8px;
      transition: background .15s, color .15s;
    }
    .export-btn:hover { background: var(--accent); color: #fff; }
    .delete-user-btn {
      margin-left: 0;
      padding: 4px 10px;
      font-size: .75rem;
      color: #b91c1c;
      border-color: rgba(239,68,68,.25);
    }
    .delete-user-btn:hover { border-color: #b91c1c; }

    /* ── Cards ── */
    .cards { display: flex; flex-direction: column; gap: 10px; }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      box-shadow: var(--shadow);
    }

    .card-top {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 10px;
    }
    .card-num {
      width: 28px; height: 28px;
      border-radius: 7px;
      background: var(--accent);
      color: #fff;
      font-size: .8rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .card-title {
      font-weight: 700;
      font-size: .92rem;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-score {
      font-weight: 800;
      font-size: .88rem;
      flex-shrink: 0;
      color: var(--text);
    }

    /* ── Progress bar ── */
    .bar-wrap {
      height: 7px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .bar-fill {
      height: 100%;
      border-radius: 4px;
      background: var(--accent);
      transition: width .3s;
    }

    .bar-label {
      font-size: .75rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 2px;
    }

    /* ── Pebble grid (students per link / links per student) ── */
    .pebble-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      font-size: .8rem;
    }
    .pebble-entry {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      transition: opacity .15s;
    }
    .pebble-entry:hover { opacity: .7; }
    .pebble-name {
      font-weight: 600;
      color: var(--text);
      margin-right: 2px;
    }
    .pebble {
      font-size: .7rem;
      line-height: 1;
    }
    .pebble-ok   { color: var(--text); }
    .pebble-fail { color: var(--border); }
    .pebble-none { color: var(--border); }

    /* ── Inline detail (expanded) ── */
    .detail-inline {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      display: none;
    }
    .detail-inline.open { display: block; }

    .detail-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .82rem;
    }
    .detail-table th {
      text-align: left;
      font-weight: 700;
      font-size: .75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .03em;
      padding: 4px 8px;
      border-bottom: 1px solid var(--border);
    }
    .detail-table td {
      padding: 6px 8px;
      border-bottom: 1px solid rgba(0,0,0,.04);
    }
    .detail-match { font-weight: 800; color: var(--text); }
    .detail-miss  { font-weight: 400; color: var(--border); }

    /* ── States ── */
    .no-data {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
    }
    #loading {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
    }
    .error-box {
      background: rgba(239,68,68,.08);
      border: 1px solid rgba(239,68,68,.25);
      border-radius: 10px;
      padding: 14px 16px;
      color: #b91c1c;
      font-size: 0.9rem;
    }

    @media (max-width: 600px) {
      .card { padding: 12px 14px; }
      .pebble-grid { gap: 6px 10px; }
      .summary-strip { gap: 14px; }
    }
  </style>
</head>
<body>

  <header>
    <nav style="display:flex;align-items:center;gap:6px;">
      <a href="/admin.html" style="font-size:1.1rem;font-weight:900;letter-spacing:-0.02em;color:var(--accent);text-decoration:none;">toutcuit</a>
      <span style="color:var(--border);">/</span>
      <a id="consoleLink" href="/admin.html" style="color:var(--muted);text-decoration:none;font-weight:600;font-size:.95rem;">Console</a>
      <span style="color:var(--border);">/</span>
      <span style="font-weight:700;color:var(--text);font-size:.95rem;">Résultats des élèves</span>
      <span style="flex:1;"></span>
      <span id="userName" style="font-size:.82rem;color:var(--muted);"></span>
      <button id="logoutBtn" style="font-size:.82rem;color:var(--accent);cursor:pointer;border:none;background:none;font-weight:600;">Déconnexion</button>
    </nav>
  </header>

  <main>
    <div id="loading">Chargement des données…</div>
    <div id="content" style="display:none;"></div>
  </main>

  <script type="module">

    const API_BASE = "/api";
    const PAGE_PARAMS = new URLSearchParams(location.search);
    const SESSION_CODE = PAGE_PARAMS.get("session") || "";

    if (SESSION_CODE) {
      const cl = document.getElementById("consoleLink");
      if (cl) cl.href = `/session.html?code=${encodeURIComponent(SESSION_CODE)}`;
    }

    try {
      const t = JSON.parse(localStorage.getItem("tc_teacher"));
      if (t?.name) document.getElementById("userName").textContent = t.name;
    } catch {}
    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("tc_token");
      localStorage.removeItem("tc_teacher");
      window.location.href = "/admin.html";
    });

    /* ── Helpers ── */
    function fnv1aHex(str) {
      let h = 0x811c9dc5;
      for (let i = 0; i < str.length; i++) {
        h ^= str.charCodeAt(i);
        h = (h + ((h << 1) + (h << 4) + (h << 7) + (h << 8) + (h << 24))) >>> 0;
      }
      return ("0000000" + h.toString(16)).slice(-8);
    }

    function urlToLinkId(url) { return `link_${fnv1aHex(url)}`; }

    function normalizeUrl(raw) {
      let u = String(raw || "").trim();
      if (!u) return null;
      if (!/^https?:\/\//i.test(u)) u = "https://" + u;
      try {
        const url = new URL(u);
        if (url.protocol !== "http:" && url.protocol !== "https:") return null;
        return url.toString();
      } catch { return null; }
    }

    function esc(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    function pct(n, d) { return d ? Math.round(n / d * 100) : 0; }

    function pebble(ok) {
      return ok
        ? '<span class="pebble pebble-ok">&#9679;</span>'
        : '<span class="pebble pebble-fail">&#9679;</span>';
    }

    function icon(ok) {
      return ok
        ? '<span class="detail-match">&#10003;</span>'
        : '<span class="detail-miss">&#10007;</span>';
    }

    /* ── Load CERTs ── */
    async function loadCerts() {
      if (!SESSION_CODE) throw new Error("no_session");
      const res = await fetch(`${API_BASE}/sessions/certs.php?session=${encodeURIComponent(SESSION_CODE)}`, { cache: "no-store" });
      if (!res.ok) throw new Error("Failed to load CERTs");
      const arr = await res.json();

      const certs = new Map();
      for (const cert of arr) {
        const url = normalizeUrl(cert.url || "");
        if (!url) continue;
        const linkId = urlToLinkId(url);
        if (cert.descriptor1 || cert.descriptor2 || cert.reliability) {
          certs.set(linkId, {
            linkNumber: (cert.position || 0) + 1,
            certId: cert.id,
            title: cert.title || "",
            descriptor1: cert.descriptor1 || "",
            descriptor2: cert.descriptor2 || "",
            reliability: cert.reliability || ""
          });
        }
      }
      return certs;
    }

    /* ── Load student results ── */
    async function loadFeed() {
      if (!SESSION_CODE) return [];
      const res = await fetch(`${API_BASE}/student/feed.php?session=${encodeURIComponent(SESSION_CODE)}`, { cache: "no-store" });
      if (!res.ok) throw new Error("Failed to load student results");
      const rows = await res.json();
      return rows.map(r => ({
        user_id: r.user_id || "",
        cert_id: r.cert_id,
        link_id: "",
        link_url: "",
        first_label: r.first_label || "",
        last_label: r.last_label || "",
        reliability: r.reliability || "",
      }));
    }

    /* ── Scoring ── */
    function scoreResult(row, cert) {
      const sRel = String(row.reliability || "").toLowerCase();
      const sFirst = String(row.first_label || "").trim().toLowerCase();
      const sLast = String(row.last_label || "").trim().toLowerCase();
      const cFirst = cert.descriptor1.trim().toLowerCase();
      const cLast = cert.descriptor2.trim().toLowerCase();

      const relOk = !!(sRel && sRel === cert.reliability);
      const firstOk = !!(sFirst && sFirst === cFirst);
      const lastOk = !!(sLast && sLast === cLast);

      return {
        score: (relOk ? 1 : 0) + (firstOk ? 1 : 0) + (lastOk ? 1 : 0),
        relOk, firstOk, lastOk,
        studentRel: sRel, studentFirst: sFirst, studentLast: sLast,
        certRel: cert.reliability, certFirst: cFirst, certLast: cLast,
      };
    }

    /* ── Main ── */
    try {
      const [certs, feedRows] = await Promise.all([loadCerts(), loadFeed()]);

      const certIdToLinkId = new Map();
      for (const [linkId, cert] of certs) {
        if (cert.certId) certIdToLinkId.set(String(cert.certId), linkId);
      }

      const rows = feedRows.map(r => {
        let linkId = r.link_id;
        if (!linkId && r.cert_id) linkId = certIdToLinkId.get(String(r.cert_id)) || "";
        if (!linkId) {
          const normUrl = r.link_url ? (normalizeUrl(r.link_url) || r.link_url) : "";
          linkId = normUrl ? urlToLinkId(normUrl) : "";
        }
        return { ...r, link_id: linkId };
      });

      const scoredRows = rows.filter(r => (r.first_label || r.last_label) && certs.has(r.link_id));

      if (!scoredRows.length) {
        document.getElementById("loading").style.display = "none";
        const c = document.getElementById("content");
        c.style.display = "block";
        c.innerHTML = '<div class="no-data">Aucune donnée à afficher.<br>Il faut des résultats d\'élèves <em>et</em> des réponses CERT pour les mêmes liens.</div>';
        throw new Error("stop");
      }

      // Per-student, per-link details
      const allDetails = new Map();
      for (const r of scoredRows) {
        const userId = String(r.user_id || "Anonyme").trim();
        const linkId = r.link_id;
        const d = scoreResult(r, certs.get(linkId));
        if (!allDetails.has(userId)) allDetails.set(userId, new Map());
        const prev = allDetails.get(userId).get(linkId);
        if (!prev || d.score > prev.score) allDetails.get(userId).set(linkId, d);
      }

      // All link IDs sorted by position
      const allLinkIds = [...new Set(scoredRows.map(r => r.link_id))];
      allLinkIds.sort((a, b) => (certs.get(a)?.linkNumber ?? 999) - (certs.get(b)?.linkNumber ?? 999));

      const students = allDetails;

      const studentIds = [...students.keys()].sort((a, b) => a.localeCompare(b));
      const totalStudents = studentIds.length;
      const totalLinks = allLinkIds.length;

      // Global score
      let grandTotal = 0, grandMax = 0;
      for (const links of students.values()) {
        for (const d of links.values()) { grandTotal += d.score; grandMax += 3; }
      }

      /* ── Render ── */
      document.getElementById("loading").style.display = "none";
      const content = document.getElementById("content");
      content.style.display = "block";

      content.innerHTML = `
        <div class="summary-strip">
          <div class="summary-stat"><strong>${totalStudents}</strong> élève${totalStudents > 1 ? "s" : ""}</div>
          <div class="summary-stat"><strong>${totalLinks}</strong> lien${totalLinks > 1 ? "s" : ""}</div>
          <div class="summary-stat"><strong>${pct(grandTotal, grandMax)}%</strong> score global</div>
          <div class="summary-stat" style="font-size:.78rem;">(${grandTotal} / ${grandMax} pts)</div>
        </div>
        <div style="display:flex;align-items:center;flex-wrap:wrap;margin-bottom:16px;">
          <div class="view-toggle" style="margin-bottom:0;">
            <button class="active" data-view="links">Par lien</button>
            <button data-view="students">Par élève</button>
          </div>
          <button class="sort-btn" id="sortBtn" data-sort="none">Trier ↕</button>
          <span style="flex:1;"></span>
          <button class="export-btn" id="exportBtn">Télécharger Excel</button>
          <button class="reset-btn" id="resetAllBtn">Tout effacer</button>
        </div>
        <div id="viewLinks" class="cards"></div>
        <div id="viewStudents" class="cards" style="display:none;"></div>
      `;

      /* ── View toggle ── */
      content.querySelectorAll(".view-toggle button").forEach(btn => {
        btn.addEventListener("click", () => {
          content.querySelectorAll(".view-toggle button").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          document.getElementById("viewLinks").style.display = btn.dataset.view === "links" ? "flex" : "none";
          document.getElementById("viewStudents").style.display = btn.dataset.view === "students" ? "flex" : "none";
        });
      });

      /* ── View: Par lien ── */
      const linksContainer = document.getElementById("viewLinks");

      for (const linkId of allLinkIds) {
        const cert = certs.get(linkId);
        const num = cert?.linkNumber ?? "?";

        // Gather student scores for this link
        let linkTotal = 0, linkResponses = 0;
        const linkStudents = [];
        for (const userId of studentIds) {
          const d = students.get(userId).get(linkId);
          if (d) {
            linkTotal += d.score;
            linkResponses++;
            linkStudents.push({ userId, d });
          }
        }
        const linkMax = linkResponses * 3;
        const ratio = linkMax ? linkTotal / linkMax : 0;

        // Pebbles for each student
        const dotsHtml = linkStudents.map(({ userId, d }) => `
          <span class="pebble-entry" data-detail="link-${num}-${esc(userId)}">
            <span class="pebble-name">${esc(userId)}</span>
            ${pebble(d.relOk)}${pebble(d.firstOk)}${pebble(d.lastOk)}
          </span>
        `).join("");

        // Detail table (expanded)
        const detailRows = linkStudents.map(({ userId, d }) => `
          <tr>
            <td style="font-weight:600;">${esc(userId)}</td>
            <td>${icon(d.relOk)} ${esc(d.studentRel || "—")} <span style="color:var(--muted);">/ ${esc(d.certRel || "—")}</span></td>
            <td>${icon(d.firstOk)} ${esc(d.studentFirst || "—")} <span style="color:var(--muted);">/ ${esc(d.certFirst || "—")}</span></td>
            <td>${icon(d.lastOk)} ${esc(d.studentLast || "—")} <span style="color:var(--muted);">/ ${esc(d.certLast || "—")}</span></td>
            <td style="font-weight:800;">${d.score}/3</td>
          </tr>
        `).join("");

        linksContainer.insertAdjacentHTML("beforeend", `
          <div class="card" data-ratio="${ratio.toFixed(4)}">
            <div class="card-top">
              <span class="card-num">${num}</span>
              <span class="card-title">${esc(cert?.title || "Sans titre")}</span>
              <span class="card-score">${linkTotal}/${linkMax}</span>
            </div>
            <div class="bar-label">${pct(linkTotal, linkMax)}% · ${linkResponses} élève${linkResponses > 1 ? "s" : ""}</div>
            <div class="bar-wrap"><div class="bar-fill" style="width:${pct(linkTotal, linkMax)}%;"></div></div>
            <div class="pebble-grid">${dotsHtml}</div>
            <div class="detail-inline" id="detail-link-${num}">
              <table class="detail-table">
                <thead><tr><th>Élève</th><th>Couleur</th><th>1er desc.</th><th>2e desc.</th><th>Score</th></tr></thead>
                <tbody>${detailRows}</tbody>
              </table>
            </div>
          </div>
        `);
      }

      /* ── View: Par élève ── */
      const studentsContainer = document.getElementById("viewStudents");

      for (const userId of studentIds) {
        const links = students.get(userId);
        let sTotal = 0, sMax = 0;
        for (const d of links.values()) { sTotal += d.score; sMax += 3; }
        const ratio = sMax ? sTotal / sMax : 0;

        // Pebbles for each link
        const dotsHtml = allLinkIds.map(linkId => {
          const cert = certs.get(linkId);
          const num = cert?.linkNumber ?? "?";
          const d = links.get(linkId);
          if (!d) return `<span class="pebble-entry" style="cursor:default;"><span class="pebble-name" style="color:var(--muted);">L${num}</span><span class="pebble pebble-none">&#9679;</span><span class="pebble pebble-none">&#9679;</span><span class="pebble pebble-none">&#9679;</span></span>`;
          return `
            <span class="pebble-entry" data-detail="student-${esc(userId)}-${num}">
              <span class="pebble-name">L${num}</span>
              ${pebble(d.relOk)}${pebble(d.firstOk)}${pebble(d.lastOk)}
            </span>
          `;
        }).join("");

        // Detail table
        const detailRows = allLinkIds.map(linkId => {
          const cert = certs.get(linkId);
          const num = cert?.linkNumber ?? "?";
          const d = links.get(linkId);
          if (!d) return `<tr><td style="color:var(--muted);">Lien ${num}</td><td colspan="4" style="color:var(--muted);">—</td></tr>`;
          return `
            <tr>
              <td style="font-weight:600;">Lien ${num}</td>
              <td>${icon(d.relOk)} ${esc(d.studentRel || "—")} <span style="color:var(--muted);">/ ${esc(d.certRel || "—")}</span></td>
              <td>${icon(d.firstOk)} ${esc(d.studentFirst || "—")} <span style="color:var(--muted);">/ ${esc(d.certFirst || "—")}</span></td>
              <td>${icon(d.lastOk)} ${esc(d.studentLast || "—")} <span style="color:var(--muted);">/ ${esc(d.certLast || "—")}</span></td>
              <td style="font-weight:800;">${d.score}/3</td>
            </tr>
          `;
        }).join("");

        studentsContainer.insertAdjacentHTML("beforeend", `
          <div class="card" data-ratio="${ratio.toFixed(4)}" data-user-id="${esc(userId)}">
            <div class="card-top">
              <span class="card-title">${esc(userId)}</span>
              <span class="card-score">${sTotal}/${sMax} pts</span>
              <button class="delete-user-btn" data-delete-user="${esc(userId)}">Effacer</button>
            </div>
            <div class="bar-label">${pct(sTotal, sMax)}% · ${links.size} lien${links.size > 1 ? "s" : ""}</div>
            <div class="bar-wrap"><div class="bar-fill" style="width:${pct(sTotal, sMax)}%;"></div></div>
            <div class="pebble-grid">${dotsHtml}</div>
            <div class="detail-inline" id="detail-student-${esc(userId)}">
              <table class="detail-table">
                <thead><tr><th>Lien</th><th>Couleur</th><th>1er desc.</th><th>2e desc.</th><th>Score</th></tr></thead>
                <tbody>${detailRows}</tbody>
              </table>
            </div>
          </div>
        `);
      }

      /* ── Export Excel ── */
      document.getElementById("exportBtn").addEventListener("click", () => {
        const header = ["Élève"];
        for (const linkId of allLinkIds) {
          const cert = certs.get(linkId);
          const num = cert?.linkNumber ?? "?";
          const title = cert?.title || "Sans titre";
          header.push(`L${num} — ${title}`);
        }
        header.push("Total", "Max", "%");

        const data = [header];
        for (const userId of studentIds) {
          const links = students.get(userId);
          const row = [userId];
          let sTotal = 0, sMax = 0;
          for (const linkId of allLinkIds) {
            const d = links.get(linkId);
            if (d) {
              row.push(`${d.score}/3`);
              sTotal += d.score;
              sMax += 3;
            } else {
              row.push("—");
            }
          }
          row.push(sTotal, sMax, sMax ? Math.round(sTotal / sMax * 100) : 0);
          data.push(row);
        }

        const ws = XLSX.utils.aoa_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Résultats");
        XLSX.writeFile(wb, `resultats-${SESSION_CODE}.xlsx`);
      });

      /* ── Sort button ── */
      const sortBtn = document.getElementById("sortBtn");
      sortBtn.addEventListener("click", () => {
        const states = ["none", "desc", "asc"];
        const labels = { none: "Trier ↕", desc: "Meilleur ↓", asc: "Meilleur ↑" };
        const cur = states.indexOf(sortBtn.dataset.sort);
        const next = states[(cur + 1) % states.length];
        sortBtn.dataset.sort = next;
        sortBtn.textContent = labels[next];
        sortBtn.classList.toggle("active", next !== "none");

        [linksContainer, studentsContainer].forEach(container => {
          const cards = [...container.querySelectorAll(".card")];
          if (next === "none") {
            // Restore original DOM order via data-idx
            cards.sort((a, b) => parseInt(a.dataset.idx) - parseInt(b.dataset.idx));
          } else {
            const dir = next === "desc" ? -1 : 1;
            cards.sort((a, b) => dir * (parseFloat(a.dataset.ratio) - parseFloat(b.dataset.ratio)));
          }
          cards.forEach(c => container.appendChild(c));
        });
      });

      // Store original order index on each card
      [linksContainer, studentsContainer].forEach(container => {
        container.querySelectorAll(".card").forEach((c, i) => c.dataset.idx = i);
      });

      /* ── Toggle detail on dot click ── */
      content.addEventListener("click", (e) => {
        const card = e.target.closest(".card");
        if (!card) return;

        const entry = e.target.closest(".pebble-entry[data-detail]");
        if (entry) {
          // Clicking a specific student/link dot does nothing special — toggle whole card detail
        }

        const detail = card.querySelector(".detail-inline");
        if (detail) detail.classList.toggle("open");
      });

      /* ── Delete responses ── */
      async function deleteResponses(userId) {
        const body = { session_code: SESSION_CODE };
        if (userId) body.user_id = userId;
        const res = await fetch(`${API_BASE}/admin/reset-responses.php`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error("Delete failed");
        return res.json();
      }

      // Delete all responses
      document.getElementById("resetAllBtn").addEventListener("click", async () => {
        if (!confirm("Effacer tous les résultats de cette séance ?\n\nCette action est irréversible.")) return;
        try {
          await deleteResponses(null);
          location.reload();
        } catch (e) { alert("Erreur : " + e.message); }
      });

      // Delete one student's responses
      content.addEventListener("click", async (e) => {
        const btn = e.target.closest("[data-delete-user]");
        if (!btn) return;
        e.stopPropagation();
        const userId = btn.dataset.deleteUser;
        if (!confirm(`Effacer les résultats de « ${userId} » ?\n\nCette action est irréversible.`)) return;
        try {
          await deleteResponses(userId);
          // Remove student cards and refresh
          document.querySelectorAll(`.card[data-user-id="${userId}"]`).forEach(c => c.remove());
          location.reload();
        } catch (e) { alert("Erreur : " + e.message); }
      });

    } catch (err) {
      if (err.message === "stop") { /* handled */ }
      else {
        console.error(err);
        document.getElementById("loading").innerHTML = '<div class="error-box">Impossible de charger les données.</div>';
      }
    }

  </script>
