<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
  <title>Révision — toutcuit.ch</title>
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --panel-2: #f1f3f9;
      --text: #1f2328;
      --muted: #5e6673;
      --border: #d7dbe6;
      --accent: #6f5cf7;
      --accent-hover: #5a48e0;
      --accent-light: rgba(111, 92, 247, .08);
      --shadow: 0 10px 30px rgba(16, 24, 40, .08);
      --radius: 14px;
      --green: #16a34a;
      --green-bg: rgba(22, 163, 74, .07);
      --green-border: rgba(22, 163, 74, .22);
      --red: #dc2626;
      --red-bg: rgba(220, 38, 38, .06);
      --red-border: rgba(220, 38, 38, .18);
      --amber: #d97706;
      --amber-bg: rgba(217, 119, 6, .07);
      --amber-border: rgba(217, 119, 6, .22);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scrollbar-gutter: stable; }

    html, body {
      min-height: 100vh;
      background:
        radial-gradient(1200px 700px at 50% 0%, rgba(111, 92, 247, .07), transparent 58%),
        var(--bg);
      color: var(--text);
      font-family: 'Inter var', 'Inter', system-ui, sans-serif;
      font-weight: 500;
      line-height: 1.55;
      font-size: 15px;
    }

    /* ── Header ── */
    .header {
      background: rgba(255,255,255,.88);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .header-logo {
      font-size: 1.2rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      color: var(--accent);
      text-decoration: none;
    }
    .header-sep { color: var(--border); font-size: 1.2rem; }
    .header-title { font-size: .95rem; font-weight: 700; }
    .header-spacer { flex: 1; }
    .header-link {
      font-size: .82rem;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    /* ── Main layout ── */
    .main {
      max-width: 900px;
      margin: 0 auto;
      padding: 28px 20px 120px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── Cert selector ── */
    .selector-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 2px 8px rgba(16,24,40,.04);
    }
    /* In the sidecar popup the CERT is already preselected; hide the picker. */
    body.is-sidecar .selector-card { display: none; }
    .selector-title {
      font-family: 'Inter var', 'Inter', system-ui, sans-serif;
      font-size: 1.35rem;
      font-weight: 400;
      margin-bottom: 16px;
      color: var(--text);
    }
    .search-box {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      padding: 8px 12px;
      border-radius: 9px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      cursor: text;
      transition: border-color .15s;
    }
    .search-box:focus-within { border-color: var(--accent); }
    .search-box input {
      flex: 1 1 100px;
      border: none;
      outline: none;
      background: transparent;
      font-size: .88rem;
      color: var(--text);
      padding: 4px 0;
      min-width: 80px;
      font-family: inherit;
    }
    .search-box input::placeholder { color: var(--muted); }
    .search-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 6px 4px 10px;
      border-radius: 7px;
      background: rgba(111,92,247,.15);
      border: 1px solid rgba(111,92,247,.35);
      color: #4338ca;
      font-size: .8rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .search-chip button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      background: rgba(111,92,247,.12);
      border: none;
      cursor: pointer;
      color: rgba(111,92,247,.6);
      font-size: .9rem;
      line-height: 1;
      padding: 0;
      border-radius: 50%;
      transition: color .15s, background .15s;
    }
    .search-chip button:hover { color: #fff; background: #b91c1c; }

    .cert-list {
      max-height: 320px;
      overflow-y: auto;
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .cert-item {
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: background .12s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .cert-item:hover { background: var(--panel-2); }
    .cert-item.selected { background: var(--accent-light); }
    .cert-item-title {
      font-weight: 600;
      font-size: .9rem;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cert-item-meta {
      font-size: .78rem;
      color: var(--muted);
      white-space: nowrap;
    }
    /* Reliability-colored descriptor tags (shared with cert summary) */
    .cert-desc-tag {
      font-size: .72rem;
      font-weight: 700;
      padding: 1px 7px;
      border-radius: 5px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .cert-desc-tag.good { background: rgba(34,197,94,.30);  color: #166534; border: 1px solid rgba(34,197,94,.75); }
    .cert-desc-tag.mid  { background: rgba(249,115,22,.30); color: #9a3412; border: 1px solid rgba(249,115,22,.75); }
    .cert-desc-tag.bad  { background: rgba(239,68,68,.32);  color: #991b1b; border: 1px solid rgba(239,68,68,.80); }

    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: var(--muted);
      font-size: .9rem;
    }

    /* ── Selected cert summary ── */
    .cert-summary {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 2px 8px rgba(16,24,40,.04);
      display: none;
    }
    .cert-summary.visible { display: block; }
    .cert-summary-header {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 16px;
    }
    .cert-summary-info { flex: 1; }
    .cert-summary-title {
      font-family: 'Inter var', 'Inter', system-ui, sans-serif;
      font-size: 1.15rem;
      font-weight: 400;
      line-height: 1.35;
      margin-bottom: 4px;
    }
    .cert-summary-url {
      font-size: .78rem;
      color: var(--accent);
      text-decoration: none;
      word-break: break-all;
    }
    .cert-summary-url:hover { text-decoration: underline; }
    .cert-meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      margin-top: 10px;
    }
    .cert-meta-tag {
      font-size: .78rem;
      padding: 3px 10px;
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--muted);
      font-weight: 600;
    }
    /* Slightly larger descriptor tag inside the summary meta row */
    .cert-meta-row .cert-desc-tag {
      font-size: .76rem;
      padding: 3px 10px;
      border-radius: 6px;
    }

    /* ── Cert preview (toggle + content) ── */
    .cert-preview-toggle {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .cert-preview-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px 6px 10px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
    }
    .cert-preview-btn:hover { color: var(--accent); border-color: rgba(111,92,247,.3); background: rgba(111,92,247,.06); }
    .cert-preview-btn .arrow {
      display: inline-block;
      transition: transform .2s;
      font-size: 1rem;
      line-height: 1;
    }
    .cert-preview-btn.is-expanded .arrow { transform: rotate(180deg); }
    .cert-preview-content {
      display: none;
      margin-top: 14px;
      padding: 14px 16px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 9px;
      font-size: .85rem;
      line-height: 1.55;
      color: var(--text);
    }
    .cert-preview-content.is-visible { display: block; }
    .cert-preview-content p { margin: 6px 0; }
    .cert-preview-content ul,
    .cert-preview-content ol { margin: 6px 0 6px 4px; padding-left: 18px; }
    .cert-preview-content strong { font-weight: 700; color: var(--text); }
    .cert-preview-content .preview-label {
      display: block;
      font-size: .68rem;
      font-weight: 800;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 12px 0 4px;
    }
    .cert-preview-content .preview-label:first-child { margin-top: 0; }

    .btn-review {
      padding: 10px 22px;
      border: none;
      border-radius: 9px;
      background: var(--accent);
      color: #fff;
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s, opacity .15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-review:hover { background: var(--accent-hover); }
    .btn-review:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    /* ── Loading state ── */
    .loading-bar {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 20px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .loading-bar.visible { display: flex; }
    .spinner {
      width: 20px;
      height: 20px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: .9rem; color: var(--muted); }

    /* ── Error ── */
    .error-banner {
      display: none;
      padding: 12px 16px;
      background: var(--red-bg);
      border: 1px solid var(--red-border);
      border-radius: 10px;
      color: var(--red);
      font-size: .85rem;
      font-weight: 600;
    }
    .error-banner.visible { display: block; }

    /* ── Cost badge ── */
    .cost-badge {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 9px;
      font-size: .82rem;
      color: var(--muted);
    }
    .cost-badge.visible { display: inline-flex; }
    .cost-amount {
      font-weight: 700;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .cost-tokens { font-size: .75rem; }

    /* ── Review results ── */
    .review-section {
      display: none;
      flex-direction: column;
      gap: 18px;
    }
    .review-section.visible { display: flex; }

    .review-heading {
      font-family: 'Inter var', 'Inter', system-ui, sans-serif;
      font-size: 1.2rem;
      font-weight: 400;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .no-changes {
      text-align: center;
      padding: 32px 16px;
      color: var(--accent);
      font-weight: 600;
      font-size: .95rem;
      background: var(--accent-light);
      border: 1px solid rgba(111, 92, 247, .22);
      border-radius: var(--radius);
    }

    /* ── Field card ── */
    .field-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(16,24,40,.04);
      transition: border-color .2s;
    }
    .field-card.accepted { border-color: rgba(111, 92, 247, .35); }
    .field-card.rejected { border-color: var(--border); }
    .field-card.edited { border-color: var(--amber-border); }

    .field-card-header {
      padding: 14px 18px;
      background: var(--panel-2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .field-label {
      font-size: .78rem;
      font-weight: 800;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      flex: 1;
    }
    .field-status {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 5px;
    }
    .field-status.pending { background: var(--accent-light); color: var(--accent); }
    .field-status.accepted { background: var(--accent-light); color: var(--accent); }
    .field-status.rejected { background: var(--panel-2); color: var(--muted); }
    .field-status.edited { background: var(--amber-bg); color: var(--amber); }

    .field-card-body { padding: 18px; }

    .field-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 640px) {
      .field-columns { grid-template-columns: 1fr; }
    }

    .field-col-label {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .field-col-label.original { color: var(--muted); }
    .field-col-label.suggested { color: var(--accent); }

    .field-text {
      font-size: .88rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
    }
    .field-text.original-text {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
    }
    .field-text.suggested-text {
      background: var(--accent-light);
      border: 1px solid rgba(111, 92, 247, .22);
      border-radius: 8px;
      padding: 12px 14px;
    }

    .field-changes {
      margin-top: 14px;
      padding: 10px 14px;
      background: var(--panel-2);
      border-radius: 8px;
    }
    .field-changes-title {
      font-size: .75rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .field-changes ul {
      list-style: none;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .field-changes li {
      font-size: .82rem;
      color: var(--text);
      padding-left: 14px;
      position: relative;
    }
    .field-changes li::before {
      content: "\2192";
      position: absolute;
      left: 0;
      color: var(--accent);
      font-weight: 700;
    }

    /* ── Edit textarea ── */
    .field-edit-area {
      display: none;
      margin-top: 14px;
    }
    .field-edit-area.visible { display: block; }
    .field-edit-textarea {
      width: 100%;
      min-height: 120px;
      padding: 12px 14px;
      border: 1.5px solid var(--amber-border);
      border-radius: 8px;
      background: var(--amber-bg);
      font-family: inherit;
      font-size: .88rem;
      line-height: 1.6;
      color: var(--text);
      resize: vertical;
      outline: none;
      transition: border-color .15s;
    }
    .field-edit-textarea:focus { border-color: var(--amber); }

    .field-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .btn-action {
      padding: 7px 14px;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      background: var(--panel);
      font-size: .82rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
    }
    .btn-action:hover { border-color: var(--accent); color: var(--accent); }
    .btn-accept { border-color: rgba(111, 92, 247, .35); color: var(--accent); }
    .btn-accept:hover { background: var(--accent-light); border-color: var(--accent); }
    .btn-reject { border-color: var(--border); color: var(--muted); }
    .btn-reject:hover { background: var(--panel-2); border-color: var(--muted); }
    .btn-edit { border-color: var(--amber-border); color: var(--amber); }
    .btn-edit:hover { background: var(--amber-bg); border-color: var(--amber); }
    .btn-action.active {
      color: #fff !important;
    }
    .btn-accept.active { background: var(--accent); border-color: var(--accent); }
    .btn-reject.active { background: var(--muted); border-color: var(--muted); }
    .btn-edit.active { background: var(--amber); border-color: var(--amber); }

    /* ── Save bar ── */
    .save-bar {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--border);
      padding: 14px 20px;
      z-index: 50;
      justify-content: center;
      align-items: center;
      gap: 14px;
    }
    .save-bar.visible { display: flex; }
    .save-counter {
      font-size: .85rem;
      color: var(--muted);
    }
    .save-counter strong { color: var(--text); }
    .btn-save {
      padding: 10px 28px;
      border: none;
      border-radius: 9px;
      background: var(--accent);
      color: #fff;
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s, opacity .15s;
    }
    .btn-save:hover { background: var(--accent-hover); }
    .btn-save:disabled { opacity: .5; cursor: not-allowed; }
    .save-status {
      font-size: .85rem;
      font-weight: 600;
    }
    .save-status.success { color: var(--accent); }
    .save-status.error { color: #b91c1c; }
    .save-hint {
      font-size: .78rem;
      color: var(--muted);
      font-style: italic;
    }

    /* ── Login (same as editor) ── */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .login-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px 28px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .login-logo { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.02em; color: var(--accent); }
    .login-title { font-size: 1.1rem; font-weight: 700; }
    .login-field { display: flex; flex-direction: column; gap: 6px; }
    .login-field label { font-size: .85rem; font-weight: 600; color: var(--muted); }
    .login-error {
      display: none;
      font-size: .85rem;
      color: var(--red);
      background: var(--red-bg);
      border: 1px solid var(--red-border);
      border-radius: 8px;
      padding: 8px 12px;
    }
    .btn-primary {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 9px;
      background: var(--accent);
      color: #fff;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-primary:hover { background: var(--accent-hover); }

    /* ── Accept/Reject all ── */
    .bulk-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .btn-bulk {
      padding: 6px 12px;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      background: var(--panel);
      font-size: .78rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
    }
    .btn-bulk:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>

  <!-- ════ LOGIN ════ -->
  <div id="loginPage" class="login-page">
    <form class="login-card" id="loginForm">
      <span class="login-logo">toutcuit</span>
      <span class="login-title">Outil de révision</span>
      <div class="login-field">
        <label for="emailInput">Email</label>
        <input type="email" id="emailInput" class="search-input" required autofocus>
      </div>
      <div class="login-field">
        <label for="pwInput">Mot de passe</label>
        <input type="password" id="pwInput" class="search-input" required>
      </div>
      <div class="login-error" id="loginError" style="display:none"></div>
      <button class="btn-primary" type="submit">Entrer</button>
      <div style="font-size:.78rem;color:var(--muted);margin-top:6px;text-align:center;">
        Réservé aux éditeur·ices.
      </div>
    </form>
  </div>

  <!-- ════ APP ════ -->
  <div id="appContent" style="display:none;">

    <header class="header">
      <a href="/editor" class="header-logo">toutcuit</a>
      <span class="header-sep">/</span>
      <a href="/editor" class="header-title" style="text-decoration:none;color:inherit">Éditeur</a>
      <span class="header-sep">/</span>
      <span class="header-title">Révision des CERTs</span>
      <span class="header-spacer"></span>
    </header>
    <script type="module">
      import { renderSidecarToggle, openCertSidecar, isSidecarOn } from "/descripteurs/assets/js/sidecar.js";
      window.tcOpenCertSidecar = openCertSidecar;
      window.tcIsSidecarOn = isSidecarOn;
      window.tcRenderSidecarToggle = renderSidecarToggle;
    </script>

    <main class="main">

      <!-- Cert selector -->
      <div class="selector-card">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
          <div class="selector-title" style="margin-bottom:0;flex:1;">Choisir une CERT</div>
          <span id="sidecarToggleSlot"></span>
        </div>
        <script type="module">
          import { renderSidecarToggle } from "/descripteurs/assets/js/sidecar.js";
          renderSidecarToggle(document.getElementById("sidecarToggleSlot"));
        </script>
        <div class="search-box" id="searchBox">
          <input type="text" id="searchInput" placeholder="Rechercher par titre, expert, descripteur...">
        </div>
        <div class="cert-list" id="certList">
          <div class="empty-state">Chargement...</div>
        </div>
      </div>

      <!-- Selected cert summary -->
      <div class="cert-summary" id="certSummary">
        <div class="cert-summary-header">
          <div class="cert-summary-info">
            <div class="cert-summary-title" id="summaryTitle"></div>
            <a class="cert-summary-url" id="summaryUrl" href="#" target="_blank"></a>
            <div class="cert-meta-row" id="summaryMeta"></div>
          </div>
          <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">
            <span class="cost-badge" id="costBadge">
              <span class="cost-amount" id="costAmount"></span>
              <span class="cost-tokens" id="costTokens"></span>
            </span>
            <button class="btn-review" id="downloadRtfBtn" style="background:transparent;color:var(--accent);border:1px solid var(--accent);" title="Télécharger au format RTF">Télécharger .rtf</button>
            <button class="btn-review" id="reviewBtn">Analyser</button>
          </div>
        </div>
        <div class="cert-preview-toggle">
          <button type="button" class="cert-preview-btn" id="previewToggleBtn">
            <span class="arrow">&#9662;</span>
            <span id="previewToggleLabel">Aperçu du contenu</span>
          </button>
        </div>
        <div class="cert-preview-content" id="previewContent"></div>
      </div>

      <!-- Loading -->
      <div class="loading-bar" id="loadingBar">
        <div class="spinner"></div>
        <span class="loading-text">Analyse en cours par Claude...</span>
      </div>

      <!-- Error -->
      <div class="error-banner" id="errorBanner"></div>

      <!-- Review results -->
      <div class="review-section" id="reviewSection">
        <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
          <div class="review-heading" style="flex:1;border:none;padding:0;">Suggestions</div>
          <div class="bulk-actions">
            <button class="btn-bulk" onclick="bulkAction('accept')">Tout accepter</button>
            <button class="btn-bulk" onclick="bulkAction('reject')">Tout refuser</button>
          </div>
        </div>
        <div id="reviewCards"></div>
      </div>

    </main>

    <!-- Save bar -->
    <div class="save-bar" id="saveBar">
      <span class="save-counter" id="saveCounter"></span>
      <button class="btn-save" id="saveBtn" onclick="saveCert()">Sauvegarder</button>
      <span class="save-hint">L'ordre des références sera ajusté si besoin.</span>
      <span class="save-status" id="saveStatus"></span>
    </div>

  </div>

  <script>
    const API = "/api";
    const TOKEN_KEY = "tc_token";
    const TEACHER_KEY = "tc_teacher";

    // ── Auth ──
    const loginPage = document.getElementById("loginPage");
    const appContent = document.getElementById("appContent");
    const loginErrorEl = document.getElementById("loginError");

    function getToken() { return localStorage.getItem(TOKEN_KEY); }
    function clearAuth() {
      localStorage.removeItem(TOKEN_KEY);
      localStorage.removeItem(TEACHER_KEY);
    }
    function showLoginError(msg) {
      loginErrorEl.textContent = msg;
      loginErrorEl.style.display = "block";
    }

    async function authFetch(url, options = {}) {
      const token = getToken();
      if (!token) { forceLogout(); throw new Error("Non connecté"); }
      options.headers = { ...(options.headers || {}), "Authorization": `Bearer ${token}` };
      const res = await fetch(url, options);
      if (res.status === 401) { forceLogout(); throw new Error("Session expirée"); }
      if (res.status === 403) {
        clearAuth();
        appContent.style.display = "none";
        loginPage.style.display = "flex";
        showLoginError("Accès réservé aux éditeur·ices.");
        throw new Error("Accès refusé");
      }
      return res;
    }

    function forceLogout() {
      clearAuth();
      appContent.style.display = "none";
      loginPage.style.display = "flex";
    }

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      loginErrorEl.style.display = "none";
      const email = document.getElementById("emailInput").value.trim();
      const password = document.getElementById("pwInput").value;
      try {
        const res = await fetch(`${API}/auth/login.php`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.error) return showLoginError(data.error);
        if (data.teacher?.role !== "editor") {
          return showLoginError("Accès réservé aux éditeur·ices.");
        }
        localStorage.setItem(TOKEN_KEY, data.token);
        localStorage.setItem(TEACHER_KEY, JSON.stringify(data.teacher));
        unlock();
      } catch (err) {
        showLoginError("Erreur réseau : " + err.message);
      }
    });

    function unlock() {
      loginPage.style.display = "none";
      appContent.style.display = "block";
      loadCerts();
    }

    // Auto-unlock if a valid editor token already exists in localStorage.
    (async function bootstrapAuth() {
      const token = getToken();
      if (!token) return;
      try {
        const res = await fetch(`${API}/auth/me.php`, {
          headers: { "Authorization": `Bearer ${token}` }
        });
        if (res.status === 401) { clearAuth(); return; }
        const me = await res.json();
        if (!me || me.error) { clearAuth(); return; }
        if (me.role !== "editor") {
          showLoginError("Ce compte n'a pas les droits Éditeur·ice.");
          return;
        }
        localStorage.setItem(TEACHER_KEY, JSON.stringify(me));
        unlock();
      } catch { /* leave login visible */ }
    })();

    // ── State ──
    let allCerts = [];
    let selectedCert = null;
    let suggestions = {};  // { field_key: { suggested, changes } }
    let decisions = {};    // { field_key: 'accepted' | 'rejected' | 'edited' }
    let editedTexts = {};  // { field_key: string }

    const FIELD_LABELS = {
      title: "Titre",
      three_phrases: "3 Phrases",
      context: "Contexte",
      content: "Contenu",
      reliability_text: "Fiabilité",
      references_text: "Références",
    };

    // ── Load certs ──
    async function loadCerts() {
      try {
        const res = await authFetch(`${API}/admin/certs.php`);
        allCerts = await res.json();
        renderCertList();
        maybeEnterSidecar();
      } catch (err) {
        document.getElementById("certList").innerHTML =
          '<div class="empty-state">Erreur de chargement.</div>';
      }
    }

    // Auto-select + auto-run review when landed in sidecar mode.
    function maybeEnterSidecar() {
      const qp = new URLSearchParams(location.search);
      if (qp.get("mode") !== "sidecar") return;
      const id = parseInt(qp.get("sidecar_cert"), 10);
      if (!id) return;
      document.body.classList.add("is-sidecar");
      const target = allCerts.find(c => c.id === id);
      if (!target) return;
      selectCert(id);
      runReview();
    }

    function renderCertList() {
      const list = document.getElementById("certList");
      const filtered = allCerts.filter(c => {
        if (!searchTerms.length) return true;
        const haystack = [c.title, c.expert, c.teacher_name, c.descriptor1, c.descriptor2].join(" ").toLowerCase();
        return searchTerms.every(t => haystack.includes(t));
      });

      if (!filtered.length) {
        list.innerHTML = '<div class="empty-state">Aucune CERT trouvée.</div>';
        return;
      }

      list.innerHTML = filtered.map(c => `
        <div class="cert-item ${selectedCert && selectedCert.id === c.id ? 'selected' : ''}"
             data-id="${c.id}" onclick="selectCert(${c.id})">
          <span class="cert-item-title">${esc(c.title)}</span>
          ${c.descriptor1 ? `<span class="cert-desc-tag ${esc(c.reliability || '')}">${esc(c.descriptor1)}</span>` : ""}
          ${c.descriptor2 ? `<span class="cert-desc-tag ${esc(c.reliability || '')}">${esc(c.descriptor2)}</span>` : ""}
          <span class="cert-item-meta">${esc(c.expert || '?')}</span>
        </div>
      `).join("");
    }

    let searchTerms = [];
    const searchBox = document.getElementById("searchBox");
    const searchInput = document.getElementById("searchInput");

    function addSearchTerm(term) {
      term = term.trim().toLowerCase();
      if (!term || searchTerms.includes(term)) return;
      searchTerms.push(term);
      renderSearchChips();
      renderCertList();
    }

    function removeSearchTerm(term) {
      searchTerms = searchTerms.filter(t => t !== term);
      renderSearchChips();
      renderCertList();
    }

    function renderSearchChips() {
      searchBox.querySelectorAll(".search-chip").forEach(el => el.remove());
      searchTerms.forEach(term => {
        const chip = document.createElement("span");
        chip.className = "search-chip";
        chip.innerHTML = `${esc(term)}<button title="Supprimer">&times;</button>`;
        chip.querySelector("button").addEventListener("click", () => removeSearchTerm(term));
        searchBox.insertBefore(chip, searchInput);
      });
      searchInput.placeholder = searchTerms.length ? "Ajouter un critère..." : "Rechercher par titre, expert, descripteur...";
    }

    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        addSearchTerm(searchInput.value);
        searchInput.value = "";
      }
      if (e.key === "Backspace" && !searchInput.value && searchTerms.length) {
        removeSearchTerm(searchTerms[searchTerms.length - 1]);
      }
    });

    searchBox.addEventListener("click", () => searchInput.focus());

    // ── Select cert ──
    function selectCert(id) {
      selectedCert = allCerts.find(c => c.id === id);
      if (!selectedCert) return;

      // Reset review state
      suggestions = {};
      decisions = {};
      editedTexts = {};
      hide("reviewSection");
      hide("saveBar");
      hide("loadingBar");
      hide("errorBanner");
      hide("costBadge");

      // Update summary
      document.getElementById("summaryTitle").textContent = selectedCert.title;
      const urlEl = document.getElementById("summaryUrl");
      urlEl.textContent = selectedCert.url;
      urlEl.href = selectedCert.url;

      // Build the meta row: descriptors get reliability-colored tags, others stay neutral
      const metaRow = document.getElementById("summaryMeta");
      const rel = selectedCert.reliability || "";
      const parts = [];
      if (selectedCert.expert) parts.push(`<span class="cert-meta-tag">${esc(selectedCert.expert)}</span>`);
      if (selectedCert.descriptor1) parts.push(`<span class="cert-desc-tag ${esc(rel)}">${esc(selectedCert.descriptor1)}</span>`);
      if (selectedCert.descriptor2) parts.push(`<span class="cert-desc-tag ${esc(rel)}">${esc(selectedCert.descriptor2)}</span>`);
      if (selectedCert.teacher_name) parts.push(`<span class="cert-meta-tag">déposé par ${esc(selectedCert.teacher_name)}</span>`);
      metaRow.innerHTML = parts.join("");

      // Populate the inline content preview (collapsed by default)
      renderCertPreview(selectedCert);
      collapsePreview();

      show("certSummary");
      document.getElementById("reviewBtn").disabled = false;
      renderCertList();
    }

    // ── Preview rendering ──
    function renderCertPreview(c) {
      const el = document.getElementById("previewContent");
      const blocks = [];
      if (c.cert_date) {
        blocks.push(`<p><strong>Date :</strong> ${esc(c.cert_date)}</p>`);
      }
      if (c.three_phrases) {
        blocks.push(`<span class="preview-label">3 Phrases</span>`);
        const items = String(c.three_phrases).split(/[\n;]+/).map(s => s.trim()).filter(Boolean);
        if (items.length) {
          blocks.push(`<ul>${items.map(s => `<li>${esc(s)}</li>`).join("")}</ul>`);
        } else {
          blocks.push(`<p>${esc(c.three_phrases)}</p>`);
        }
      }
      if (c.context) {
        blocks.push(`<span class="preview-label">Contexte</span><p>${esc(c.context)}</p>`);
      }
      if (c.content) {
        blocks.push(`<span class="preview-label">Contenu</span><p>${esc(c.content)}</p>`);
      }
      if (c.reliability_text) {
        blocks.push(`<span class="preview-label">Fiabilité</span><p>${esc(c.reliability_text)}</p>`);
      }
      if (c.references_text) {
        blocks.push(`<span class="preview-label">Références</span>`);
        const refs = String(c.references_text).split(/[\n;]+/).map(s => s.trim()).filter(Boolean);
        if (refs.length) {
          blocks.push(`<ol>${refs.map(s => `<li>${esc(s)}</li>`).join("")}</ol>`);
        } else {
          blocks.push(`<p>${esc(c.references_text)}</p>`);
        }
      }
      el.innerHTML = blocks.length
        ? blocks.join("")
        : `<p style="color:var(--muted);font-style:italic;">Aucun contenu à afficher.</p>`;
    }

    function collapsePreview() {
      document.getElementById("previewContent").classList.remove("is-visible");
      const btn = document.getElementById("previewToggleBtn");
      btn.classList.remove("is-expanded");
      document.getElementById("previewToggleLabel").textContent = "Aperçu du contenu";
    }

    document.getElementById("previewToggleBtn").addEventListener("click", () => {
      const content = document.getElementById("previewContent");
      const btn = document.getElementById("previewToggleBtn");
      const expanded = content.classList.toggle("is-visible");
      btn.classList.toggle("is-expanded", expanded);
      document.getElementById("previewToggleLabel").textContent =
        expanded ? "Masquer l'aperçu" : "Aperçu du contenu";
    });

    // ── Review ──
    // Honour the Sidecar checkbox: if checked, open the CERT URL on the left
    // and a dedicated review window on the right instead of running inline.
    document.getElementById("reviewBtn").addEventListener("click", () => {
      if (window.tcIsSidecarOn && window.tcIsSidecarOn() && selectedCert && selectedCert.url) {
        const side = `/review?sidecar_cert=${encodeURIComponent(selectedCert.id)}&mode=sidecar`;
        window.tcOpenCertSidecar(selectedCert.url, side);
        return;
      }
      runReview();
    });

    async function runReview() {
      if (!selectedCert) return;
      const btn = document.getElementById("reviewBtn");
      btn.disabled = true;
      hide("reviewSection");
      hide("saveBar");
      hide("errorBanner");
      show("loadingBar");

      try {
        const body = {
          title: selectedCert.title || "",
          url: selectedCert.url || "",
          expert: selectedCert.expert || "",
          descriptor1: selectedCert.descriptor1 || "",
          descriptor2: selectedCert.descriptor2 || "",
          reliability: selectedCert.reliability || "",
          three_phrases: selectedCert.three_phrases || "",
          context: selectedCert.context || "",
          content: selectedCert.content || "",
          reliability_text: selectedCert.reliability_text || "",
          references_text: selectedCert.references_text || "",
        };

        const res = await fetch(`${API}/ai/review.php`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `Erreur ${res.status}`);
        }

        const data = await res.json();
        suggestions = data.suggestions || {};
        decisions = {};
        editedTexts = {};

        // Display cost
        if (data.usage) {
          const u = data.usage;
          document.getElementById("costAmount").textContent = u.cost_usd.toFixed(4) + " $";
          document.getElementById("costTokens").textContent =
            `(${u.input_tokens.toLocaleString("fr-CH")} in + ${u.output_tokens.toLocaleString("fr-CH")} out)`;
          show("costBadge");
        }

        renderReview();
      } catch (err) {
        showError(err.message);
      } finally {
        hide("loadingBar");
        btn.disabled = false;
      }
    }

    // ── Render review cards ──
    function renderReview() {
      const container = document.getElementById("reviewCards");
      const keys = Object.keys(suggestions);

      if (!keys.length) {
        container.innerHTML = '<div class="no-changes">Aucune modification suggérée — cette CERT est bien rédigée.</div>';
        show("reviewSection");
        return;
      }

      container.innerHTML = keys.map(key => {
        const s = suggestions[key];
        const label = FIELD_LABELS[key] || key;
        const original = selectedCert[key] || "";
        const status = decisions[key] || "pending";

        return `
          <div class="field-card ${status !== 'pending' ? status : ''}" id="card-${key}" style="margin-bottom:18px;">
            <div class="field-card-header">
              <span class="field-label">${esc(label)}</span>
              <span class="field-status ${status}" id="status-${key}">${statusLabel(status)}</span>
            </div>
            <div class="field-card-body">
              <div class="field-columns">
                <div>
                  <div class="field-col-label original">Original</div>
                  <div class="field-text original-text">${esc(original)}</div>
                </div>
                <div>
                  <div class="field-col-label suggested" id="label-${key}">Nouvelle version</div>
                  <div class="field-text suggested-text" id="suggested-${key}">${esc(s.suggested)}</div>
                </div>
              </div>
              ${s.changes && s.changes.length ? `
                <div class="field-changes">
                  <div class="field-changes-title">Modifications</div>
                  <ul>${s.changes.map(c => `<li>${esc(c)}</li>`).join("")}</ul>
                </div>
              ` : ''}
              <div class="field-edit-area" id="edit-area-${key}">
                <textarea class="field-edit-textarea" id="edit-text-${key}"
                  oninput="editedTexts['${key}'] = this.value; updateSuggestedText('${key}'); updateSaveCounter();"
                >${esc(editedTexts[key] || s.suggested)}</textarea>
              </div>
              <div class="field-actions">
                <button class="btn-action btn-reject ${status === 'rejected' ? 'active' : ''}"
                        onclick="setDecision('${key}','rejected')">Original</button>
                <button class="btn-action btn-accept ${status === 'accepted' ? 'active' : ''}"
                        onclick="setDecision('${key}','accepted')">Claude</button>
                <button class="btn-action btn-edit ${status === 'edited' ? 'active' : ''}"
                        onclick="setDecision('${key}','edited')">Éditer</button>
              </div>
            </div>
          </div>
        `;
      }).join("");

      show("reviewSection");
      updateSaveCounter();
    }

    function statusLabel(s) {
      return { pending: "En attente", accepted: "Claude", rejected: "Original", edited: "Éditer" }[s] || s;
    }

    // ── Decisions ──
    function setDecision(key, decision) {
      decisions[key] = decision;
      const card = document.getElementById(`card-${key}`);
      card.className = `field-card ${decision}`;
      const statusEl = document.getElementById(`status-${key}`);
      statusEl.className = `field-status ${decision}`;
      statusEl.textContent = statusLabel(decision);

      // Toggle edit area
      const editArea = document.getElementById(`edit-area-${key}`);
      if (decision === "edited") {
        editArea.classList.add("visible");
        const ta = document.getElementById(`edit-text-${key}`);
        if (!editedTexts[key]) editedTexts[key] = suggestions[key].suggested;
        ta.value = editedTexts[key];
        ta.focus();
      } else {
        editArea.classList.remove("visible");
      }

      // Update "Nouvelle version" text
      updateSuggestedText(key);

      // Update action button active states
      const btnClass = { accepted: "accept", rejected: "reject", edited: "edit" }[decision];
      card.querySelectorAll(".btn-action").forEach(b => b.classList.remove("active"));
      card.querySelector(`.btn-${btnClass}`).classList.add("active");

      updateSaveCounter();
    }

    function updateSuggestedText(key) {
      const el = document.getElementById(`suggested-${key}`);
      if (!el) return;
      const decision = decisions[key] || "pending";
      if (decision === "rejected") {
        el.textContent = selectedCert[key] || "";
      } else if (decision === "edited") {
        el.textContent = editedTexts[key] || suggestions[key].suggested;
      } else {
        el.textContent = suggestions[key].suggested;
      }

      // Match border/background to the selected button
      const styles = {
        pending:  { bg: 'var(--accent-light)', border: 'rgba(111, 92, 247, .22)' },
        accepted: { bg: 'var(--accent-light)', border: 'rgba(111, 92, 247, .22)' },
        rejected: { bg: 'var(--panel-2)',       border: 'var(--border)' },
        edited:   { bg: 'var(--amber-bg)',      border: 'var(--amber-border)' },
      }[decision];
      el.style.background = styles.bg;
      el.style.borderColor = styles.border;

      const label = document.getElementById(`label-${key}`);
      if (label) {
        const labelColor = {
          pending: 'var(--accent)', accepted: 'var(--accent)',
          rejected: 'var(--muted)', edited: 'var(--amber)',
        }[decision];
        label.style.color = labelColor;
      }
    }

    function bulkAction(action) {
      const map = { accept: "accepted", reject: "rejected", edit: "edited" };
      const decision = map[action] || action;
      Object.keys(suggestions).forEach(key => setDecision(key, decision));
    }

    // ── Save counter ──
    function updateSaveCounter() {
      const keys = Object.keys(suggestions);
      const decided = keys.filter(k => decisions[k] && decisions[k] !== "pending");
      const accepted = keys.filter(k => decisions[k] === "accepted" || decisions[k] === "edited");

      const counter = document.getElementById("saveCounter");
      counter.innerHTML = `<strong>${accepted.length}</strong> modification${accepted.length > 1 ? 's' : ''} à appliquer — ${decided.length}/${keys.length} traité${decided.length > 1 ? 's' : ''}`;

      document.getElementById("saveBtn").disabled = decided.length === 0;
      show("saveBar");
    }

    // ── Save ──

    // Returns the value that will be persisted for `key` based on the editor's decision.
    // accepted → Claude's suggestion, edited → user-edited text, otherwise → original cert value.
    function getFinalValue(key) {
      const d = decisions[key];
      if (d === "accepted" && suggestions[key]) return suggestions[key].suggested;
      if (d === "edited"   && suggestions[key]) return editedTexts[key] || suggestions[key].suggested;
      return selectedCert[key] || "";
    }

    // Reorder reference citations to match their order of first appearance in the text.
    // Mutates `finalValues` in place: rewrites text fields with renumbered (N) / (N,M,...)
    // citations and rewrites references_text so its rows match the new numbering.
    // Citations outside [1, N] (where N = number of refs) are left untouched, so things
    // like "(2024)" or "(1)" used as a step number won't be touched unless 1 is a real ref.
    const REVIEW_TEXT_FIELDS = ['three_phrases', 'context', 'content', 'reliability_text'];
    const CITATION_RE = /\(\s*(\d+(?:\s*,\s*\d+)*)\s*\)/g;

    function adjustReferenceOrder(finalValues) {
      const refsRaw = String(finalValues.references_text || "").trim();
      if (!refsRaw) return false;

      // Parse refs (one per line or separated by ;) preserving order
      const refs = refsRaw.split(/[\n;]+/).map(s => s.trim()).filter(Boolean);
      const N = refs.length;
      if (N < 2) return false;

      // Walk text fields in editorial order and record the order of first appearance
      const orderMap = new Map(); // oldNum -> newNum
      let nextNew = 1;
      for (const field of REVIEW_TEXT_FIELDS) {
        const text = String(finalValues[field] || "");
        if (!text) continue;
        CITATION_RE.lastIndex = 0;
        let m;
        while ((m = CITATION_RE.exec(text)) !== null) {
          const nums = m[1].split(',').map(s => parseInt(s.trim(), 10)).filter(n => !isNaN(n));
          for (const num of nums) {
            if (num < 1 || num > N) continue; // out-of-range: not a ref number
            if (!orderMap.has(num)) orderMap.set(num, nextNew++);
          }
        }
      }

      // Append uncited refs at the end, in their original order
      for (let i = 1; i <= N; i++) {
        if (!orderMap.has(i)) orderMap.set(i, nextNew++);
      }

      // Skip the rewrite if numbers are already in order
      let changed = false;
      for (const [oldNum, newNum] of orderMap) {
        if (oldNum !== newNum) { changed = true; break; }
      }
      if (!changed) return false;

      // Renumber inline citations across all text fields
      function renumber(text) {
        return text.replace(CITATION_RE, (match, list) => {
          const parts = list.split(',').map(s => s.trim()).filter(Boolean);
          const mapped = parts.map(s => {
            const n = parseInt(s, 10);
            if (isNaN(n) || n < 1 || n > N) return s;
            return String(orderMap.get(n));
          });
          // Sort multi-citations ascending so (3,1) → (1,2) instead of (2,1)
          const numericMapped = mapped.map(x => parseInt(x, 10));
          if (numericMapped.every(n => !isNaN(n))) {
            numericMapped.sort((a, b) => a - b);
            return `(${numericMapped.join(',')})`;
          }
          return `(${mapped.join(',')})`;
        });
      }
      for (const field of REVIEW_TEXT_FIELDS) {
        if (finalValues[field]) finalValues[field] = renumber(String(finalValues[field]));
      }

      // Reorder the references list itself
      const newRefs = new Array(N);
      for (const [oldNum, newNum] of orderMap) {
        newRefs[newNum - 1] = refs[oldNum - 1];
      }
      finalValues.references_text = newRefs.join('\n');

      return true;
    }

    async function saveCert() {
      const btn = document.getElementById("saveBtn");
      const status = document.getElementById("saveStatus");
      btn.disabled = true;
      status.textContent = "";

      // Compute the value each text field will have after save (regardless of decision)
      const trackedFields = ['title', 'three_phrases', 'context', 'content', 'reliability_text', 'references_text'];
      const finalValues = {};
      trackedFields.forEach(key => { finalValues[key] = getFinalValue(key); });

      // Adjust reference numbering across all fields (mutates finalValues)
      const reorderedRefs = adjustReferenceOrder(finalValues);

      // Build payload: send any field whose final value differs from the original cert,
      // so the reference renumbering also propagates fields the editor had rejected.
      const payload = { action: "update", id: selectedCert.id };
      trackedFields.forEach(key => {
        const original = selectedCert[key] || "";
        if ((finalValues[key] || "") !== original) {
          payload[key] = finalValues[key];
        }
      });

      // Nothing changed → bail out
      if (Object.keys(payload).length <= 2) {
        status.className = "save-status";
        status.textContent = "Aucune modification à enregistrer.";
        btn.disabled = false;
        return;
      }

      try {
        const res = await authFetch(`${API}/admin/certs.php`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `Erreur ${res.status}`);
        }

        status.className = "save-status success";
        status.textContent = reorderedRefs
          ? "CERT sauvegardée. Références réordonnées."
          : "CERT sauvegardée.";

        // Update local data
        Object.keys(payload).forEach(k => {
          if (k !== "action" && k !== "id" && selectedCert[k] !== undefined) {
            selectedCert[k] = payload[k];
          }
        });

        // Refresh display
        selectCert(selectedCert.id);
      } catch (err) {
        status.className = "save-status error";
        status.textContent = err.message;
        btn.disabled = false;
      }
    }

    // ── Helpers ──
    function show(id) { document.getElementById(id).classList.add("visible"); }
    function hide(id) { document.getElementById(id).classList.remove("visible"); }
    function showError(msg) {
      const el = document.getElementById("errorBanner");
      el.textContent = msg;
      el.classList.add("visible");
    }
    function esc(s) {
      if (!s) return "";
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    // ── RTF export (shared format with /descripteurs/pages/certs) ──
    function rtfEscape(str) {
      let out = "";
      for (const ch of String(str)) {
        const code = ch.codePointAt(0);
        if (ch === "\\" || ch === "{" || ch === "}") {
          out += "\\" + ch;
        } else if (code === 0x0A) {
          out += "\\line ";
        } else if (code < 128) {
          out += ch;
        } else if (code <= 0xFFFF) {
          const signed = code > 32767 ? code - 65536 : code;
          out += "\\u" + signed + "?";
        } else {
          const cp = code - 0x10000;
          const hi = 0xD800 + (cp >> 10);
          const lo = 0xDC00 + (cp & 0x3FF);
          out += "\\u" + (hi > 32767 ? hi - 65536 : hi) + "?";
          out += "\\u" + (lo > 32767 ? lo - 65536 : lo) + "?";
        }
      }
      return out;
    }

    function buildCertRtf(data) {
      const e = rtfEscape;
      const bold = (t) => "{\\b " + e(t) + "}";
      const line = (label, val) => bold(label) + " : " + e(val || "") + "\\par\n";
      const block = (label, val) => bold(label) + " :\\par\n" + e(String(val || "")) + "\\par\n\\par\n";
      let body = "";
      body += line("Titre", data.title);
      body += line("URL", data.url);
      body += line("Expert", data.expert);
      body += line("Date", data.date);
      body += line("Descripteur 1", data.descriptor1);
      body += line("Descripteur 2", data.descriptor2);
      body += line("Fiabilité", data.reliability);
      body += "\\par\n";
      body += block("3 phrases", data.threePhrases);
      body += block("Contexte", data.context);
      body += block("Contenu", data.content);
      body += block("Fiabilité (explication)", data.reliabilityText);
      body += block("Références", data.references);
      return "{\\rtf1\\ansi\\ansicpg1252\\uc1\\deff0"
        + "{\\fonttbl{\\f0 Helvetica;}}"
        + "\\fs22\n" + body + "}";
    }

    function reliabilityToFr(val) {
      const v = String(val || "").toLowerCase();
      if (v === "good") return "Fiable";
      if (v === "mid") return "Indéterminé";
      if (v === "bad") return "Pas fiable";
      return val || "";
    }

    function isoToFrDate(val) {
      if (!val) return "";
      const m = String(val).match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (m) return `${m[3]}.${m[2]}.${m[1]}`;
      return val;
    }

    function sanitizeFilename(s) {
      return String(s || "CERT").replace(/[\\/:*?"<>|]+/g, "_").replace(/\s+/g, "_").slice(0, 60) || "CERT";
    }

    // Export current CERT — uses final values (respecting accept/edit decisions) when available.
    function downloadCurrentRtf() {
      if (!selectedCert) return;
      const fv = (key) => {
        // getFinalValue is defined later; fall back to raw field if no decision machinery ran yet.
        try { return typeof getFinalValue === "function" ? getFinalValue(key) : (selectedCert[key] || ""); }
        catch { return selectedCert[key] || ""; }
      };
      const data = {
        title: fv("title") || selectedCert.title || "",
        url: selectedCert.url || "",
        expert: selectedCert.expert || "",
        date: isoToFrDate(selectedCert.cert_date),
        descriptor1: selectedCert.descriptor1 || "",
        descriptor2: selectedCert.descriptor2 || "",
        reliability: reliabilityToFr(selectedCert.reliability),
        threePhrases: fv("three_phrases") || selectedCert.three_phrases || "",
        context: fv("context") || selectedCert.context || "",
        content: fv("content") || selectedCert.content || "",
        reliabilityText: fv("reliability_text") || selectedCert.reliability_text || "",
        references: fv("references_text") || selectedCert.references_text || "",
      };
      const rtf = buildCertRtf(data);
      const blob = new Blob([rtf], { type: "application/rtf;charset=utf-8" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "CERT_" + sanitizeFilename(data.title) + ".rtf";
      a.click();
      URL.revokeObjectURL(a.href);
    }

    document.getElementById("downloadRtfBtn").addEventListener("click", downloadCurrentRtf);
  </script>

</body>
