<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
  <meta name="copyright" content="© 2026 Certify Community SA. Tous droits réservés." />
  <title>Console — toutcuit.ch</title>
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --panel-2: #f1f3f9;
      --text: #1f2328;
      --muted: #5e6673;
      --border: #d7dbe6;
      --accent: #6f5cf7;
      --accent-hover: #5a48e0;
      --shadow: 0 10px 30px rgba(16, 24, 40, .08);
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      background:
        radial-gradient(1200px 700px at 50% 0%, rgba(111, 92, 247, .10), transparent 58%),
        var(--bg);
      color: var(--text);
      font-family: 'Inter var', 'Inter', system-ui, sans-serif;
      font-weight: 500;
      line-height: 1.5;
    }

    /* ── Login ── */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .login-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px 28px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .login-logo {
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      color: var(--accent);
    }

    .login-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 10px 13px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      font-size: 1rem;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color .15s;
    }

    input:focus { border-color: var(--accent); }

    .btn-primary {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 9px;
      background: var(--accent);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
    }

    .btn-primary:hover { background: var(--accent-hover); }

    .btn-secondary {
      padding: 9px 16px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      background: var(--panel);
      color: var(--text);
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color .15s;
    }

    .btn-secondary:hover { border-color: var(--accent); }

    .error-msg {
      display: none;
      font-size: 0.85rem;
      color: #b91c1c;
      background: rgba(239,68,68,.08);
      border: 1px solid rgba(239,68,68,.25);
      border-radius: 8px;
      padding: 8px 12px;
    }

    .toggle-link {
      font-size: 0.82rem;
      color: var(--accent);
      cursor: pointer;
      text-align: center;
    }

    .toggle-link:hover { text-decoration: underline; }

    /* ── Console ── */
    #consoleContent { display: none; }

    .console-header {
      background: rgba(255,255,255,.88);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .console-header-logo {
      font-size: 1.2rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      color: var(--accent);
    }

    .console-header-sep {
      color: var(--border);
      font-size: 1.2rem;
    }

    .console-header-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--muted);
    }

    .console-header-spacer { flex: 1; }

    .console-header-user {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .console-header-logout {
      font-size: 0.82rem;
      color: var(--accent);
      cursor: pointer;
      border: none;
      background: none;
      font-weight: 600;
    }

    .console-main {
      max-width: 860px;
      margin: 0 auto;
      padding: 28px 20px 48px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .console-group-title {
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .console-links {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .console-link {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 2px 8px rgba(16,24,40,.05);
      text-decoration: none;
      color: var(--text);
      transition: border-color .15s, box-shadow .15s, transform .1s;
    }

    .console-link:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 16px rgba(111,92,247,.12);
      transform: translateY(-1px);
    }

    .console-link-icon {
      width: 38px;
      height: 38px;
      border-radius: 9px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .console-link-icon svg {
      width: 20px;
      height: 20px;
    }

    .console-link-body {
      flex: 1 1 auto;
      min-width: 0;
    }

    .console-link-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .console-link-desc {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .console-link-arrow {
      color: var(--border);
      font-size: 1rem;
      flex-shrink: 0;
      transition: color .15s;
    }

    .console-link:hover .console-link-arrow {
      color: var(--accent);
    }

    .session-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
    }

    .session-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .session-code {
      font-family: monospace;
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--accent);
      background: rgba(111,92,247,.08);
      padding: 2px 10px;
      border-radius: 6px;
    }

    .session-name {
      font-weight: 700;
      font-size: 0.95rem;
    }

    .session-school {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .session-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .session-actions a {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      padding: 4px 10px;
      border: 1px solid rgba(111,92,247,.25);
      border-radius: 6px;
    }

    .session-actions a:hover {
      background: rgba(111,92,247,.08);
    }

    .empty-msg {
      color: var(--muted);
      font-size: 0.88rem;
      padding: 14px;
    }

    @media (max-width: 500px) {
      .console-link-desc { display: none; }
    }
  </style>
</head>
<body>

  <!-- ── Login / Register ── -->
  <div class="login-page" id="loginPage">
    <div class="login-card">
      <div class="login-logo">toutcuit</div>
      <div class="login-title" id="formTitle">Connexion enseignant</div>

      <form id="loginForm">
        <div class="field" id="nameField" style="display:none; margin-bottom:12px;">
          <label for="nameInput">Nom</label>
          <input type="text" id="nameInput" placeholder="Votre nom">
        </div>
        <div class="field" style="margin-bottom:12px;">
          <label for="emailInput">Email</label>
          <input type="email" id="emailInput" placeholder="votre@email.ch" autofocus required>
        </div>
        <div class="field">
          <label for="pwInput">Mot de passe</label>
          <input type="password" id="pwInput" placeholder="••••••••" required>
        </div>
        <div id="loginError" class="error-msg" style="margin-top:10px;"></div>
        <div style="margin-top:14px;">
          <button class="btn-primary" type="submit" id="submitBtn">Se connecter</button>
        </div>
      </form>

      <div class="toggle-link" id="toggleMode">Pas encore de compte ? S'inscrire</div>
    </div>
  </div>

  <!-- ── Console ── -->
  <div id="consoleContent">
    <header class="console-header">
      <span class="console-header-logo">toutcuit</span>
      <span class="console-header-sep">/</span>
      <span class="console-header-title">Console</span>
      <span class="console-header-spacer"></span>
      <span class="console-header-user" id="userName"></span>
      <button class="console-header-logout" id="logoutBtn">Déconnexion</button>
    </header>

    <main class="console-main">

      <!-- Séances -->
      <div>
        <div class="console-group-title">Mes séances</div>
        <div id="sessionsList"></div>
      </div>

      <!-- Outils -->
      <div>
        <div class="console-group-title">Outils</div>
        <div class="console-links">

          <a href="/descripteurs/pages/certs.html" class="console-link">
            <div class="console-link-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
            </div>
            <div class="console-link-body">
              <div class="console-link-name">CERTs</div>
              <div class="console-link-desc">Ajouter des certifications</div>
            </div>
            <span class="console-link-arrow">&rarr;</span>
          </a>

          <a href="/descripteurs/pages/depot.html" class="console-link">
            <div class="console-link-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
              </svg>
            </div>
            <div class="console-link-body">
              <div class="console-link-name">Depot de CERTs</div>
              <div class="console-link-desc">Consulter et utiliser les certifications</div>
            </div>
            <span class="console-link-arrow">&rarr;</span>
          </a>

          <a href="/descripteurs/index.html" class="console-link">
            <div class="console-link-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
              </svg>
            </div>
            <div class="console-link-body">
              <div class="console-link-name">Macades</div>
              <div class="console-link-desc">La machine à descripteurs</div>
            </div>
            <span class="console-link-arrow">&rarr;</span>
          </a>

          <a href="/entrer.html" class="console-link">
            <div class="console-link-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 3h6v18h-6"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
              </svg>
            </div>
            <div class="console-link-body">
              <div class="console-link-name">Page d'entrée élèves</div>
              <div class="console-link-desc">toutcuit.ch/entrer</div>
            </div>
            <span class="console-link-arrow">&rarr;</span>
          </a>

        </div>
      </div>

    </main>
  </div>

  <script>
    const API = "/api";

    const loginPage = document.getElementById("loginPage");
    const consoleContent = document.getElementById("consoleContent");
    const loginForm = document.getElementById("loginForm");
    const loginError = document.getElementById("loginError");
    const emailInput = document.getElementById("emailInput");
    const pwInput = document.getElementById("pwInput");
    const nameInput = document.getElementById("nameInput");
    const nameField = document.getElementById("nameField");
    const formTitle = document.getElementById("formTitle");
    const submitBtn = document.getElementById("submitBtn");
    const toggleMode = document.getElementById("toggleMode");
    const userNameEl = document.getElementById("userName");
    const logoutBtn = document.getElementById("logoutBtn");
    const sessionsList = document.getElementById("sessionsList");

    let isRegister = false;

    function getToken() { return localStorage.getItem("tc_token"); }
    function getTeacher() {
      try { return JSON.parse(localStorage.getItem("tc_teacher")); } catch { return null; }
    }

    function showError(msg) {
      loginError.textContent = msg;
      loginError.style.display = "block";
    }

    function hideError() {
      loginError.style.display = "none";
    }

    // Toggle login / register
    toggleMode.addEventListener("click", () => {
      isRegister = !isRegister;
      nameField.style.display = isRegister ? "block" : "none";
      formTitle.textContent = isRegister ? "Inscription enseignant" : "Connexion enseignant";
      submitBtn.textContent = isRegister ? "S'inscrire" : "Se connecter";
      toggleMode.textContent = isRegister ? "Déjà un compte ? Se connecter" : "Pas encore de compte ? S'inscrire";
      hideError();
    });

    // Login / Register form
    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      hideError();

      const email = emailInput.value.trim();
      const password = pwInput.value;

      if (isRegister) {
        const name = nameInput.value.trim();
        if (!name) return showError("Le nom est requis.");

        try {
          const res = await fetch(`${API}/auth/register.php`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password, name })
          });
          const data = await res.json();
          if (data.error) return showError(data.error);

          localStorage.setItem("tc_token", data.token);
          localStorage.setItem("tc_teacher", JSON.stringify(data.teacher));
          unlock(data.teacher);
        } catch (err) {
          showError("Erreur réseau : " + err.message);
        }
      } else {
        try {
          const res = await fetch(`${API}/auth/login.php`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
          });
          const data = await res.json();
          if (data.error) return showError(data.error);

          localStorage.setItem("tc_token", data.token);
          localStorage.setItem("tc_teacher", JSON.stringify(data.teacher));
          unlock(data.teacher);
        } catch (err) {
          showError("Erreur réseau : " + err.message);
        }
      }
    });

    // Logout
    logoutBtn.addEventListener("click", () => {
      localStorage.removeItem("tc_token");
      localStorage.removeItem("tc_teacher");
      location.reload();
    });

    // Unlock console
    function unlock(teacher) {
      loginPage.style.display = "none";
      consoleContent.style.display = "block";
      if (teacher?.name) userNameEl.textContent = teacher.name;
      loadSessions();
    }

    // Load sessions
    async function loadSessions() {
      const token = getToken();
      try {
        const res = await fetch(`${API}/sessions/list.php`, {
          headers: { "Authorization": `Bearer ${token}` }
        });
        const sessions = await res.json();

        if (!Array.isArray(sessions) || !sessions.length) {
          sessionsList.innerHTML = `<div class="empty-msg">Aucune séance. Créez-en une ci-dessous.</div>`;
        } else {
          sessionsList.innerHTML = sessions.map(s => `
            <div class="session-card">
              <div class="session-card-header">
                <span class="session-code">${esc(s.code)}</span>
                <span class="session-name">${esc(s.name)}</span>
                <span class="session-school">${esc(s.school_name || "")}</span>
              </div>
              <div class="session-actions">
                <a href="#" onclick="manageCerts(${s.id}, '${esc(s.code)}'); return false;">CERTs</a>
                <a href="/descripteurs/pages/liens.html?session=${enc(s.code)}">Liens</a>
                <a href="/descripteurs/pages/liens.html?session=${enc(s.code)}&admin=1">Liens (admin)</a>
                <a href="/descripteurs/pages/feed.html?session=${enc(s.code)}">Feed</a>
                <a href="/descripteurs/pages/progress.html?session=${enc(s.code)}">Scores</a>
                <a href="/collector.html?code=${enc(s.code)}">Collector</a>
              </div>
              <div id="certs-panel-${s.id}" style="display:none; margin-top:12px;"></div>
            </div>
          `).join("");
        }

        // Add "create session" button
        sessionsList.innerHTML += `
          <div style="margin-top:12px;">
            <button class="btn-secondary" id="newSessionBtn">+ Nouvelle séance</button>
          </div>`;

        document.getElementById("newSessionBtn")?.addEventListener("click", createSession);
      } catch (err) {
        sessionsList.innerHTML = `<div class="empty-msg">Erreur: ${esc(err.message)}</div>`;
      }
    }

    // Create session
    async function createSession() {
      const token = getToken();

      // First, ensure we have a school
      let schools;
      try {
        const res = await fetch(`${API}/schools/list.php`, {
          headers: { "Authorization": `Bearer ${token}` }
        });
        schools = await res.json();
      } catch { schools = []; }

      let schoolId;
      if (Array.isArray(schools) && schools.length) {
        schoolId = schools[0].id;
      } else {
        const schoolName = prompt("Nom de votre école :");
        if (!schoolName) return;
        try {
          const res = await fetch(`${API}/schools/save.php`, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
            body: JSON.stringify({ name: schoolName })
          });
          const school = await res.json();
          schoolId = school.id;
        } catch { return alert("Erreur lors de la création de l'école."); }
      }

      const sessionName = prompt("Nom de la séance :");
      if (!sessionName) return;

      try {
        const res = await fetch(`${API}/sessions/create.php`, {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
          body: JSON.stringify({ name: sessionName, school_id: schoolId })
        });
        const session = await res.json();
        if (session.error) return alert(session.error);
        alert(`Séance créée ! Code : ${session.code}`);
        loadSessions();
      } catch (err) {
        alert("Erreur : " + err.message);
      }
    }

    function esc(s) {
      return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }
    function enc(s) { return encodeURIComponent(s); }

    // Manage CERTs for a session
    async function manageCerts(sessionId, sessionCode) {
      const panel = document.getElementById(`certs-panel-${sessionId}`);
      if (!panel) return;

      // Toggle visibility
      if (panel.style.display !== "none") {
        panel.style.display = "none";
        return;
      }

      panel.style.display = "block";
      panel.innerHTML = "<div style='color:var(--muted);font-size:.85rem;'>Chargement...</div>";

      const token = getToken();

      try {
        // Load all my CERTs + shared
        const certsRes = await fetch(`${API}/certs/list.php`, {
          headers: { "Authorization": `Bearer ${token}` }
        });
        const allCerts = await certsRes.json();

        // Load currently assigned CERTs
        const assignedRes = await fetch(`${API}/sessions/certs.php?session=${encodeURIComponent(sessionCode)}`);
        const assignedCerts = await assignedRes.json();
        const assignedIds = new Set((Array.isArray(assignedCerts) ? assignedCerts : []).map(c => c.id));

        if (!Array.isArray(allCerts) || !allCerts.length) {
          panel.innerHTML = "<div style='color:var(--muted);font-size:.85rem;'>Aucun CERT disponible. Ajoutez-en via la page CERTs.</div>";
          return;
        }

        const REL = { good: "Fiable", mid: "Indéterminé", bad: "Non fiable" };

        panel.innerHTML = `
          <div style="font-size:.82rem;font-weight:700;color:var(--muted);margin-bottom:8px;">
            Sélectionnez les CERTs pour cette séance :
          </div>
          <div style="display:flex;flex-direction:column;gap:6px;">
            ${allCerts.map(c => `
              <label style="display:flex;align-items:center;gap:8px;font-size:.88rem;cursor:pointer;padding:6px 8px;border-radius:8px;border:1px solid var(--border);background:var(--panel-2);">
                <input type="checkbox" value="${c.id}" ${assignedIds.has(c.id) ? "checked" : ""} class="cert-check-${sessionId}">
                <span style="flex:1;font-weight:600;">${esc(c.title)}</span>
                <span style="font-size:.75rem;color:var(--muted);">${esc(REL[c.reliability] || c.reliability)}</span>
                ${c.is_mine ? "" : '<span style="font-size:.7rem;color:var(--accent);font-weight:700;">partagé</span>'}
              </label>
            `).join("")}
          </div>
          <div style="margin-top:10px;">
            <button class="btn-secondary" id="saveCerts-${sessionId}">Enregistrer</button>
          </div>
        `;

        document.getElementById(`saveCerts-${sessionId}`)?.addEventListener("click", async () => {
          const checked = [...panel.querySelectorAll(`.cert-check-${sessionId}:checked`)].map(cb => parseInt(cb.value));
          try {
            const res = await fetch(`${API}/sessions/certs.php`, {
              method: "POST",
              headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
              body: JSON.stringify({ session_id: sessionId, certs: checked })
            });
            const result = await res.json();
            if (result.error) {
              alert("Erreur : " + result.error);
            } else {
              alert(`${result.count} CERT(s) associé(s) à la séance.`);
              panel.style.display = "none";
            }
          } catch (err) {
            alert("Erreur : " + err.message);
          }
        });
      } catch (err) {
        panel.innerHTML = `<div style='color:#b91c1c;font-size:.85rem;'>Erreur: ${esc(err.message)}</div>`;
      }
    }

    // Auto-login if token exists
    const existingToken = getToken();
    const existingTeacher = getTeacher();
    if (existingToken && existingTeacher) {
      unlock(existingTeacher);
    }
  </script>
</body>
</html>
