<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
  <title>Superadmin — toutcuit.ch</title>
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --panel-2: #f1f3f9;
      --text: #1f2328;
      --muted: #5e6673;
      --border: #d7dbe6;
      --accent: #6f5cf7;
      --accent-hover: #5a48e0;
      --shadow: 0 10px 30px rgba(16, 24, 40, .08);
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      background:
        radial-gradient(1200px 700px at 50% 0%, rgba(111, 92, 247, .10), transparent 58%),
        var(--bg);
      color: var(--text);
      font-family: 'Inter var', 'Inter', system-ui, sans-serif;
      font-weight: 500;
      line-height: 1.5;
    }

    /* ── Login ── */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .login-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px 28px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .login-logo { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.02em; color: var(--accent); }
    .login-title { font-size: 1.1rem; font-weight: 700; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 0.85rem; font-weight: 600; color: var(--muted); }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 10px 13px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      font-size: 1rem;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--accent); }

    .btn-primary {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 9px;
      background: var(--accent);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-primary:hover { background: var(--accent-hover); }

    .error-msg {
      display: none;
      font-size: 0.85rem;
      color: #b91c1c;
      background: rgba(239,68,68,.08);
      border: 1px solid rgba(239,68,68,.25);
      border-radius: 8px;
      padding: 8px 12px;
    }
    .success-msg {
      display: none;
      font-size: 0.85rem;
      color: #166534;
      background: rgba(34,197,94,.08);
      border: 1px solid rgba(34,197,94,.25);
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 10px;
    }

    /* ── Console ── */
    #consoleContent { display: none; }

    .console-header {
      background: rgba(255,255,255,.88);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .console-header-logo { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; color: var(--accent); }
    .console-header-sep { color: var(--border); font-size: 1.2rem; }
    .console-header-title { font-size: 0.95rem; font-weight: 700; color: var(--muted); }
    .console-header-spacer { flex: 1; }
    .console-header-logout { font-size: 0.82rem; color: var(--accent); cursor: pointer; border: none; background: none; font-weight: 600; }

    .console-main {
      max-width: 860px;
      margin: 0 auto;
      padding: 28px 20px 48px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .console-group-title {
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .tool-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 2px 8px rgba(16,24,40,.05);
    }
    .tool-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 14px; }
    .tool-card .field { margin-bottom: 12px; }

    /* ── Home cards ── */
    .home-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
    }
    .home-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 20px;
      box-shadow: 0 2px 8px rgba(16,24,40,.05);
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .home-card:hover { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(111,92,247,.12); }
    .home-card-title { font-size: .95rem; font-weight: 800; }
    .home-card-count { font-size: 1.6rem; font-weight: 900; color: var(--accent); }
    .home-card-desc { font-size: .82rem; color: var(--muted); }

    /* ── View system ── */
    .sa-view { display: none; }
    .sa-view.active { display: block; }

    .view-toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .btn-back {
      padding: 7px 14px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      background: var(--panel);
      font-size: .85rem;
      font-weight: 700;
      cursor: pointer;
      color: var(--muted);
      transition: all .15s;
    }
    .btn-back:hover { border-color: var(--accent); color: var(--accent); }

    .view-title { font-size: 1.05rem; font-weight: 800; flex: 1; }
    .view-count { font-size: .82rem; color: var(--muted); font-weight: 600; }

    /* ── Search box ── */
    .search-box {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      padding: 8px 12px;
      border-radius: 9px;
      border: 1.5px solid var(--border);
      background: var(--panel);
      cursor: text;
      margin-bottom: 12px;
      transition: border-color .15s;
    }
    .search-box:focus-within { border-color: var(--accent); }
    .search-box input {
      flex: 1 1 100px;
      border: none;
      outline: none;
      background: transparent;
      font-size: .88rem;
      color: var(--text);
      padding: 4px 0;
      min-width: 80px;
    }
    .search-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px 3px 10px;
      border-radius: 7px;
      background: rgba(111,92,247,.1);
      border: 1px solid rgba(111,92,247,.25);
      color: var(--text);
      font-size: .8rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .search-chip button {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: .85rem;
      line-height: 1;
      padding: 0 2px;
      border-radius: 4px;
      transition: color .15s, background .15s;
    }
    .search-chip button:hover { color: #b91c1c; background: rgba(239,68,68,.1); }

    /* ── List rows ── */
    .list-container {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .list-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 9px;
      font-size: 0.88rem;
    }
    .list-row-name { font-weight: 700; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .list-row-meta { color: var(--muted); font-size: 0.82rem; }
    .list-row-date { color: var(--muted); font-size: 0.75rem; white-space: nowrap; }
    .list-row-code { font-size: .75rem; color: var(--muted); font-family: monospace; font-weight: 800; }

    .btn-delete {
      background: none;
      border: 1px solid transparent;
      border-radius: 7px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 4px 10px;
      transition: all .15s;
    }
    .btn-delete:hover { color: #b91c1c; border-color: rgba(239,68,68,.3); background: rgba(239,68,68,.06); }

    .btn-edit {
      background: none;
      border: 1px solid transparent;
      border-radius: 7px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 4px 10px;
      transition: all .15s;
    }
    .btn-edit:hover { color: var(--accent); border-color: rgba(111,92,247,.3); background: rgba(111,92,247,.06); }

    /* ── Cert rows ── */
    .cert-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 10px 12px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 9px;
      font-size: 0.85rem;
    }
    .cert-row-header { display: flex; align-items: center; gap: 10px; }
    .cert-row-title { font-weight: 700; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cert-row-teacher { font-size: 0.78rem; color: var(--muted); }
    .cert-row-date { color: var(--muted); font-size: 0.75rem; white-space: nowrap; }

    .cert-desc-tag { font-size: 0.72rem; font-weight: 700; padding: 1px 7px; border-radius: 5px; }
    .cert-desc-tag.good { background: rgba(34,197,94,.30); color: #166534; border: 1px solid rgba(34,197,94,.75); }
    .cert-desc-tag.mid  { background: rgba(249,115,22,.30); color: #9a3412; border: 1px solid rgba(249,115,22,.75); }
    .cert-desc-tag.bad  { background: rgba(239,68,68,.32); color: #991b1b; border: 1px solid rgba(239,68,68,.80); }

    .cert-toggle {
      flex-shrink: 0;
      cursor: pointer;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 1.1rem;
      padding: 6px 10px;
      border-radius: 8px;
      line-height: 1;
    }
    .cert-toggle:hover { background: rgba(111,92,247,.08); color: var(--accent); }

    .cert-detail {
      font-size: .84rem;
      color: var(--text);
      line-height: 1.45;
      display: none;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .cert-row.is-expanded .cert-detail { display: block; }
    .cert-detail p { margin: 4px 0; }
    .cert-detail strong { font-weight: 700; }
    .cert-actions { display: flex; gap: 8px; margin-top: 10px; }

    .cert-edit-form {
      display: none;
      flex-direction: column;
      gap: 6px;
      margin-top: 6px;
      padding: 10px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .cert-edit-form label { font-size: 0.78rem; font-weight: 600; color: var(--muted); }
    .cert-edit-form input,
    .cert-edit-form textarea,
    .cert-edit-form select {
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 0.85rem;
      background: var(--bg);
      color: var(--text);
      outline: none;
    }
    .cert-edit-form textarea { resize: vertical; min-height: 40px; }
    .cert-edit-form input:focus,
    .cert-edit-form textarea:focus,
    .cert-edit-form select:focus { border-color: var(--accent); }
    .cert-edit-btns { display: flex; gap: 8px; margin-top: 4px; }
    .cert-edit-btns button { padding: 6px 14px; border-radius: 7px; font-size: 0.82rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--panel); }
    .cert-edit-btns .btn-save { background: var(--accent); color: #fff; border-color: var(--accent); }
    .cert-edit-btns .btn-save:hover { background: var(--accent-hover); }

    /* ── Confirm dialog ── */
    .confirm-dialog {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,.35); backdrop-filter: blur(4px);
    }
    .confirm-card {
      background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 24px 24px 20px; max-width: 400px; width: 90%;
    }
    .confirm-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
    .confirm-card p { font-size: 0.88rem; color: var(--muted); margin-bottom: 6px; line-height: 1.5; }
    .confirm-card .warn {
      font-size: 0.82rem; color: #92400e;
      background: rgba(245,158,11,.08); border: 1px solid rgba(245,158,11,.25);
      border-radius: 8px; padding: 8px 12px; margin: 10px 0 16px;
    }
    .confirm-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-cancel { padding: 8px 16px; border: 1px solid var(--border); border-radius: 9px; background: var(--panel); font-size: 0.88rem; font-weight: 600; cursor: pointer; }
    .btn-danger { padding: 8px 16px; border: none; border-radius: 9px; background: #dc2626; color: #fff; font-size: 0.88rem; font-weight: 700; cursor: pointer; transition: background .15s; }
    .btn-danger:hover { background: #b91c1c; }

    /* ── Session row with checkbox ── */
    .session-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .88rem;
      padding: 8px 10px;
      border-radius: 9px;
      border: 1px solid var(--border);
      background: var(--panel-2);
    }
    .session-row input[type="checkbox"] { cursor: pointer; flex-shrink: 0; }

    /* ── Feed global bar ── */
    .feed-bar {
      position: sticky;
      bottom: 0;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div class="login-page" id="loginPage">
    <div class="login-card">
      <div class="login-logo">toutcuit</div>
      <div class="login-title">Superadmin</div>
      <form id="loginForm">
        <div class="field" style="margin-bottom:12px;">
          <label for="pwInput">Mot de passe</label>
          <input type="password" id="pwInput" placeholder="Mot de passe superadmin" autofocus required>
        </div>
        <div id="loginError" class="error-msg" style="margin-top:10px;">Mot de passe incorrect.</div>
        <div style="margin-top:14px;">
          <button class="btn-primary" type="submit">Accéder</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Console -->
  <div id="consoleContent">
    <header class="console-header">
      <span class="console-header-logo">toutcuit</span>
      <span class="console-header-sep">/</span>
      <span class="console-header-title" id="headerTitle">Superadmin</span>
      <span class="console-header-spacer"></span>
      <button class="console-header-logout" id="logoutBtn">Déconnexion</button>
    </header>

    <!-- ════ HOME VIEW ════ -->
    <div class="sa-view active" id="viewHome">
      <main class="console-main">

        <!-- Create teacher -->
        <div>
          <div class="console-group-title">Créer un compte enseignant-e</div>
          <div class="tool-card">
            <div id="createSuccess" class="success-msg"></div>
            <div id="createError" class="error-msg"></div>
            <form id="createForm">
              <div class="field">
                <label for="teacherName">Nom</label>
                <input type="text" id="teacherName" placeholder="Prénom Nom" required>
              </div>
              <div class="field">
                <label for="teacherEmail">Email</label>
                <input type="email" id="teacherEmail" placeholder="enseignant-e@ecole.ch" required>
              </div>
              <div class="field">
                <label for="teacherPassword">Mot de passe initial</label>
                <input type="text" id="teacherPassword" placeholder="Min. 6 caractères" required>
              </div>
              <div style="margin-top:14px;">
                <button class="btn-primary" type="submit">Créer le compte</button>
              </div>
            </form>
          </div>
        </div>

        <!-- Navigation cards -->
        <div>
          <div class="console-group-title">Gérer</div>
          <div class="home-grid">
            <div class="home-card" onclick="showView('teachers')">
              <div class="home-card-title">Enseignant-es</div>
              <div class="home-card-count" id="homeTeacherCount">—</div>
              <div class="home-card-desc">Comptes, suppression</div>
            </div>
            <div class="home-card" onclick="showView('sessions')">
              <div class="home-card-title">Séances</div>
              <div class="home-card-count" id="homeSessionCount">—</div>
              <div class="home-card-desc">Feed global, suppression</div>
            </div>
            <div class="home-card" onclick="showView('certs')">
              <div class="home-card-title">Dépôt de CERTs</div>
              <div class="home-card-count" id="homeCertCount">—</div>
              <div class="home-card-desc">Consulter, modifier, supprimer</div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- ════ TEACHERS VIEW ════ -->
    <div class="sa-view" id="viewTeachers">
      <main class="console-main">
        <div class="view-toolbar">
          <button class="btn-back" onclick="showView('home')">← Retour</button>
          <span class="view-title">Enseignant-es</span>
          <span class="view-count" id="teachersCount"></span>
        </div>
        <div class="search-box" id="teacherSearchBox">
          <input type="text" id="teacherSearchInput" placeholder="Rechercher par nom ou email..." />
        </div>
        <div id="deleteSuccess" class="success-msg"></div>
        <div id="deleteError" class="error-msg"></div>
        <div class="list-container" id="teachersList"></div>
      </main>
    </div>

    <!-- ════ SESSIONS VIEW ════ -->
    <div class="sa-view" id="viewSessions">
      <main class="console-main" style="padding-bottom:80px;">
        <div class="view-toolbar">
          <button class="btn-back" onclick="showView('home')">← Retour</button>
          <span class="view-title">Séances</span>
          <span class="view-count" id="sessionsCount"></span>
        </div>
        <div class="search-box" id="sessionSearchBox">
          <input type="text" id="sessionSearchInput" placeholder="Rechercher par nom, code ou enseignant-e..." />
        </div>
        <div class="list-container" id="sessionsList"></div>
      </main>
      <div class="feed-bar" id="feedBar">
        <button class="btn-primary" id="openGlobalFeedBtn" style="width:auto;padding:10px 20px;">Ouvrir le Feed global</button>
        <span id="globalFeedCount" style="font-size:.82rem;color:var(--muted);"></span>
        <span id="globalFeedError" style="font-size:.82rem;color:#b91c1c;font-weight:600;display:none;"></span>
      </div>
    </div>

    <!-- ════ CERTS VIEW ════ -->
    <div class="sa-view" id="viewCerts">
      <main class="console-main">
        <div class="view-toolbar">
          <button class="btn-back" onclick="showView('home')">← Retour</button>
          <span class="view-title">Dépôt de CERTs</span>
          <span class="view-count" id="certsCount"></span>
        </div>
        <div class="search-box" id="certSearchBox">
          <input type="text" id="certSearchInput" placeholder="Rechercher par titre, descripteur, enseignant-e..." />
        </div>
        <div id="certSuccess" class="success-msg"></div>
        <div id="certError" class="error-msg"></div>
        <div class="list-container" id="certsList"></div>
      </main>
    </div>

  </div>

  <script>
    const API = "/api";
    const SA_KEY = "tc_superadmin";
    const PASSWORD = "certify2026!";

    // ── View system ──

    function showView(name) {
      document.querySelectorAll(".sa-view").forEach(v => v.classList.remove("active"));
      document.getElementById("view" + name.charAt(0).toUpperCase() + name.slice(1)).classList.add("active");
      document.getElementById("headerTitle").textContent =
        name === "home" ? "Superadmin" :
        name === "teachers" ? "Enseignant-es" :
        name === "sessions" ? "Séances" :
        name === "certs" ? "Dépôt de CERTs" : "Superadmin";
      window.scrollTo(0, 0);
    }

    // ── Login ──

    const loginPage = document.getElementById("loginPage");
    const consoleContent = document.getElementById("consoleContent");

    document.getElementById("loginForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const pw = document.getElementById("pwInput");
      if (pw.value === PASSWORD) {
        sessionStorage.setItem(SA_KEY, "true");
        unlock();
      } else {
        document.getElementById("loginError").style.display = "block";
        pw.value = "";
        pw.focus();
      }
    });

    document.getElementById("logoutBtn").addEventListener("click", () => {
      sessionStorage.removeItem(SA_KEY);
      location.reload();
    });

    let allTeachersData = [];
    let allSessionsData = [];
    let allCertsData = [];
    let teacherSearchTerm = "";
    let sessionSearchTerm = "";
    let certSearchTerms = [];
    let globalFeedSelectedCodes = new Set();

    function unlock() {
      loginPage.style.display = "none";
      consoleContent.style.display = "block";
      loadTeachers();
      loadSessions();
      loadCerts();
    }

    if (sessionStorage.getItem(SA_KEY) === "true") unlock();

    // ── Create teacher ──

    document.getElementById("createForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const createSuccess = document.getElementById("createSuccess");
      const createError = document.getElementById("createError");
      createSuccess.style.display = "none";
      createError.style.display = "none";

      const name = document.getElementById("teacherName").value.trim();
      const email = document.getElementById("teacherEmail").value.trim();
      const password = document.getElementById("teacherPassword").value;

      if (password.length < 6) {
        createError.textContent = "Le mot de passe doit contenir au moins 6 caractères.";
        createError.style.display = "block";
        return;
      }

      try {
        const res = await fetch(`${API}/auth/register.php`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password, name })
        });
        const data = await res.json();

        if (data.error) {
          createError.textContent = data.error;
          createError.style.display = "block";
        } else {
          createSuccess.textContent = `Compte créé pour ${name} (${email}).`;
          createSuccess.style.display = "block";
          document.getElementById("createForm").reset();
          loadTeachers();
        }
      } catch (err) {
        createError.textContent = "Erreur réseau : " + err.message;
        createError.style.display = "block";
      }
    });

    // ── Teachers ──

    async function loadTeachers() {
      try {
        const res = await fetch(`${API}/admin/teachers.php`);
        allTeachersData = await res.json();
        if (!Array.isArray(allTeachersData)) allTeachersData = [];
      } catch { allTeachersData = []; }
      document.getElementById("homeTeacherCount").textContent = allTeachersData.length;
      renderTeachers();
    }

    function renderTeachers() {
      const list = document.getElementById("teachersList");
      const q = teacherSearchTerm.toLowerCase();
      const filtered = allTeachersData.filter(t => {
        if (!q) return true;
        return [t.name, t.email].filter(Boolean).join(" ").toLowerCase().includes(q);
      });
      document.getElementById("teachersCount").textContent = `${filtered.length} / ${allTeachersData.length}`;

      if (!filtered.length) {
        list.innerHTML = '<div style="color:var(--muted);font-size:.85rem;padding:12px;">Aucun-e enseignant-e.</div>';
        return;
      }

      list.innerHTML = filtered.map(t => `
        <div class="list-row">
          <span class="list-row-name">${esc(t.name)}</span>
          <span class="list-row-meta">${esc(t.email)}</span>
          <span class="list-row-date">${esc(t.created_at?.substring(0, 10) || "")}</span>
          <button class="btn-delete" onclick="confirmDelete(${t.id}, '${esc(t.name).replace(/'/g, "\\'")}', '${esc(t.email).replace(/'/g, "\\'")}')">Supprimer</button>
        </div>
      `).join("");
    }

    document.getElementById("teacherSearchInput").addEventListener("input", (e) => {
      teacherSearchTerm = e.target.value;
      renderTeachers();
    });

    function confirmDelete(id, name, email) {
      const overlay = document.createElement("div");
      overlay.className = "confirm-dialog";
      overlay.innerHTML = `
        <div class="confirm-card">
          <h3>Supprimer ce compte ?</h3>
          <p><strong>${name}</strong> (${email})</p>
          <div class="warn">Le login et les séances seront supprimés.<br>Les résultats d'élèves et les CERTs déposées seront conservés.</div>
          <div class="confirm-actions">
            <button class="btn-cancel" id="cancelDel">Annuler</button>
            <button class="btn-danger" id="confirmDel">Supprimer</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
      overlay.querySelector("#cancelDel").addEventListener("click", () => overlay.remove());
      overlay.addEventListener("click", (e) => { if (e.target === overlay) overlay.remove(); });
      overlay.querySelector("#confirmDel").addEventListener("click", async () => {
        overlay.remove();
        const deleteSuccess = document.getElementById("deleteSuccess");
        const deleteError = document.getElementById("deleteError");
        deleteSuccess.style.display = "none";
        deleteError.style.display = "none";
        try {
          const res = await fetch(`${API}/admin/delete-teacher.php`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ teacher_id: id })
          });
          const data = await res.json();
          if (data.error) { deleteError.textContent = data.error; deleteError.style.display = "block"; }
          else {
            deleteSuccess.textContent = `Compte de ${name} supprimé (${data.sessions_deleted} séance(s)).`;
            deleteSuccess.style.display = "block";
            loadTeachers();
            loadSessions();
          }
        } catch (err) { deleteError.textContent = "Erreur : " + err.message; deleteError.style.display = "block"; }
      });
    }

    // ── Sessions ──

    async function loadSessions() {
      try {
        const res = await fetch(`${API}/admin/sessions.php`);
        allSessionsData = await res.json();
        if (!Array.isArray(allSessionsData)) allSessionsData = [];
      } catch { allSessionsData = []; }
      document.getElementById("homeSessionCount").textContent = allSessionsData.length;
      renderSessions();
    }

    function renderSessions() {
      const list = document.getElementById("sessionsList");
      const q = sessionSearchTerm.toLowerCase();
      const filtered = allSessionsData.filter(s => {
        if (!q) return true;
        return [s.name, s.code, s.teacher_name, s.school_name].filter(Boolean).join(" ").toLowerCase().includes(q);
      });
      document.getElementById("sessionsCount").textContent = `${filtered.length} / ${allSessionsData.length}`;

      if (!filtered.length) {
        list.innerHTML = '<div style="color:var(--muted);font-size:.85rem;padding:12px;">Aucune séance.</div>';
        return;
      }

      list.innerHTML = filtered.map(s => {
        const isOpen = s.is_open === 1 || s.is_open === "1" || s.is_open === true;
        return `
        <div class="session-row">
          <input type="checkbox" value="${esc(s.code)}" class="gf-check" ${globalFeedSelectedCodes.has(s.code) ? "checked" : ""}>
          <span class="list-row-name">${esc(s.school_name || "")} — ${esc(s.name)}</span>
          <span class="list-row-code">${esc(s.code)}</span>
          <span class="list-row-meta" style="font-size:.72rem;">${esc(s.teacher_name || "—")}</span>
          <button class="btn-toggle-open" data-id="${s.id}" data-open="${isOpen ? "1" : "0"}" style="
            padding:4px 10px;border-radius:7px;font-size:.78rem;font-weight:700;cursor:pointer;
            border:1px solid ${isOpen ? "rgba(34,197,94,.4)" : "var(--border)"};
            background:${isOpen ? "rgba(34,197,94,.08)" : "var(--panel-2)"};
            color:${isOpen ? "#166534" : "var(--muted)"};
            transition:all .15s;
          ">${isOpen ? "Ouverte" : "Fermée"}</button>
          <button class="btn-delete" onclick="confirmDeleteSession(${s.id}, '${esc(s.name).replace(/'/g, "\\'")}', '${esc(s.code)}')">Supprimer</button>
        </div>`;
      }).join("");

      list.querySelectorAll(".gf-check").forEach(cb => {
        cb.addEventListener("change", () => {
          if (cb.checked) globalFeedSelectedCodes.add(cb.value);
          else globalFeedSelectedCodes.delete(cb.value);
          updateGlobalFeedBtn();
        });
      });

      list.querySelectorAll(".btn-toggle-open").forEach(btn => {
        btn.addEventListener("click", () => toggleSessionOpen(btn));
      });
    }

    async function toggleSessionOpen(btn) {
      const id = parseInt(btn.dataset.id);
      const currentlyOpen = btn.dataset.open === "1";
      const newVal = currentlyOpen ? 0 : 1;
      btn.disabled = true;
      btn.textContent = "...";
      try {
        const res = await fetch(`${API}/admin/update-session.php`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: id, is_open: newVal })
        });
        const data = await res.json();
        if (data.error) { alert("Erreur : " + data.error); btn.disabled = false; btn.textContent = currentlyOpen ? "Ouverte" : "Fermée"; return; }
        // Update local data and re-render
        const s = allSessionsData.find(x => x.id === id);
        if (s) s.is_open = newVal;
        renderSessions();
      } catch (err) { alert("Erreur réseau : " + err.message); btn.disabled = false; btn.textContent = currentlyOpen ? "Ouverte" : "Fermée"; }
    }

    document.getElementById("sessionSearchInput").addEventListener("input", (e) => {
      sessionSearchTerm = e.target.value;
      renderSessions();
    });

    function updateGlobalFeedBtn() {
      const count = document.getElementById("globalFeedCount");
      const errEl = document.getElementById("globalFeedError");
      const n = globalFeedSelectedCodes.size;
      count.textContent = n ? `${n} séance(s) sélectionnée(s)` : "";
      if (n > 0 && errEl) errEl.style.display = "none";
    }

    function confirmDeleteSession(id, name, code) {
      const overlay = document.createElement("div");
      overlay.className = "confirm-dialog";
      overlay.innerHTML = `
        <div class="confirm-card">
          <h3>Supprimer cette séance ?</h3>
          <p><strong>${name}</strong> (${code})</p>
          <div class="warn">La séance, ses liens, les résultats d'élèves et les liens collectés seront supprimés.<br>Cette action est irréversible.</div>
          <div class="confirm-actions">
            <button class="btn-cancel" id="cancelDelS">Annuler</button>
            <button class="btn-danger" id="confirmDelS">Supprimer</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
      overlay.querySelector("#cancelDelS").addEventListener("click", () => overlay.remove());
      overlay.addEventListener("click", (e) => { if (e.target === overlay) overlay.remove(); });
      overlay.querySelector("#confirmDelS").addEventListener("click", async () => {
        overlay.remove();
        try {
          const res = await fetch(`${API}/admin/delete-session.php`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session_id: id })
          });
          const data = await res.json();
          if (data.error) { alert("Erreur : " + data.error); }
          else {
            globalFeedSelectedCodes.delete(code);
            updateGlobalFeedBtn();
            loadSessions();
          }
        } catch (err) { alert("Erreur réseau : " + err.message); }
      });
    }

    document.getElementById("openGlobalFeedBtn").addEventListener("click", () => {
      const errEl = document.getElementById("globalFeedError");
      if (!globalFeedSelectedCodes.size) {
        errEl.textContent = "Vous devez sélectionner au minimum 1 séance";
        errEl.style.display = "inline";
        return;
      }
      errEl.style.display = "none";
      const codes = [...globalFeedSelectedCodes].join(",");

      const isMobile = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;
      if (isMobile) {
        window.open(`/global-feed.html?sessions=${encodeURIComponent(codes)}`, "_blank");
        return;
      }

      const FEED2_MAIN_NAME = "gfeed_main";
      const FEED2_SIDE_NAME = "gfeed_sidecar";
      const FEED2_SIDE_W = 520;
      const W = Math.max(800, window.screen?.availWidth || window.innerWidth || 1200);
      const H = Math.max(600, window.screen?.availHeight || window.innerHeight || 900);
      const X = window.screen?.availLeft ?? 0;
      const Y = window.screen?.availTop ?? 0;
      const sideW = Math.min(FEED2_SIDE_W, Math.floor(W * 0.45));
      const gap = 10;
      const mainW = W - sideW - gap;
      const sideLeft = X + W - sideW;
      const sc = encodeURIComponent(codes);

      const main = window.open("about:blank", FEED2_MAIN_NAME,
        `popup=yes,width=${mainW},height=${H},left=${X},top=${Y},resizable=yes,scrollbars=yes`
      );
      if (!main) { alert("Pop-ups bloquées."); return; }
      main.document.write(`<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8"><title>Feed Tout Cuit</title>
        <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
        <style>*{box-sizing:border-box;margin:0;padding:0;}html,body{min-height:100vh;background:#f6f7fb;display:flex;align-items:center;justify-content:center;font-family:'Inter var','Inter',system-ui,sans-serif;}.brand{text-align:center;}.brand h1{font-size:3rem;font-weight:900;letter-spacing:-0.03em;color:#6f5cf7;}.brand p{font-size:1rem;color:#5e6673;margin-top:8px;}</style></head><body>
        <div class="brand"><h1>Feed Tout Cuit</h1><p>Cliquez sur un lien dans le feed pour l'afficher ici.</p></div>
      </body></html>`);
      main.document.close();

      const side = window.open(
        `/global-feed.html?sessions=${sc}&mode=sidecar&mainwin=${FEED2_MAIN_NAME}`, FEED2_SIDE_NAME,
        `popup=yes,width=${sideW},height=${H},left=${sideLeft},top=${Y},resizable=yes,scrollbars=yes`
      );
      if (!side) { try { main.close(); } catch {} alert("Pop-ups bloquées."); }
    });

    // ── CERTs ──

    const certSuccess = document.getElementById("certSuccess");
    const certError = document.getElementById("certError");
    const certsList = document.getElementById("certsList");
    const certSearchBox = document.getElementById("certSearchBox");
    const certSearchInput = document.getElementById("certSearchInput");

    async function loadCerts() {
      try {
        const res = await fetch(`${API}/admin/certs.php`);
        allCertsData = await res.json();
        if (!Array.isArray(allCertsData)) allCertsData = [];
      } catch { allCertsData = []; }
      document.getElementById("homeCertCount").textContent = allCertsData.length;
      renderCerts();
    }

    function renderCerts() {
      const filtered = allCertsData.filter(c => {
        if (!certSearchTerms.length) return true;
        const haystack = [c.title, c.descriptor1, c.descriptor2, c.teacher_name, c.expert]
          .filter(Boolean).join(" ").toLowerCase();
        return certSearchTerms.every(t => haystack.includes(t));
      });
      document.getElementById("certsCount").textContent = `${filtered.length} / ${allCertsData.length}`;

      if (!filtered.length) {
        certsList.innerHTML = '<div style="color:var(--muted);font-size:.85rem;padding:12px;">Aucune CERT trouvée.</div>';
        return;
      }

      certsList.innerHTML = filtered.map(c => `
        <div class="cert-row" id="cert-row-${c.id}">
          <div class="cert-row-header">
            <span class="cert-row-title" title="${esc(c.title)}">${esc(c.title)}</span>
            ${c.descriptor1 ? `<span class="cert-desc-tag ${c.reliability}">${esc(c.descriptor1)}</span>` : ""}
            ${c.descriptor2 ? `<span class="cert-desc-tag ${c.reliability}">${esc(c.descriptor2)}</span>` : ""}
            ${c.cert_date ? `<span class="cert-row-date">${esc(c.cert_date.substring(0, 10))}</span>` : ""}
            <span class="cert-row-teacher">${esc(c.teacher_name || "—")}</span>
            <button class="cert-toggle" title="Détails">&#9662;</button>
          </div>
          <div class="cert-detail">
            ${c.expert || c.cert_date ? `<p>${c.expert ? `<strong>${esc(c.expert)}</strong>` : ""}${c.expert && c.cert_date ? " — " : ""}${c.cert_date ? esc(c.cert_date) : ""}</p>` : ""}
            ${c.url ? `<p><a href="${esc(c.url)}" target="_blank" rel="noopener" style="color:var(--accent);word-break:break-all;">${esc(c.url)}</a></p>` : ""}
            ${c.three_phrases ? `<ul style="margin:6px 0;padding-left:18px;">${esc(c.three_phrases).split(/[\n;]+/).filter(s => s.trim()).map(s => '<li>' + s.trim() + '</li>').join("")}</ul>` : ""}
            ${c.context ? `<p>${esc(c.context)}</p>` : ""}
            ${c.content ? `<p>${esc(c.content)}</p>` : ""}
            ${c.reliability_text ? `<p>${esc(c.reliability_text)}</p>` : ""}
            ${c.references_text ? `<ol style="margin:6px 0;padding-left:22px;">${esc(c.references_text).split(/[\n;]+/).filter(s => s.trim()).map(s => '<li>' + s.trim() + '</li>').join("")}</ol>` : ""}
            <div class="cert-actions">
              <button class="btn-edit" onclick="toggleCertEdit(${c.id})">Modifier</button>
              <button class="btn-delete" onclick="deleteCertAdmin(${c.id}, '${esc(c.title).replace(/'/g, "\\'")}')">Supprimer</button>
            </div>
            <div class="cert-edit-form" id="cert-edit-${c.id}"></div>
          </div>
        </div>
      `).join("");

      certsList.querySelectorAll(".cert-toggle").forEach(btn => {
        btn.addEventListener("click", () => {
          const row = btn.closest(".cert-row");
          row.classList.toggle("is-expanded");
          btn.textContent = row.classList.contains("is-expanded") ? "\u25B4" : "\u25BE";
        });
      });
    }

    function addCertSearchTerm(term) {
      term = term.trim().toLowerCase();
      if (!term || certSearchTerms.includes(term)) return;
      certSearchTerms.push(term);
      renderCertChips();
      renderCerts();
    }

    function removeCertSearchTerm(term) {
      certSearchTerms = certSearchTerms.filter(t => t !== term);
      renderCertChips();
      renderCerts();
    }

    function renderCertChips() {
      certSearchBox.querySelectorAll(".search-chip").forEach(el => el.remove());
      certSearchTerms.forEach(term => {
        const chip = document.createElement("span");
        chip.className = "search-chip";
        chip.innerHTML = `${esc(term)}<button title="Supprimer">&times;</button>`;
        chip.querySelector("button").addEventListener("click", () => removeCertSearchTerm(term));
        certSearchBox.insertBefore(chip, certSearchInput);
      });
      certSearchInput.placeholder = certSearchTerms.length ? "Ajouter un critère..." : "Rechercher par titre, descripteur, enseignant-e...";
    }

    certSearchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); addCertSearchTerm(certSearchInput.value); certSearchInput.value = ""; }
      if (e.key === "Backspace" && !certSearchInput.value && certSearchTerms.length) {
        removeCertSearchTerm(certSearchTerms[certSearchTerms.length - 1]);
      }
    });

    certSearchBox.addEventListener("click", () => certSearchInput.focus());

    function toggleCertEdit(id) {
      const form = document.getElementById(`cert-edit-${id}`);
      if (!form) return;
      if (form.style.display === "flex") { form.style.display = "none"; return; }
      const c = allCertsData.find(x => x.id === id);
      if (!c) return;
      form.style.display = "flex";
      form.innerHTML = `
        <label>Titre</label>
        <input type="text" data-field="title" value="${esc(c.title)}" />
        <label>URL</label>
        <input type="text" data-field="url" value="${esc(c.url)}" />
        <label>Expert</label>
        <input type="text" data-field="expert" value="${esc(c.expert || "")}" />
        <label>Date (AAAA-MM-JJ)</label>
        <input type="text" data-field="cert_date" value="${esc(c.cert_date || "")}" />
        <label>Descripteur 1</label>
        <input type="text" data-field="descriptor1" value="${esc(c.descriptor1 || "")}" />
        <label>Descripteur 2</label>
        <input type="text" data-field="descriptor2" value="${esc(c.descriptor2 || "")}" />
        <label>Fiabilité</label>
        <select data-field="reliability">
          <option value="good" ${c.reliability === "good" ? "selected" : ""}>Fiable</option>
          <option value="mid" ${c.reliability === "mid" ? "selected" : ""}>Indéterminé</option>
          <option value="bad" ${c.reliability === "bad" ? "selected" : ""}>Pas fiable</option>
        </select>
        <label>3 phrases</label>
        <textarea data-field="three_phrases" rows="2">${esc(c.three_phrases || "")}</textarea>
        <label>Contexte</label>
        <textarea data-field="context" rows="2">${esc(c.context || "")}</textarea>
        <label>Fiabilité (explication)</label>
        <textarea data-field="reliability_text" rows="2">${esc(c.reliability_text || "")}</textarea>
        <label>Références</label>
        <textarea data-field="references_text" rows="2">${esc(c.references_text || "")}</textarea>
        <div class="cert-edit-btns">
          <button class="btn-save" onclick="saveCertAdmin(${id})">Enregistrer</button>
          <button onclick="document.getElementById('cert-edit-${id}').style.display='none'">Annuler</button>
        </div>
      `;
    }

    async function saveCertAdmin(id) {
      certSuccess.style.display = "none";
      certError.style.display = "none";
      const form = document.getElementById(`cert-edit-${id}`);
      if (!form) return;
      const payload = { action: "update", id };
      form.querySelectorAll("[data-field]").forEach(el => { payload[el.dataset.field] = el.value; });
      try {
        const res = await fetch(`${API}/admin/certs.php`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.error) { certError.textContent = data.error; certError.style.display = "block"; }
        else { certSuccess.textContent = "CERT mise à jour."; certSuccess.style.display = "block"; form.style.display = "none"; loadCerts(); }
      } catch (err) { certError.textContent = "Erreur : " + err.message; certError.style.display = "block"; }
    }

    async function deleteCertAdmin(id, title) {
      if (!confirm(`Supprimer la CERT « ${title} » ?\n\nCette action est irréversible.`)) return;
      certSuccess.style.display = "none";
      certError.style.display = "none";
      try {
        const res = await fetch(`${API}/admin/certs.php`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ action: "delete", id })
        });
        const data = await res.json();
        if (data.error) { certError.textContent = data.error; certError.style.display = "block"; }
        else { certSuccess.textContent = `CERT « ${title} » supprimée.`; certSuccess.style.display = "block"; loadCerts(); }
      } catch (err) { certError.textContent = "Erreur : " + err.message; certError.style.display = "block"; }
    }

    function esc(s) {
      return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }
  </script>
</body>
</html>
