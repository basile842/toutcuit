<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
  <meta name="copyright" content="© 2026 Certify Community SA. Tous droits réservés." />
  <title>Liens collectés — toutcuit.ch</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --panel-2: #f1f3f9;
      --text: #1f2328;
      --muted: #5e6673;
      --border: #d7dbe6;
      --accent: #6f5cf7;
      --accent-hover: #5a48e0;
      --shadow: 0 10px 30px rgba(16, 24, 40, .08);
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      background:
        radial-gradient(1200px 700px at 50% 0%, rgba(111, 92, 247, .10), transparent 58%),
        var(--bg);
      color: var(--text);
      font-family: 'Inter var', 'Inter', system-ui, sans-serif;
      font-weight: 500;
      line-height: 1.5;
    }

    .console-header {
      background: rgba(255,255,255,.88);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .console-header-logo {
      font-size: 1.2rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      color: var(--accent);
    }

    .console-header-sep { color: var(--border); font-size: 1.2rem; }

    .console-header-link {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--muted);
      text-decoration: none;
    }

    .console-header-link:hover { color: var(--accent); }

    .console-header-spacer { flex: 1; }

    .console-header-user { font-size: 0.82rem; color: var(--muted); }

    .console-header-logout {
      font-size: 0.82rem;
      color: var(--accent);
      cursor: pointer;
      border: none;
      background: none;
      font-weight: 600;
    }

    .page-main {
      max-width: 860px;
      margin: 0 auto;
      padding: 28px 20px 48px;
    }

    .page-title {
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .page-sub {
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 16px;
    }

    .btn {
      padding: 9px 16px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      background: var(--panel);
      color: var(--text);
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color .15s;
      text-decoration: none;
    }

    .btn:hover { border-color: var(--accent); }

    .btn-accent {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .btn-accent:hover { background: var(--accent-hover); }

    .count-label {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 600;
    }

    .links-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .link-card {
      padding: 12px 14px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 2px 8px rgba(16,24,40,.05);
    }

    .link-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .link-user {
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--accent);
    }

    .link-date {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .link-card-header-spacer { flex: 1; }

    .btn-del {
      background: none;
      border: 1px solid transparent;
      border-radius: 7px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 3px 10px;
      transition: all .15s;
    }

    .btn-del:hover {
      color: #b91c1c;
      border-color: rgba(239,68,68,.3);
      background: rgba(239,68,68,.06);
    }

    .link-url {
      font-size: 0.88rem;
      word-break: break-all;
    }

    .link-url a {
      color: var(--accent);
      text-decoration: none;
    }

    .link-url a:hover { text-decoration: underline; }

    .link-comment {
      margin-top: 4px;
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.45;
    }

    .empty-msg {
      color: var(--muted);
      font-size: 0.88rem;
      padding: 28px 14px;
      text-align: center;
    }
  </style>
</head>
<body>

  <header class="console-header">
    <span class="console-header-logo">toutcuit</span>
    <span class="console-header-sep">/</span>
    <a href="/admin.html" class="console-header-link">Console</a>
    <span class="console-header-sep">/</span>
    <a href="#" class="console-header-link" id="backLink">Séance</a>
    <span class="console-header-spacer"></span>
    <span class="console-header-user" id="userName"></span>
    <button class="console-header-logout" id="logoutBtn">Déconnexion</button>
  </header>

  <div class="page-main">
    <div class="page-title">Liens collectés</div>
    <div class="page-sub" id="pageSub">Chargement...</div>

    <div class="toolbar">
      <button class="btn btn-accent" id="downloadBtn">Télécharger (Excel)</button>
      <span class="count-label" id="countLabel"></span>
    </div>

    <div class="links-list" id="linksList"></div>
  </div>

  <script>
    const API = "/api";
    const params = new URLSearchParams(location.search);
    const SESSION_ID = params.get("id");
    const SESSION_CODE = params.get("code") || "";

    const token = localStorage.getItem("tc_token");
    if (!token) { window.location.href = "/admin.html"; }

    try {
      const t = JSON.parse(localStorage.getItem("tc_teacher"));
      if (t?.name) document.getElementById("userName").textContent = t.name;
    } catch {}

    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("tc_token");
      localStorage.removeItem("tc_teacher");
      window.location.href = "/admin.html";
    });

    document.getElementById("backLink").href = `/session.html?id=${SESSION_ID}&code=${encodeURIComponent(SESSION_CODE)}`;

    function esc(s) {
      return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    let allLinks = [];

    async function loadLinks() {
      const linksList = document.getElementById("linksList");
      const countLabel = document.getElementById("countLabel");
      const pageSub = document.getElementById("pageSub");

      try {
        const res = await fetch(`${API}/sessions/collected.php?session_id=${SESSION_ID}`, {
          headers: { "Authorization": `Bearer ${token}` }
        });
        const data = await res.json();

        if (data.error) {
          linksList.innerHTML = `<div class="empty-msg">Erreur : ${esc(data.error)}</div>`;
          return;
        }

        allLinks = Array.isArray(data) ? data : [];
        pageSub.textContent = `Séance ${SESSION_CODE}`;
        countLabel.textContent = `${allLinks.length} lien(s)`;

        if (!allLinks.length) {
          linksList.innerHTML = '<div class="empty-msg">Aucun lien collecté pour cette séance.</div>';
          return;
        }

        linksList.innerHTML = allLinks.map(l => `
          <div class="link-card" data-id="${l.id}">
            <div class="link-card-header">
              <span class="link-user">${esc(l.user_id)}</span>
              <span class="link-date">${esc((l.created_at || "").substring(0, 16).replace("T", " "))}</span>
              <span class="link-card-header-spacer"></span>
              <button class="btn-del" onclick="deleteLink(${l.id}, this)">Supprimer</button>
            </div>
            <div class="link-url"><a href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.url)}</a></div>
            ${l.comment ? `<div class="link-comment">${esc(l.comment)}</div>` : ""}
          </div>
        `).join("");
      } catch (err) {
        linksList.innerHTML = `<div class="empty-msg">Erreur : ${esc(err.message)}</div>`;
      }
    }

    async function deleteLink(id, btn) {
      if (!confirm("Supprimer ce lien ?")) return;

      try {
        const res = await fetch(`${API}/sessions/delete-link.php`, {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
          body: JSON.stringify({ link_id: id })
        });
        const data = await res.json();
        if (data.error) return alert("Erreur : " + data.error);

        const card = btn.closest(".link-card");
        if (card) card.remove();
        allLinks = allLinks.filter(l => l.id !== id);
        document.getElementById("countLabel").textContent = `${allLinks.length} lien(s)`;

        if (!allLinks.length) {
          document.getElementById("linksList").innerHTML = '<div class="empty-msg">Aucun lien collecté pour cette séance.</div>';
        }
      } catch (err) {
        alert("Erreur : " + err.message);
      }
    }

    // Download Excel
    document.getElementById("downloadBtn").addEventListener("click", () => {
      if (!allLinks.length) return alert("Aucun lien à télécharger.");

      const data = [["Pseudo", "URL", "Commentaire", "Date"]];
      for (const l of allLinks) {
        data.push([
          l.user_id || "",
          l.url || "",
          l.comment || "",
          (l.created_at || "").substring(0, 19).replace("T", " ")
        ]);
      }

      const ws = XLSX.utils.aoa_to_sheet(data);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Liens collectés");
      XLSX.writeFile(wb, `liens_collectes_${SESSION_CODE}.xlsx`);
    });

    loadLinks();
  </script>
<footer style="text-align:center;padding:18px 12px;font-size:.7rem;color:rgba(111,92,247,.45);letter-spacing:.01em;">

</html>
