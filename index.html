<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
  <meta name="copyright" content="© 2026 Certify Community SA. Tous droits réservés." />
  <title>toutcuit.ch</title>
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter var', 'Inter', system-ui, sans-serif;
      font-weight: 500;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #6f5cf7 0%, #8b7cff 100%);
      color: #ffffff;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 800px;
      width: 100%;
    }

    h1 {
      font-size: 6rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
      line-height: 1;
    }

    .tagline {
      font-size: 1.5rem;
      font-weight: 300;
      margin-bottom: 3rem;
      opacity: 0.95;
    }


    footer {
      margin-top: 4rem;
      font-size: 0.9rem;
      opacity: 0.8;
    }

    footer a {
      color: #ffffff;
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
      transition: border-color 0.3s ease;
    }

    footer a:hover {
      border-color: rgba(255, 255, 255, 0.8);
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 4rem;
      }

      .tagline {
        font-size: 1.2rem;
      }

      .btn {
        font-size: 1rem;
        padding: 0.9rem 2rem;
        min-width: 220px;
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 3rem;
      }

      .tagline {
        font-size: 1rem;
      }

      .btn {
        min-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>toutcuit</h1>
  </div>
</body>
</html>
